    <script>
        // ══════════════════════════════════════════════════════════
        // V3 PLAYER — Data-driven from presentation.json
        // ══════════════════════════════════════════════════════════

        var SECTIONS = [];
        var PRESENTATION = null;
        var curSec = 0;
        var timers = [];
        var activeScene = null;
        var loadedScripts = {};
        var JOB_BASE_URL = '';
        // ── FIX: declare _karaokeTimer as a proper global ──────────
        var _karaokeTimer = null;

        function getMediaSrc(url) {
            if (!url) return '';
            if (url.startsWith('http://') || url.startsWith('https://') || url.startsWith('blob:') || url.startsWith('/')) {
                return url;
            }
            if (JOB_BASE_URL) {
                var sep = JOB_BASE_URL.endsWith('/') ? '' : '/';
                return JOB_BASE_URL + sep + url;
            }
            return url;
        }

        var BADGE_MAP = {
            intro: { label: 'INTRO', cls: 'badge-intro' },
            summary: { label: 'SUMMARY', cls: 'badge-summary' },
            content: { label: 'CONTENT', cls: 'badge-content' },
            example: { label: 'EXAMPLE', cls: 'badge-example' },
            memory: { label: 'MEMORY', cls: 'badge-memory' },
            recap: { label: 'RECAP', cls: 'badge-recap' },
            quiz: { label: 'QUIZ', cls: 'badge-quiz' },
        };

        window.onerror = function (msg, src, line, col, err) {
            var ls = document.getElementById('loading-screen');
            var es = document.getElementById('error-screen');
            var em = document.getElementById('error-msg');
            if (ls) ls.style.display = 'none';
            if (es) es.style.display = 'flex';
            if (em) em.textContent = 'JS Error: ' + msg + ' (line ' + line + ')';
            return false;
        };

        // ══════════════════════════════════════════════════════════
        // BOOTSTRAP
        // ══════════════════════════════════════════════════════════
        (function bootstrap() {
            var params = new URLSearchParams(window.location.search);
            var jobId = params.get('job') || params.get('job_id');
            var jsonUrl = '';

            var path = window.location.pathname;
            if (path.indexOf('/player/jobs/') === 0) {
                var lastSlash = path.lastIndexOf('/');
                JOB_BASE_URL = path.substring(0, lastSlash + 1);
            }

            if (jobId) {
                jsonUrl = '/player/jobs/' + jobId + '/presentation.json?t=' + Date.now();
            } else if (JOB_BASE_URL) {
                jsonUrl = JOB_BASE_URL + 'presentation.json?t=' + Date.now();
            } else {
                jsonUrl = params.get('data') || 'presentation.json';
                if (jsonUrl && !jsonUrl.startsWith('/')) {
                    jsonUrl = getMediaSrc(jsonUrl);
                }
            }

            fetch(jsonUrl)
                .then(function (r) {
                    if (!r.ok) throw new Error('HTTP ' + r.status + ': ' + jsonUrl);
                    return r.json();
                })
                .then(function (data) {
                    PRESENTATION = data;
                    SECTIONS = data.sections || [];
                    if (SECTIONS.length === 0) throw new Error('presentation.json has no sections');
                    initPlayer();
                })
                .catch(function (err) {
                    document.getElementById('loading-screen').style.display = 'none';
                    var es = document.getElementById('error-screen');
                    es.style.display = 'flex';
                    document.getElementById('error-msg').textContent = String(err);
                });
        })();

        // ══════════════════════════════════════════════════════════
        // INIT
        // ══════════════════════════════════════════════════════════
        var avWebGL = null;

        function initAvatarWebGL() {
            var canvas = document.getElementById('av-canvas');
            var video = document.getElementById('av-vid');
            if (typeof THREE === 'undefined') return;

            var renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true });
            var overlay = document.getElementById('av-overlay');
            var dpr = window.devicePixelRatio || 1;
            renderer.setSize(overlay.offsetWidth, overlay.offsetHeight, false);
            renderer.setPixelRatio(dpr);

            var scene = new THREE.Scene();
            var camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

            var texture = new THREE.VideoTexture(video);
            texture.minFilter = THREE.LinearFilter;
            texture.magFilter = THREE.LinearFilter;
            texture.format = THREE.RGBAFormat;

            var keyColor = new THREE.Color(0x00b140);
            try {
                var sampleCanvas = document.createElement('canvas');
                sampleCanvas.width = 16; sampleCanvas.height = 16;
                var sctx = sampleCanvas.getContext('2d');
                sctx.drawImage(video, 0, 0, 16, 16);
                var px = sctx.getImageData(2, 2, 1, 1).data;
                if (px[1] > px[0] && px[1] > px[2]) {
                    keyColor.setRGB(px[0] / 255, px[1] / 255, px[2] / 255);
                }
            } catch (e) { }

            var material = new THREE.ShaderMaterial({
                transparent: true,
                uniforms: {
                    map: { value: texture },
                    keyColor: { value: keyColor },
                    similarity: { value: 0.15 },
                    smoothness: { value: 0.00 },
                    uCanvasAspect: { value: 1.0 },
                    uVideoAspect: { value: 9 / 16 }
                },
                vertexShader: `
                    varying vec2 vUv;
                    void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }
                `,
                fragmentShader: `
                    uniform sampler2D map;
                    uniform vec3 keyColor;
                    uniform float similarity;
                    uniform float smoothness;
                    uniform float uCanvasAspect;
                    uniform float uVideoAspect;
                    varying vec2 vUv;
                    void main() {
                        vec2 uv = vUv;
                        if (uCanvasAspect > uVideoAspect) {
                            float scale = uCanvasAspect / uVideoAspect;
                            uv.x = (uv.x - 0.5) * scale + 0.5;
                        } else {
                            float scale = uVideoAspect / uCanvasAspect;
                            uv.y = (uv.y - 0.5) * scale + 0.5;
                        }
                        vec4 videoColor = (uv.x < 0.0 || uv.x > 1.0 || uv.y < 0.0 || uv.y > 1.0) ? vec4(0.0) : texture2D(map, uv);
                        float Y1 = 0.299 * keyColor.r + 0.587 * keyColor.g + 0.114 * keyColor.b;
                        float Cr1 = keyColor.r - Y1;
                        float Cb1 = keyColor.b - Y1;
                        float Y2 = 0.299 * videoColor.r + 0.587 * videoColor.g + 0.114 * videoColor.b;
                        float Cr2 = videoColor.r - Y2;
                        float Cb2 = videoColor.b - Y2;
                        float blend = distance(vec2(Cr2, Cb2), vec2(Cr1, Cb1));
                        float alpha = smoothstep(similarity, similarity + max(smoothness, 0.001), blend);
                        gl_FragColor = vec4(videoColor.rgb * alpha, alpha);
                    }
                `,
            });

            var plane = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), material);
            scene.add(plane);

            avWebGL = { renderer: renderer, scene: scene, camera: camera, material: material };

            function animate() {
                requestAnimationFrame(animate);
                renderer.render(scene, camera);
            }
            animate();

            window.addEventListener('resize', function () {
                var ov = document.getElementById('av-overlay');
                var dpr = window.devicePixelRatio || 1;
                var h = ov.clientHeight || 356;
                var vid = document.getElementById('av-vid');
                var vw = vid.videoWidth || 1080;
                var vh = vid.videoHeight || 1920;
                var aspect = vw / vh;
                var w = h * aspect;
                ov.style.width = w + 'px';
                renderer.setSize(w, h, false);
                renderer.setPixelRatio(dpr);
                if (material) {
                    material.uniforms.uCanvasAspect.value = w / h;
                    material.uniforms.uVideoAspect.value = aspect;
                }
            });
        }

        function initPlayer() {
            var title = PRESENTATION.presentation_title || PRESENTATION.title || (SECTIONS[0] && SECTIONS[0].title) || 'Lesson';
            document.title = title + ' — V3';
            document.getElementById('tb-title').textContent = title;
            document.getElementById('av-tag').textContent =
                (PRESENTATION.avatar_name || 'Priya') + ' · ' + (PRESENTATION.subject || 'Lesson');

            buildTopDots();
            buildScenes();

            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('topbar').style.display = 'flex';
            document.getElementById('botbar').style.display = 'flex';
            document.getElementById('av-overlay').style.display = 'block';

            if (typeof THREE !== 'undefined') {
                var avVidEl = document.getElementById('av-vid');
                if (avVidEl.readyState >= 2) {
                    initAvatarWebGL();
                } else {
                    avVidEl.addEventListener('loadeddata', function () {
                        initAvatarWebGL();
                    }, { once: true });
                }
            }

            var isMobile = /Android|iPhone|iPad/i.test(navigator.userAgent);
            if (isMobile) {
                document.getElementById('tap-to-start').style.display = 'flex';
                document.getElementById('tap-to-start').addEventListener('click', function () {
                    this.style.display = 'none';
                    loadSection(0);
                }, { once: true });
            } else {
                loadSection(0);
            }
            window._initGestures && window._initGestures();
        }

        // ══════════════════════════════════════════════════════════
        // BUILD SCENE DOM
        // ══════════════════════════════════════════════════════════
        function buildTopDots() {
            var c = document.getElementById('tb-dots');
            SECTIONS.forEach(function (s, i) {
                var d = document.createElement('div');
                d.className = 'tb-dot future'; d.id = 'tbd' + i;
                d.onclick = function () { loadSection(i); };
                d.title = s.title || '';
                c.appendChild(d);
            });
        }

        function buildScenes() {
            var container = document.getElementById('scenes-container');
            SECTIONS.forEach(function (sec, i) {
                var div = document.createElement('div');
                div.className = 'scene' + (i === 0 ? ' on' : '');
                div.id = 'scene-' + i;
                div.innerHTML = buildSceneHTML(sec);
                container.appendChild(div);
            });
        }

        function buildSceneHTML(sec) {
            var type = sec.section_type || sec.type || 'content';
            if (type === 'intro') return buildIntroHTML(sec);
            if (type === 'summary') return buildSummaryHTML(sec);
            if (type === 'memory') return buildMemoryHTML(sec);
            if (type === 'recap') return buildRecapHTML(sec);
            if (type === 'quiz') return buildQuizHTML(sec);
            return buildTransparentLabel(sec);
        }

        function buildTransparentLabel(sec) {
            return '<div style="position:absolute;bottom:80px;left:50%;transform:translateX(-50%)' +
                ';font-family:\'JetBrains Mono\',monospace;font-size:11px;color:rgba(255,255,255,.2)' +
                ';letter-spacing:.08em;pointer-events:none;">' + esc(sec.title || '') + '</div>';
        }

        function buildIntroHTML(sec) {
            // INTRO — Avatar-only. No HTML content rendered.
            return '';
        }

        function buildSummaryHTML(sec) {
            var bullets = [];
            if (sec.narration && sec.narration.segments) {
                sec.narration.segments.forEach(function (seg) {
                    if (seg.text) bullets.push(seg.text.substring(0, 120));
                });
            }
            var items = bullets.slice(0, 6).map(function (t, i) {
                return '<div class="sbullet" id="sb-' + sec.section_id + '-' + i + '">' +
                    '<div class="sbullet-n">' + (i + 1) + '</div>' +
                    '<div class="sbullet-t">' + esc(t) + '</div></div>';
            }).join('');
            return '<div style="align-items:flex-start;max-width:680px;margin:0 auto;width:100%;display:flex;flex-direction:column;gap:10px">' +
                '<div class="sum-hd">By the end of this section, you will...</div>' + items + '</div>';
        }

        function buildMemoryHTML(sec) {
            var rawCards = sec.flashcards || [];
            var cards = rawCards.map(function (c) {
                return {
                    q: c.q || c.front || c.question || 'Question?',
                    a: c.a || c.back || c.answer || ''
                };
            });
            if (!cards.length && sec.narration && sec.narration.segments) {
                sec.narration.segments.forEach(function (seg) {
                    if (seg.purpose === 'quiz_question' || seg.purpose === 'introduce') {
                        cards.push({ q: seg.text, a: '' });
                    }
                });
            }
            if (!cards.length) cards = [{ q: 'What was the key concept?', a: 'Review previous sections.' }];
            FLASHCARDS_CUR = cards;
            var pips = cards.map(function (_, i) {
                return '<div class="cpip"' + (i === 0 ? ' style="background:var(--rose)"' : '') + ' onclick="goCard(' + i + ')"></div>';
            }).join('');
            return '<div class="mem-hd">Memory Cards</div>' +
                '<div class="card-scene"><div class="card-3d" id="card-3d" onclick="flipCard()">' +
                '<div class="card-face card-front"><div class="card-q" id="card-q">' + esc(cards[0].q) + '</div>' +
                '<div class="card-hint">&#128161; Click to reveal</div></div>' +
                '<div class="card-face card-back"><div class="card-a" id="card-a">' + esc(cards[0].a) + '</div></div>' +
                '</div></div>' +
                '<div class="card-nav"><button class="nb" onclick="prevCard()">&#8592;</button>' +
                '<div class="card-pips" id="card-pips">' + pips + '</div>' +
                '<button class="nb" onclick="nextCard()">&#8594;</button></div>' +
                '<div class="card-ctr" id="card-ctr">1 of ' + cards.length + '</div>';
        }

        function buildRecapHTML(sec) {
            if (!sec.narration || !sec.narration.segments) return '';
            var segs = sec.narration.segments;
            var items = segs.map(function (seg, i) {
                return '<div id="rs-' + esc(String(sec.section_id)) + '-' + i + '" style="' +
                    'position:absolute;width:90%;left:5%;bottom:90px;' +
                    'opacity:0;transition:opacity 0.9s ease;' +
                    'font-family:\'Caveat\',cursive;font-size:28px;font-weight:700;' +
                    'color:#e6edf3;text-align:center;line-height:1.5;' +
                    'text-shadow:0 2px 14px rgba(0,0,0,0.85),0 0 32px rgba(0,0,0,0.6);' +
                    'pointer-events:none;">' + esc(seg.text || '') + '</div>';
            }).join('');
            return '<div style="position:absolute;inset:0;pointer-events:none;">' + items + '</div>';
        }

        function buildQuizHTML(sec) {
            var quiz = sec.understanding_quiz || {};
            var opts = quiz.options || {};
            var optItems = Object.keys(opts).map(function (k) {
                return '<div class="quiz-opt" id="qopt-' + sec.section_id + '-' + k + '" onclick="selectQuizOpt(\'' + sec.section_id + '\',\'' + k + '\')">' +
                    '<span class="quiz-opt-lbl">' + k + '</span>' + esc(opts[k]) + '</div>';
            }).join('');
            return '<div class="quiz-card">' +
                '<div class="quiz-q">' + esc(quiz.question || 'Quiz') + '</div>' +
                '<div class="quiz-opts" id="qopts-' + sec.section_id + '">' + optItems + '</div>' +
                '<div class="quiz-explanation" id="qexp-' + sec.section_id + '">' + esc(quiz.explanation || '') + '</div>' +
                '</div>';
        }

        // ══════════════════════════════════════════════════════════
        // SECTION LOADING
        // ══════════════════════════════════════════════════════════
        function clearTimers() {
            timers.forEach(function (t) { clearTimeout(t); clearInterval(t); });
            timers = [];
        }

        document.addEventListener('touchstart', function unlockAudio() {
            var vid = document.getElementById('av-vid');
            vid.play().catch(function () { });
            document.removeEventListener('touchstart', unlockAudio);
        }, { once: true, passive: true });

        function loadSection(idx) {
            clearTimers();

            if (activeScene) { try { activeScene.dispose(); } catch (e) { } activeScene = null; }
            var threejsLayer = document.getElementById('threejs-layer');
            if (threejsLayer && typeof threejsLayer._pointerCleanup === 'function') {
                try { threejsLayer._pointerCleanup(); } catch (e) { }
                threejsLayer._pointerCleanup = null;
            }
            if (threejsLayer) {
                threejsLayer.classList.remove('on');
                threejsLayer.innerHTML = '';
            }

            // Hide subtitles, clear any running karaoke timer
            var subtitleEl = document.getElementById('subtitle-overlay');
            if (subtitleEl) subtitleEl.style.display = 'none';
            if (_karaokeTimer) { clearInterval(_karaokeTimer); _karaokeTimer = null; }

            var imgLayer = document.getElementById('image-layer');
            if (imgLayer) { imgLayer.classList.remove('vis'); imgLayer.classList.remove('on'); }

            var manimLayer = document.getElementById('manim-layer');
            var manimVid = document.getElementById('manim-vid');
            if (manimLayer) manimLayer.classList.remove('on');
            if (manimVid) { manimVid.pause(); manimVid.src = ''; }

            var wanLayer = document.getElementById('wan-layer');
            var wanVid = document.getElementById('wan-vid');
            wanLayer.classList.remove('on');
            wanVid.pause(); wanVid.src = '';

            var prevEl = document.getElementById('scene-' + curSec);
            if (prevEl) prevEl.classList.remove('on');
            curSec = idx;
            var sec = SECTIONS[idx];
            if (!sec) return;
            var sceneEl = document.getElementById('scene-' + idx);
            if (sceneEl) sceneEl.classList.add('on');

            for (var i = 0; i < SECTIONS.length; i++) {
                var d = document.getElementById('tbd' + i);
                if (d) d.className = 'tb-dot ' + (i < idx ? 'past' : i === idx ? 'cur' : 'future');
            }

            var secType = sec.section_type || sec.type || 'content';
            document.getElementById('av-overlay').setAttribute('data-sectype', secType);
            var badge = BADGE_MAP[secType] || { label: secType.toUpperCase(), cls: 'badge-content' };
            document.getElementById('tb-secname').textContent = '/ ' + (sec.title || '');
            document.getElementById('bot-label').textContent = sec.title || '';
            document.getElementById('bot-ctr').textContent = (idx + 1) + ' / ' + SECTIONS.length;
            document.getElementById('prog-fill').style.width = ((idx + 1) / SECTIONS.length * 100) + '%';
            ['top-badge', 'bot-badge'].forEach(function (id) {
                var el = document.getElementById(id);
                if (!el) return;
                el.textContent = badge.label;
                el.className = 'tb-badge ' + badge.cls;
            });
            document.getElementById('seg-dots').innerHTML = '';

            var wrap = document.getElementById('av-overlay');
            if (secType === 'quiz') {
                wrap.setAttribute('data-sectype', 'quiz');
                wrap.style.display = 'block';
                window.dispatchEvent(new Event('resize'));
                initQuizSection(sec);
                return;
            }
            document.getElementById('quiz-overlay').style.display = 'none';

            var vid = document.getElementById('av-vid');
            vid.onended = null;
            var avatarUrl = sec.avatar_video || sec.avatar_url || sec.avatar || sec.b2_url || '';

            if (avatarUrl) {
                vid.src = getMediaSrc(avatarUrl); vid.load();
                vid.play().catch(function (e) { console.warn("Avatar video play failed", e); });

                var sectionAtLoad = curSec;
                var _stallCheck = setInterval(function () {
                    if (curSec !== sectionAtLoad) { clearInterval(_stallCheck); return; }
                    if (vid.paused && !vid.ended && vid.readyState >= 3) {
                        vid.play().catch(function () { });
                    }
                }, 2000);
                timers.push(_stallCheck);

                vid.addEventListener('loadeddata', function resampleKey() {
                    vid.removeEventListener('loadeddata', resampleKey);
                    window.dispatchEvent(new Event('resize'));
                    try {
                        var sc = document.createElement('canvas');
                        sc.width = 16; sc.height = 16;
                        var sx = sc.getContext('2d');
                        sx.drawImage(vid, 0, 0, 16, 16);
                        var px = sx.getImageData(2, 2, 1, 1).data;
                        if (px[1] > px[0] && px[1] > px[2]) {
                            avWebGL.material.uniforms.keyColor.value.setRGB(
                                px[0] / 255, px[1] / 255, px[2] / 255
                            );
                        }
                    } catch (e) { }
                });

                var _avBox = { started: false };
                vid.onplay = (function (box) { return function () { box.started = true; }; })(_avBox);
                var _ttsRealDur = sec.segment_duration_seconds || null;
                // FIX 1: guard flag — prevents durationchange from calling loadManimScene
                // a second time after onloadedmetadata already called it
                var _manimLoaded = false;

                vid.onloadedmetadata = (function (box) {
                    return function () {
                        var actualDur = (vid.duration && isFinite(vid.duration))
                            ? vid.duration
                            : (_ttsRealDur || 15);
                        var renderer = sec.renderer || 'none';
                        if (renderer === 'manim') {
                            var hasVid = sec.video_path || (sec.manim_video_paths && sec.manim_video_paths.length > 0);
                            if (hasVid) { _manimLoaded = true; loadManimScene(sec, actualDur, box); }
                        } else if (renderer === 'video' || renderer === 'wan_video' ||
                            renderer === 'text_to_video' || renderer === 'image_to_video' ||
                            sec.section_type === 'recap') {
                            loadVideoScene(sec, actualDur, box);
                        }
                        startSubtitleDriver(sec, sectionAtLoad);
                    };
                })(_avBox);

                vid.addEventListener('durationchange', (function (box, capturedSec) {
                    return function () {
                        if (!isFinite(vid.duration) || vid.duration <= 0) return;
                        var renderer = capturedSec.renderer || 'none';
                        if (renderer === 'video' || renderer === 'wan_video' ||
                            renderer === 'text_to_video' || renderer === 'image_to_video' ||
                            capturedSec.section_type === 'recap') {
                            loadVideoScene(capturedSec, vid.duration, box);
                            return;
                        }
                        // FIX 1: skip if manim was already loaded from onloadedmetadata
                        if (renderer !== 'manim') return;
                        if (_manimLoaded) return;
                        var hasVid = capturedSec.video_path || (capturedSec.manim_video_paths && capturedSec.manim_video_paths.length > 0);
                        if (!hasVid) return;
                        var prev = _ttsRealDur || 15;
                        if (Math.abs(vid.duration - prev) > 1.5) {
                            _manimLoaded = true;
                            loadManimScene(capturedSec, vid.duration, box);
                        }
                    };
                })(_avBox, sec), { once: true });

                vid.onended = function () {
                    if (sec.understanding_quiz || (sec.questions && sec.questions.length > 0)) {
                        initQuizSection(sec);
                    } else if (curSec < SECTIONS.length - 1) {
                        timers.push(setTimeout(function () { loadSection(curSec + 1); }, 700));
                    }
                };
            } else {
                vid.src = '';
                var fallbackDur = sec.segment_duration_seconds || sec.dur || 30;
                startSubtitleDriver(sec, curSec);
                timers.push(setTimeout(function () {
                    if (sec.understanding_quiz || (sec.questions && sec.questions.length > 0)) {
                        initQuizSection(sec);
                    } else if (curSec < SECTIONS.length - 1) loadSection(curSec + 1);
                }, fallbackDur * 1000));

                var renderer = sec.renderer || 'none';
                if (renderer === 'manim') {
                    loadManimScene(sec, fallbackDur, { started: true });
                } else if (renderer === 'video' || renderer === 'wan_video' ||
                    renderer === 'text_to_video' || renderer === 'image_to_video' ||
                    sec.section_type === 'recap') {
                    loadVideoScene(sec, fallbackDur, { started: true });
                }
            }

            document.getElementById('av-narr').textContent = sec.narration && sec.narration.full_text
                ? sec.narration.full_text.substring(0, 200) : '';

            var secType2 = sec.section_type || sec.type || 'content';
            if (secType2 === 'summary') initSummarySection(sec, idx);
            if (secType2 === 'recap') initRecapSection(sec, idx);
        }

        // ══════════════════════════════════════════════════════════
        // SUBTITLES
        // ══════════════════════════════════════════════════════════
        function startSubtitleDriver(sec, sectionAtLoad) {
            if (!sec.narration || !sec.narration.segments) return;
            var segments = sec.narration.segments;
            var avEl = document.getElementById('av-vid');
            var subtitleEl = document.getElementById('subtitle-overlay');
            var subtitleTextEl = document.getElementById('subtitle-text');
            var lastSegIdx = -1;

            function onTimeUpdate() {
                if (curSec !== sectionAtLoad) {
                    avEl.removeEventListener('timeupdate', onTimeUpdate);
                    return;
                }
                var t = avEl.currentTime;
                for (var i = 0; i < segments.length; i++) {
                    var seg = segments[i];
                    var start = seg.start_seconds !== undefined ? seg.start_seconds
                        : (seg.start_time !== undefined ? seg.start_time : 0);
                    var end = seg.end_seconds !== undefined ? seg.end_seconds
                        : (seg.end_time !== undefined ? seg.end_time
                            : start + (seg.duration_seconds || seg.duration || 5));
                    if (t >= start && t < end && i !== lastSegIdx) {
                        lastSegIdx = i;
                        var txt = seg.text || '';
                        if (txt.trim()) {
                            renderSubtitleKaraoke(subtitleEl, subtitleTextEl, txt,
                                seg.duration_seconds || (end - start) || 5, sectionAtLoad);
                        }
                        break;
                    }
                }
            }
            avEl.addEventListener('timeupdate', onTimeUpdate);
        }

        function renderSubtitleKaraoke(overlay, textEl, beatText, beatDur, sectionAtLoad) {
            if (window.SUB_CONFIG.mode === 'off') {
                overlay.style.display = 'none';
                return;
            }
            if (window.SUB_CONFIG.mode === 'full') {
                textEl.className = 'subtitle-text';
                textEl.innerHTML = esc(beatText);
                overlay.style.display = 'block';
                return;
            }

            // Karaoke mode
            textEl.className = '';
            overlay.style.display = 'block';

            // _karaokeTimer is now a properly declared global — safe to read and write
            if (_karaokeTimer) { clearInterval(_karaokeTimer); _karaokeTimer = null; }

            var words = beatText.split(/\s+/).filter(function (w) { return w.length > 0; });
            if (words.length === 0) return;

            var html = words.map(function (w, i) {
                var cls = i === 0 ? 'sub-word active' : 'sub-word future';
                return '<span class="' + cls + '" id="kw-' + i + '">' + esc(w) + '</span>';
            }).join(' ');
            textEl.innerHTML = html;

            var wordDurMs = Math.max((beatDur * 1000) / words.length, 150);
            var currentWord = 0;

            _karaokeTimer = setInterval(function () {
                if (curSec !== sectionAtLoad) {
                    clearInterval(_karaokeTimer);
                    _karaokeTimer = null;
                    return;
                }
                var prevEl = document.getElementById('kw-' + currentWord);
                if (prevEl) prevEl.className = 'sub-word spoken';
                currentWord++;
                if (currentWord >= words.length) {
                    clearInterval(_karaokeTimer);
                    _karaokeTimer = null;
                    return;
                }
                var nextEl = document.getElementById('kw-' + currentWord);
                if (nextEl) nextEl.className = 'sub-word active';
            }, wordDurMs);
        }

        // ══════════════════════════════════════════════════════════
        // VIDEO SCENE LOADER
        // ══════════════════════════════════════════════════════════
        function loadVideoScene(sec, avatarDuration, _avBox) {
            if (!_avBox) _avBox = { started: true };
            var wanLayer = document.getElementById('wan-layer');
            var wanVid = document.getElementById('wan-vid');
            var sectionAtLoad = curSec;

            var files = [];
            if (sec.beat_video_paths && sec.beat_video_paths.length > 0) {
                files = sec.beat_video_paths;
            } else if (sec.narration && sec.narration.segments) {
                sec.narration.segments.forEach(function (seg) {
                    var bv = seg.beat_videos && seg.beat_videos.length > 0
                        ? seg.beat_videos[0]
                        : (seg.video_path || null);
                    if (bv) files.push(bv);
                });
            }
            if (files.length === 0 && sec.render_spec && sec.render_spec.video_prompts) {
                sec.render_spec.video_prompts.forEach(function (vp) {
                    if (vp.video_path) files.push(vp.video_path);
                });
            }
            if (files.length === 0 && (sec.video_path || sec.video_url)) {
                files = [sec.video_path || sec.video_url];
            }
            if (files.length === 0) return;

            wanLayer.classList.add('on');

            var segs = sec.narration && sec.narration.segments ? sec.narration.segments : [];
            var totalDur = (avatarDuration && isFinite(avatarDuration) && avatarDuration > 0)
                ? avatarDuration : (sec.segment_duration_seconds || sec.dur || 15);
            var beatDurations = files.map(function (_, i) {
                if (segs[i] && segs[i].duration_seconds) return segs[i].duration_seconds;
                var vp = sec.render_spec && sec.render_spec.video_prompts && sec.render_spec.video_prompts[i];
                if (vp && vp.duration) return vp.duration;
                return totalDur / files.length;
            });

            var currentBeatIdx = 0;
            var accumulatedTime = 0;

            function playNextBeat() {
                if (curSec !== sectionAtLoad) return;
                if (currentBeatIdx >= files.length) return;

                var vPath = getMediaSrc(files[currentBeatIdx]);
                var beatDuration = beatDurations[currentBeatIdx];

                wanVid.src = vPath;
                wanVid.load();
                wanVid.play().catch(function () { });

                var _sc = setInterval(function () {
                    if (curSec !== sectionAtLoad) { clearInterval(_sc); return; }
                    if (wanVid.paused && !wanVid.ended && wanVid.readyState >= 3) wanVid.play().catch(function () { });
                }, 2000);
                timers.push(_sc);

                accumulatedTime += beatDuration;
                currentBeatIdx++;

                if (currentBeatIdx < files.length) {
                    var _ci = setInterval(function () {
                        if (curSec !== sectionAtLoad) { clearInterval(_ci); return; }
                        var avT = document.getElementById('av-vid');
                        if (avT && avT.currentTime >= accumulatedTime) { clearInterval(_ci); playNextBeat(); }
                    }, 50);
                    timers.push(_ci);
                }
            }

            var _sc2 = setInterval(function () {
                if (curSec !== sectionAtLoad) { clearInterval(_sc2); return; }
                if (_avBox.started) { clearInterval(_sc2); playNextBeat(); }
            }, 50);
            timers.push(_sc2);
        }

        // ══════════════════════════════════════════════════════════
        // MANIM BEAT LOADER — fixed
        // FIX 2: use vb.video_path directly on each beat (avoids sequential index offset)
        // FIX 3: when render_spec.manim_beats has more entries than visual_beats,
        //        build schedule from render_spec timing + overlay image beats on top
        // FIX 3b: image beats checked first in sync loop (higher z-index priority)
        // FIX 4: firstManim search now finds correct first video regardless of beat type order
        // FIX 5: vb.video_path takes precedence over sequential manimPaths[] index
        // ══════════════════════════════════════════════════════════
        function loadManimScene(sec, avatarDuration, _avBox) {
            if (!_avBox) _avBox = { started: true };
            var manimLayer = document.getElementById('manim-layer');
            var manimVid = document.getElementById('manim-vid');
            var imgLayer = document.getElementById('image-layer');
            var imgDisplay = document.getElementById('image-display');
            var avVid = document.getElementById('av-vid');
            var sectionAtLoad = curSec;

            var manimPaths = sec.manim_video_paths || (sec.video_path ? [sec.video_path] : []);
            var visualBeats = (sec.visual_beats || []).slice().sort(function (a, b) {
                return (a.beat_start_seconds || 0) - (b.beat_start_seconds || 0);
            });

            if (manimPaths.length === 0 && visualBeats.length === 0) return;

            var schedule = [];

            // ── FIX 3: use render_spec.manim_beats when it covers more clips than visual_beats ──
            // render_spec.manim_beats is the fine-grained spec (e.g. 11 entries for section 4)
            // visual_beats is coarse (e.g. 8 entries) and misses clips — so we prefer render_spec
            var rsBeats = sec.render_spec && sec.render_spec.manim_beats;
            var useRenderSpec = rsBeats && rsBeats.length > 0 && rsBeats.length >= manimPaths.length;

            if (useRenderSpec) {
                // Build manim entries from render_spec.manim_beats with accumulated timing
                var accT = 0;
                rsBeats.forEach(function (mb, i) {
                    var dur = mb.duration || mb.duration_seconds || 15;
                    schedule.push({
                        start: accT,
                        end: accT + dur,
                        type: 'manim',
                        videoPath: manimPaths[i] || null,
                        _rsIdx: i
                    });
                    accT += dur;
                });
                // FIX 3: overlay image beats from visual_beats on top of the manim schedule
                // Image beats have higher z-index so they take priority in the sync loop
                visualBeats.forEach(function (vb) {
                    if ((vb.visual_type === 'image' || vb.visual_type === 'infographic') && vb.image_source) {
                        schedule.push({
                            start: vb.beat_start_seconds || 0,
                            end: vb.beat_end_seconds || 9999,
                            type: 'image',
                            imgSrc: vb.image_source
                        });
                    }
                });
                // Sort by start time so the sync loop iterates in order
                schedule.sort(function (a, b) { return a.start - b.start; });

            } else {
                // ── FIX 2 + FIX 5: use vb.video_path directly instead of sequential manimIdx ──
                // This avoids the off-by-one when image beats appear mid-sequence
                var manimIdx = 0;
                schedule = visualBeats.map(function (vb) {
                    if ((vb.visual_type === 'image' || vb.visual_type === 'infographic') && vb.image_source) {
                        return {
                            start: vb.beat_start_seconds || 0,
                            end: vb.beat_end_seconds || 9999,
                            type: 'image',
                            imgSrc: vb.image_source
                        };
                    }
                    // FIX 5: prefer the beat's own video_path, fall back to sequential index
                    var path = vb.video_path || manimPaths[manimIdx] || null;
                    manimIdx++;
                    return {
                        start: vb.beat_start_seconds || 0,
                        end: vb.beat_end_seconds || 9999,
                        type: 'manim',
                        videoPath: path
                    };
                });

                // Fallback: no visual_beats at all — use narration segment timing
                if (schedule.length === 0 && manimPaths.length > 0) {
                    var segs = sec.narration && sec.narration.segments ? sec.narration.segments : [];
                    var accT2 = 0;
                    for (var fi = 0; fi < manimPaths.length; fi++) {
                        var dur2 = segs[fi] ? (segs[fi].duration_seconds || 15) : 15;
                        schedule.push({ start: accT2, end: accT2 + dur2, type: 'manim', videoPath: manimPaths[fi] });
                        accT2 += dur2;
                    }
                }
            }

            // ── FIX 6: merge render_spec.infographic_beats into schedule ──
            // Director puts source images in infographic_beats[] alongside a
            // "Hold dark background" manim beat. Player must overlay the image
            // during that window. If not in visual_beats[] it shows black screen.
            var infoBe = sec.render_spec && sec.render_spec.infographic_beats;
            if (infoBe && infoBe.length > 0) {
                infoBe.forEach(function (ib) {
                    if (!ib.image_source) return;
                    var ibStart = ib.start_seconds || 0;
                    var ibEnd = ib.end_seconds || 9999;
                    var already = schedule.some(function (s) {
                        return s.type === 'image' && s.imgSrc === ib.image_source
                            && Math.abs(s.start - ibStart) < 0.5;
                    });
                    if (!already) {
                        schedule.push({ start: ibStart, end: ibEnd, type: 'image', imgSrc: ib.image_source });
                    }
                });
                schedule.sort(function (a, b) { return a.start - b.start; });
            }

            // ── FIX 4: find correct first manim video to preload ──
            // Search entire schedule (including after any leading image beats)
            var firstManim = null;
            for (var si = 0; si < schedule.length; si++) {
                if (schedule[si].type === 'manim' && schedule[si].videoPath) {
                    firstManim = schedule[si]; break;
                }
            }
            // If there are only image beats and no manim video at all, bail out
            if (!firstManim) {
                // Still need to handle image-only schedules — run sync for image switching
                var hasImages = schedule.some(function (s) { return s.type === 'image'; });
                if (!hasImages) return;
                // Fall through to sync interval (image-only mode, manim layer stays off)
            } else {
                manimLayer.classList.add('on');
                manimVid.src = getMediaSrc(firstManim.videoPath);
                manimVid.load();
            }

            var currentBeatIdx = -1;

            function switchToBeat(beat) {
                if (beat.type === 'image') {
                    imgDisplay.src = getMediaSrc(beat.imgSrc);
                    imgLayer.classList.add('on');
                    setTimeout(function () { imgLayer.classList.add('vis'); }, 20);
                } else {
                    // Hide image overlay when switching back to manim
                    imgLayer.classList.remove('vis');
                    setTimeout(function () {
                        if (!imgLayer.classList.contains('vis')) imgLayer.classList.remove('on');
                    }, 420);
                    if (beat.videoPath) {
                        var newSrc = getMediaSrc(beat.videoPath);
                        if (manimVid.getAttribute('src') !== newSrc) {
                            manimVid.src = newSrc;
                            manimVid.load();
                            manimVid.play().catch(function () { });
                        }
                    }
                }
            }

            var _syncInt = setInterval(function () {
                if (curSec !== sectionAtLoad) { clearInterval(_syncInt); return; }
                if (!avVid) return;
                var t = avVid.currentTime;

                // ── FIX 3b: image beats take priority — check them first ──
                // An image beat sitting on top of a manim beat should always win
                var activeIdx = -1;
                for (var i = 0; i < schedule.length; i++) {
                    if (schedule[i].type === 'image' && t >= schedule[i].start && t < schedule[i].end) {
                        activeIdx = i; break;
                    }
                }
                // No active image beat — find active manim beat
                if (activeIdx < 0) {
                    for (var j = 0; j < schedule.length; j++) {
                        if (schedule[j].type === 'manim' && t >= schedule[j].start && t < schedule[j].end) {
                            activeIdx = j; break;
                        }
                    }
                }
                // Clamp to last beat when avatar has passed all beats
                if (activeIdx < 0 && schedule.length > 0) {
                    var last = schedule[schedule.length - 1];
                    if (t >= last.start) activeIdx = schedule.length - 1;
                }

                if (activeIdx >= 0 && activeIdx !== currentBeatIdx) {
                    currentBeatIdx = activeIdx;
                    switchToBeat(schedule[activeIdx]);
                }

                // Keep manim play state locked to avatar play state
                if (firstManim) {
                    if (!avVid.paused && manimVid.paused && !manimVid.ended && manimVid.readyState >= 2) {
                        manimVid.play().catch(function () { });
                    } else if (avVid.paused && !manimVid.paused) {
                        manimVid.pause();
                    }
                }
            }, 120);
            timers.push(_syncInt);

            var _startCheck = setInterval(function () {
                if (curSec !== sectionAtLoad) { clearInterval(_startCheck); return; }
                if (_avBox.started) {
                    clearInterval(_startCheck);
                    manimVid.currentTime = 0;
                    manimVid.play().catch(function () { });
                }
            }, 50);
            timers.push(_startCheck);

            var _stallCheck = setInterval(function () {
                if (curSec !== sectionAtLoad) { clearInterval(_stallCheck); return; }
                if (manimVid.paused && !manimVid.ended && manimVid.readyState >= 3 && avVid && !avVid.paused) {
                    manimVid.play().catch(function () { });
                }
            }, 2000);
            timers.push(_stallCheck);
        }

        // ══════════════════════════════════════════════════════════
        // SECTION INITS
        // ══════════════════════════════════════════════════════════
        function initSummarySection(sec) {
            if (!sec.narration || !sec.narration.segments) return;
            sec.narration.segments.forEach(function (_, i) {
                var el = document.getElementById('sb-' + sec.section_id + '-' + i);
                if (el) el.classList.remove('show');
                timers.push(setTimeout(function (idx) {
                    return function () {
                        var el2 = document.getElementById('sb-' + sec.section_id + '-' + idx);
                        if (el2) el2.classList.add('show');
                    };
                }(i), 400 + i * 1800));
            });
        }

        function initRecapSection(sec) {
            if (!sec.narration || !sec.narration.segments) return;
            var segs = sec.narration.segments;
            var sectionAtLoad = curSec;

            segs.forEach(function (_, i) {
                var el = document.getElementById('rs-' + sec.section_id + '-' + i);
                if (el) el.classList.remove('show');
            });

            var first = document.getElementById('rs-' + sec.section_id + '-0');
            if (first) first.classList.add('show');

            var beatTimes = [];
            var accum = 0;
            segs.forEach(function (seg) {
                beatTimes.push(accum);
                accum += (seg.duration_seconds || 15);
            });

            var avEl = document.getElementById('av-vid');
            function onTimeUpdate() {
                if (curSec !== sectionAtLoad) {
                    avEl.removeEventListener('timeupdate', onTimeUpdate);
                    return;
                }
                var t = avEl.currentTime;
                for (var i = 1; i < segs.length; i++) {
                    if (t >= beatTimes[i]) {
                        var el = document.getElementById('rs-' + sec.section_id + '-' + i);
                        if (el && !el.classList.contains('show')) el.classList.add('show');
                    }
                }
            }
            avEl.addEventListener('timeupdate', onTimeUpdate);
        }

        // ══════════════════════════════════════════════════════════
        // QUIZ INTERACTION
        // ══════════════════════════════════════════════════════════
        function selectQuizOpt(secId, key) {
            var sec = SECTIONS.find(function (s) { return s.section_id === secId || String(s.section_id) === String(secId); });
            if (!sec) return;
            var quiz = sec.understanding_quiz || {};
            var correctKey = quiz.correct;
            var opts = document.querySelectorAll('[id^="qopt-' + secId + '-"]');
            opts.forEach(function (el) {
                el.onclick = null;
                var k = el.id.split('-').pop();
                if (k === correctKey) el.classList.add('correct');
                else if (k === key) el.classList.add('wrong');
            });
            var exp = document.getElementById('qexp-' + secId);
            if (exp) exp.classList.add('show');
        }

        // ══════════════════════════════════════════════════════════
        // FLASHCARD STATE
        // ══════════════════════════════════════════════════════════
        var cardIdx = 0, cardFlipped = false, FLASHCARDS_CUR = [];

        function flipCard() {
            cardFlipped = !cardFlipped;
            var el = document.getElementById('card-3d');
            if (el) el.classList.toggle('flipped', cardFlipped);
        }
        function nextCard() { if (cardIdx < FLASHCARDS_CUR.length - 1) { cardIdx++; showCard(); } }
        function prevCard() { if (cardIdx > 0) { cardIdx--; showCard(); } }
        function goCard(i) { cardIdx = i; showCard(); }
        function showCard() {
            var fc = FLASHCARDS_CUR[cardIdx];
            if (!fc) return;
            var qEl = document.getElementById('card-q'), aEl = document.getElementById('card-a');
            if (qEl) qEl.textContent = fc.q || '';
            if (aEl) aEl.innerHTML = fc.a || '';
            var c3d = document.getElementById('card-3d');
            if (c3d) c3d.classList.remove('flipped');
            cardFlipped = false;
            var ctr = document.getElementById('card-ctr');
            if (ctr) ctr.textContent = (cardIdx + 1) + ' of ' + FLASHCARDS_CUR.length;
            var pips = document.getElementById('card-pips');
            if (!pips) return;
            for (var i = 0; i < pips.children.length; i++) {
                pips.children[i].className = 'cpip' + (i === cardIdx ? ' on' : i < cardIdx ? ' done' : '');
            }
        }

        // ══════════════════════════════════════════════════════════
        // NAVIGATION
        // ══════════════════════════════════════════════════════════
        function replaySection() { loadSection(curSec); }
        function nextSection() { if (curSec < SECTIONS.length - 1) loadSection(curSec + 1); }
        function prevSection() { if (curSec > 0) loadSection(curSec - 1); }

        function togglePlayPause() {
            var avVid = document.getElementById('av-vid');
            var wanVid = document.getElementById('wan-vid');
            var manimVid = document.getElementById('manim-vid');
            var btn = document.getElementById('play-pause-btn');
            if (!avVid) return;
            if (avVid.paused) {
                avVid.play().catch(function () { });
                if (wanVid && wanVid.src && wanVid.paused) wanVid.play().catch(function () { });
                if (manimVid && manimVid.src && manimVid.paused) manimVid.play().catch(function () { });
                if (btn) btn.innerHTML = '&#10074;&#10074;';
            } else {
                avVid.pause();
                if (wanVid && !wanVid.paused) wanVid.pause();
                if (manimVid && !manimVid.paused) manimVid.pause();
                if (btn) btn.innerHTML = '&#9654;';
            }
        }

        // ══════════════════════════════════════════════════════════
        // BRANCHING QUIZ
        // ══════════════════════════════════════════════════════════
        function initQuizSection(sec) {
            var overlay = document.getElementById('quiz-overlay');
            var qLabel = document.getElementById('quiz-q-label');
            var qText = document.getElementById('quiz-q-text');
            var qOptions = document.getElementById('quiz-options');
            var qFeedback = document.getElementById('quiz-feedback');
            var vid = document.getElementById('av-vid');

            overlay.style.display = 'flex';
            qFeedback.style.display = 'none';

            var questions = (sec.questions && sec.questions.length > 0)
                ? sec.questions
                : (sec.understanding_quiz ? [sec.understanding_quiz] : []);
            var qIdx = 0;

            function showQuestion(qi) {
                var q = questions[qi];
                if (!q) {
                    overlay.style.display = 'none';
                    timers.push(setTimeout(function () {
                        if (curSec < SECTIONS.length - 1) loadSection(curSec + 1);
                    }, 600));
                    return;
                }
                qLabel.textContent = 'QUESTION ' + (qi + 1) + ' / ' + questions.length;
                qText.textContent = q.question_text || q.question || '';
                qOptions.innerHTML = '';
                qFeedback.style.display = 'none';
                var clips = q.avatar_clips || {};
                playQuizClip(clips.question, function () { buildOptionButtons(q, qi); });
            }

            function playQuizClip(url, onEnd) {
                vid.onended = null;
                if (url) {
                    vid.src = getMediaSrc(url); vid.load();
                    vid.play().catch(function () { });
                    vid.onended = function () { if (onEnd) onEnd(); };
                } else {
                    timers.push(setTimeout(onEnd || function () { }, 3000));
                }
            }

            function playExplanationVisual(q) {
                var ev = q.explanation_visual;
                if (!ev) return;
                var vpath = ev.video_path;
                if (!vpath) return;
                var renderer = ev.renderer || 'manim';
                var manimLayer = document.getElementById('manim-layer');
                var manimVid = document.getElementById('manim-vid');
                var wanLayer = document.getElementById('wan-layer');
                var wanVid = document.getElementById('wan-vid');
                manimLayer.classList.remove('on');
                wanLayer.classList.remove('on');
                if (renderer === 'manim') {
                    manimVid.src = getMediaSrc(vpath); manimVid.load();
                    manimVid.play().catch(function () { });
                    manimLayer.classList.add('on');
                } else {
                    wanVid.src = getMediaSrc(vpath); wanVid.load();
                    wanVid.play().catch(function () { });
                    wanLayer.classList.add('on');
                }
            }

            function buildOptionButtons(q, qi) {
                qOptions.innerHTML = '';
                var opts = q.options || {};
                var keys = Object.keys(opts);
                var answered = false;

                keys.forEach(function (key) {
                    var btn = document.createElement('button');
                    btn.id = 'quiz-opt-' + key;
                    btn.textContent = key + ': ' + opts[key];
                    btn.style.cssText = [
                        'padding:16px 20px', 'border-radius:10px', 'cursor:pointer',
                        'font-family:\'Sora\',sans-serif', 'font-size:18px', 'text-align:left',
                        'background:#21262d', 'color:#e6edf3',
                        'border:1px solid rgba(255,255,255,0.08)', 'transition:all .25s'
                    ].join(';');
                    btn.onmouseover = function () { if (!answered) btn.style.borderColor = '#f6c44e'; };
                    btn.onmouseout = function () { if (!answered) btn.style.borderColor = 'rgba(255,255,255,0.08)'; };

                    btn.onclick = function () {
                        if (answered) return;
                        answered = true;
                        var correct = q.correct_option || q.correct || '';
                        var isRight = (key === correct);
                        keys.forEach(function (k) {
                            var b = document.getElementById('quiz-opt-' + k);
                            if (!b) return;
                            if (k === correct) {
                                b.style.background = 'rgba(126,231,135,0.14)';
                                b.style.borderColor = '#7ee787';
                                b.style.color = '#7ee787';
                            } else if (k === key && !isRight) {
                                b.style.background = 'rgba(255,107,138,0.14)';
                                b.style.borderColor = '#ff6b8a';
                                b.style.color = '#ff6b8a';
                            }
                            b.style.cursor = 'default';
                        });
                        var expl = q.explanation || '';
                        if (expl) {
                            qFeedback.style.display = 'block';
                            qFeedback.style.background = isRight ? 'rgba(126,231,135,0.07)' : 'rgba(255,107,138,0.07)';
                            qFeedback.style.borderColor = isRight ? 'rgba(126,231,135,0.25)' : 'rgba(255,107,138,0.25)';
                            qFeedback.style.color = '#e6edf3';
                            qFeedback.innerHTML = (isRight ? '✅ ' : '❌ ') + expl;
                        }
                        var clips = q.avatar_clips || {};
                        var nextClip = isRight ? clips.correct : clips.wrong;
                        playQuizClip(nextClip, function () {
                            playExplanationVisual(q);
                            playQuizClip(clips.explanation, function () {
                                timers.push(setTimeout(function () {
                                    document.getElementById('manim-layer').classList.remove('on');
                                    document.getElementById('wan-layer').classList.remove('on');
                                    qIdx++;
                                    showQuestion(qIdx);
                                }, 900));
                            });
                        });
                    };
                    qOptions.appendChild(btn);
                });
            }

            showQuestion(qIdx);
        }

        // ══════════════════════════════════════════════════════════
        // KEYBOARD
        // ══════════════════════════════════════════════════════════
        document.addEventListener('keydown', function (e) {
            if (e.key === 'ArrowRight') nextSection();
            if (e.key === 'ArrowLeft') prevSection();
            if (e.key === ' ') { e.preventDefault(); replaySection(); }
            if (e.shiftKey && (e.key === 'D' || e.key === 'd')) {
                var el = document.getElementById('dev-overlay');
                el.style.display = el.style.display === 'none' ? 'block' : 'none';
            }
        });

        // ══════════════════════════════════════════════════════════
        // GESTURE ENGINE
        // ══════════════════════════════════════════════════════════
        var _gestureModel = null, _gestureOn = false, _lastPinch = null, _lastGTime = 0, _lastGName = '';
        var _waveHist = [], _avPaused = false;
        var GESTURE_COOLDOWN = 800;

        function _initGestures() {
            if (typeof handpose === 'undefined') return;
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) return;
            navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: 320, height: 240 } })
                .then(function (stream) {
                    var cam = document.getElementById('cam-vid');
                    cam.srcObject = stream; cam.play();
                    document.getElementById('g-dot').classList.add('active');
                    document.getElementById('g-zoom').classList.add('show');
                    handpose.load().then(function (m) { _gestureModel = m; _gestureOn = true; _detectLoop(); }).catch(function () { });
                })
                .catch(function () { document.getElementById('g-dot').classList.add('denied'); });
        }
        window._initGestures = _initGestures;

        function _detectLoop() {
            if (!_gestureOn || !_gestureModel) return;
            _gestureModel.estimateHands(document.getElementById('cam-vid')).then(function (hands) {
                if (hands.length > 0) _processHand(hands[0]);
                requestAnimationFrame(_detectLoop);
            }).catch(function () { requestAnimationFrame(_detectLoop); });
        }

        function _processHand(hand) {
            var lm = hand.landmarks;
            var thumbTip = lm[4], indexTip = lm[8], wrist = lm[0];
            var pd = _dist(thumbTip, indexTip);
            if (pd < 60) { _lastPinch = pd; _showGHint('Pinch Zoom'); return; }
            _lastPinch = null;
            var up = _fingersUp(lm);
            if (up >= 4) { _fireGesture('palm', function () { _toggleAvatar(); _showGHint('Pause / Resume'); }); return; }
            if (up === 1 && (indexTip[1] - lm[5][1]) > 40) { _fireGesture('down', function () { replaySection(); _showGHint('Replay'); }); return; }
            _waveHist.push(wrist[0]);
            if (_waveHist.length > 20) _waveHist.shift();
            if (_waveHist.length >= 20) {
                var mn = Math.min.apply(null, _waveHist), mx = Math.max.apply(null, _waveHist);
                if (mx - mn > 80) { _fireGesture('wave', function () { nextSection(); _showGHint('Next'); }); _waveHist = []; }
            }
        }

        function _dist(a, b) { return Math.sqrt(Math.pow(a[0] - b[0], 2) + Math.pow(a[1] - b[1], 2)); }
        function _fingersUp(lm) {
            var tips = [8, 12, 16, 20], pips = [6, 10, 14, 18], c = 0;
            tips.forEach(function (t, i) { if (lm[t][1] < lm[pips[i]][1]) c++; });
            return c;
        }
        function _fireGesture(name, fn) {
            var now = Date.now();
            if (name === _lastGName && now - _lastGTime < GESTURE_COOLDOWN) return;
            _lastGName = name; _lastGTime = now; fn();
        }
        function _toggleAvatar() {
            var v = document.getElementById('av-vid');
            _avPaused = !_avPaused;
            if (_avPaused) v.pause(); else v.play().catch(function () { });
        }
        var _gLblTimer = null;
        function _showGHint(txt) {
            var el = document.getElementById('g-lbl');
            el.textContent = txt; el.classList.add('show');
            clearTimeout(_gLblTimer);
            _gLblTimer = setTimeout(function () { el.classList.remove('show'); }, 1500);
        }

        // ══════════════════════════════════════════════════════════
        // TOUCH
        // ══════════════════════════════════════════════════════════
        (function () {
            var el = document.getElementById('main');
            var sx = 0, sy = 0, st = 0;
            el.addEventListener('touchstart', function (e) {
                sx = e.touches[0].clientX; sy = e.touches[0].clientY; st = Date.now();
            }, { passive: true });
            el.addEventListener('touchend', function (e) {
                var dx = e.changedTouches[0].clientX - sx;
                var dy = e.changedTouches[0].clientY - sy;
                var dt = Date.now() - st;
                if (dt < 300 && Math.abs(dx) < 12 && Math.abs(dy) < 12) { _toggleAvatar(); return; }
                if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
                    if (dx < 0) nextSection(); else replaySection();
                }
            }, { passive: true });
            var lastTD = null;
            el.addEventListener('touchmove', function (e) {
                if (e.touches.length === 2) {
                    var td = Math.hypot(
                        e.touches[0].clientX - e.touches[1].clientX,
                        e.touches[0].clientY - e.touches[1].clientY
                    );
                    lastTD = td;
                }
            }, { passive: true });
            el.addEventListener('touchend', function (e) { if (e.touches.length < 2) lastTD = null; }, { passive: true });
        })();

        // ══════════════════════════════════════════════════════════
        // UTILITY
        // ══════════════════════════════════════════════════════════
        function esc(str) {
            if (!str) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        // ══════════════════════════════════════════════════════════
        // DEV MODE
        // ══════════════════════════════════════════════════════════
        window.SUB_CONFIG = { mode: 'karaoke' };

        document.getElementById('dev-sim').addEventListener('input', function (e) {
            document.getElementById('dev-sim-val').textContent = e.target.value;
            if (window.avWebGL && window.avWebGL.material) window.avWebGL.material.uniforms.similarity.value = parseFloat(e.target.value);
        });
        document.getElementById('dev-smo').addEventListener('input', function (e) {
            document.getElementById('dev-smo-val').textContent = e.target.value;
            if (window.avWebGL && window.avWebGL.material) window.avWebGL.material.uniforms.smoothness.value = parseFloat(e.target.value);
        });
        document.getElementById('dev-intro').addEventListener('input', function (e) {
            document.getElementById('dev-intro-val').textContent = e.target.value;
            var ov = document.getElementById('av-overlay');
            if (ov.getAttribute('data-sectype') === 'intro') {
                ov.style.height = e.target.value + 'vh';
                window.dispatchEvent(new Event('resize'));
            } else {
                ov.style.removeProperty('height');
            }
        });
        document.getElementById('dev-cont').addEventListener('input', function (e) {
            document.getElementById('dev-cont-val').textContent = e.target.value;
            var ov = document.getElementById('av-overlay');
            if (ov.getAttribute('data-sectype') !== 'intro') {
                ov.style.height = e.target.value + 'vh';
                window.dispatchEvent(new Event('resize'));
            } else {
                ov.style.removeProperty('height');
            }
        });
        document.getElementById('dev-three').addEventListener('input', function (e) {
            document.getElementById('dev-three-val').textContent = e.target.value;
            var tl = document.getElementById('manim-layer');
            if (tl) { tl.style.transformOrigin = 'center'; tl.style.transform = 'scale(' + e.target.value + ')'; }
        });
        document.getElementById('dev-raw').addEventListener('change', function (e) {
            var cvs = document.getElementById('av-canvas');
            var vid = document.getElementById('av-vid');
            if (e.target.checked) {
                cvs.style.opacity = '0';
                vid.style.opacity = '1';
                vid.style.width = '100%';
                vid.style.height = '100%';
                vid.style.position = 'absolute';
                vid.style.top = '0';
                vid.style.left = '0';
            } else {
                cvs.style.opacity = '1';
                vid.style.opacity = '0.01';
                vid.style.width = '1px';
                vid.style.height = '1px';
            }
        });
        document.getElementById('dev-sub-size').addEventListener('input', function (e) {
            document.getElementById('dev-sub-size-val').textContent = e.target.value;
            var style = document.createElement('style');
            style.innerHTML = '.sub-word, .subtitle-text { font-size: ' + e.target.value + 'px !important; }';
            document.head.appendChild(style);
        });
        document.getElementById('dev-sub-pos').addEventListener('input', function (e) {
            document.getElementById('dev-sub-pos-val').textContent = e.target.value;
            document.getElementById('subtitle-overlay').style.bottom = e.target.value + 'px';
        });
        document.getElementById('dev-sub-width').addEventListener('input', function (e) {
            document.getElementById('dev-sub-width-val').textContent = e.target.value;
            document.getElementById('subtitle-overlay').style.width = e.target.value + '%';
        });
        document.getElementById('dev-sub-mode').addEventListener('change', function (e) {
            window.SUB_CONFIG.mode = e.target.value;
            if (e.target.value === 'off') {
                document.getElementById('subtitle-overlay').style.display = 'none';
            }
        });

    </script>
</body>
