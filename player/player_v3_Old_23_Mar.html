<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>V3 Player</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=JetBrains+Mono:wght@400;600&family=Sora:wght@300;400;500;600;700&display=swap');

        :root {
            --bg: #0d1117;
            --surf: #161b22;
            --surf2: #21262d;
            --border: rgba(255, 255, 255, 0.07);
            --w: #e6edf3;
            --dim: rgba(230, 237, 243, 0.42);
            --gold: #f6c44e;
            --amber: #ff9f43;
            --teal: #00d2b4;
            --rose: #ff6b8a;
            --sky: #79c0ff;
            --lav: #b8a9ff;
            --grn: #7ee787;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        html,
        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: var(--bg);
            color: var(--w);
            font-family: 'Sora', sans-serif
        }

        /* ── LAYOUT ── */
        #app {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column
        }

        #topbar {
            height: 48px;
            background: rgba(10, 14, 20, .97);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 12px;
            flex-shrink: 0;
            z-index: 20;
            display: none
        }

        #main {
            flex: 1;
            position: relative;
            overflow: hidden
        }

        #botbar {
            height: 60px;
            background: rgba(8, 12, 18, .98);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 18px;
            gap: 12px;
            flex-shrink: 0;
            z-index: 20;
            display: none
        }

        /* ── TOPBAR ── */
        .tb-badge {
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            letter-spacing: .14em;
            padding: 3px 8px;
            border-radius: 4px;
            text-transform: uppercase
        }

        .tb-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--w)
        }

        .tb-sec-name {
            font-size: 14px;
            color: var(--dim);
            margin-left: 4px
        }

        .tb-dots {
            display: flex;
            gap: 5px;
            margin-left: auto;
            align-items: center
        }

        .tb-dot {
            height: 5px;
            border-radius: 3px;
            cursor: pointer;
            transition: all .35s;
            background: rgba(255, 255, 255, .1)
        }

        .tb-dot.past {
            background: rgba(246, 196, 78, .35);
            width: 16px
        }

        .tb-dot.cur {
            background: var(--gold);
            width: 28px
        }

        .tb-dot.future {
            width: 16px
        }

        /* ── BADGE COLOURS ── */
        .badge-intro {
            background: rgba(246, 196, 78, .15);
            color: var(--gold);
            border: 1px solid rgba(246, 196, 78, .25)
        }

        .badge-summary {
            background: rgba(121, 192, 255, .12);
            color: var(--sky);
            border: 1px solid rgba(121, 192, 255, .2)
        }

        .badge-content {
            background: rgba(0, 210, 180, .12);
            color: var(--teal);
            border: 1px solid rgba(0, 210, 180, .2)
        }

        .badge-example {
            background: rgba(184, 169, 255, .12);
            color: var(--lav);
            border: 1px solid rgba(184, 169, 255, .2)
        }

        .badge-memory {
            background: rgba(255, 107, 138, .12);
            color: var(--rose);
            border: 1px solid rgba(255, 107, 138, .2)
        }

        .badge-recap {
            background: rgba(126, 231, 135, .12);
            color: var(--grn);
            border: 1px solid rgba(126, 231, 135, .2)
        }

        .badge-quiz {
            background: rgba(255, 107, 138, .12);
            color: var(--rose);
            border: 1px solid rgba(255, 107, 138, .2)
        }

        /* ── LAYER STACK ── */
        /* Layer 1: WAN/LTX video — renderer:video */
        #wan-layer {
            position: absolute;
            inset: 0;
            z-index: 1;
            display: none
        }

        #wan-layer.on {
            display: block
        }

        #wan-vid {
            width: 100%;
            height: 100%;
            object-fit: cover
        }

        /* Layer 2: Manim video — renderer:manim */
        #manim-layer {
            position: absolute;
            inset: 0;
            z-index: 2;
            display: none
        }

        #manim-layer.on {
            display: block;
            z-index: 4
                /* above .scene (z:3) so video is not blocked by HTML layer */
        }

        #manim-vid {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #0d1117
        }

        /* Layer 4: Source image / infographic overlay — z:5 sits above manim video */
        #image-layer {
            position: absolute;
            inset: 0;
            z-index: 5;
            display: none;
            align-items: center;
            justify-content: center;
            background: #0d1117;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        #image-layer.on {
            display: flex;
        }

        #image-layer.vis {
            opacity: 1;
        }

        #image-display {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: block;
        }

        /* Mobile: avatar smaller on non-intro sections */
        @media (max-width: 640px) {
            #av-overlay:not([data-sectype="intro"]) {
                bottom: 62px !important;
                right: 8px !important;
                height: 38vh !important;
            }

            #av-overlay[data-sectype="intro"] {
                height: 65vh !important;
            }

            #quiz-question-card {
                padding: 16px 14px !important;
            }

            #quiz-q-text {
                font-size: 17px !important;
            }

            #quiz-options {
                grid-template-columns: 1fr !important;
            }
        }

        @media (max-width: 400px) {
            #av-overlay:not([data-sectype="intro"]) {
                height: 30vh !important;
                right: 4px !important;
            }
        }


        #subtitle-overlay {
            position: fixed;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            width: 75%;
            max-width: 860px;
            text-align: center;
            pointer-events: none;
            z-index: 65;
            /* z:65 — above avatar overlay (z:60) always */
            display: none;
            padding: 4px 8px;
            background: rgba(0, 0, 0, 0.45);
            border-radius: 8px;
        }

        @media (max-width: 600px) {
            #subtitle-overlay {
                width: 96%;
                bottom: 68px;
                font-size: 15px;
            }
        }

        /* individual word tokens */
        .sub-word {
            display: inline;
            font-size: 20px;
            font-weight: 600;
            line-height: 1.6;
            padding: 0 2px;
            transition: color 0.1s, text-shadow 0.1s;
            text-shadow:
                0 0 8px rgba(0, 0, 0, 1),
                0 0 16px rgba(0, 0, 0, 0.9),
                1px 1px 3px rgba(0, 0, 0, 1),
                -1px -1px 3px rgba(0, 0, 0, 1);
        }

        /* spoken (past/active) words */
        .sub-word.spoken {
            color: #fff;
        }

        /* currently active word = gold highlight */
        .sub-word.active {
            color: var(--gold);
            text-shadow:
                0 0 12px rgba(246, 196, 78, 0.6),
                0 0 8px rgba(0, 0, 0, 1),
                1px 1px 3px rgba(0, 0, 0, 1),
                -1px -1px 3px rgba(0, 0, 0, 1);
        }

        /* future (not yet spoken) words — dim */
        .sub-word.future {
            color: rgba(255, 255, 255, 0.4);
        }

        /* Layer 3: Scene content (intro/summary/memory/quiz etc.) */
        .scene {
            position: absolute;
            inset: 0;
            z-index: 3;
            opacity: 0;
            pointer-events: none;
            transition: opacity .55s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 28px;
            gap: 18px
        }

        .scene.on {
            opacity: 1;
            pointer-events: all
        }

        /* ── LOADING / ERROR ── */
        /* fallback .subtitle-text for non-karaoke mode */
        .subtitle-text {
            display: inline-block;
            background: transparent;
            color: #fff;
            font-size: 20px;
            line-height: 1.6;
            font-weight: 600;
            text-shadow:
                0 0 8px rgba(0, 0, 0, 1),
                0 0 16px rgba(0, 0, 0, 0.9),
                1px 1px 3px rgba(0, 0, 0, 1),
                -1px -1px 3px rgba(0, 0, 0, 1);
        }

        #loading-screen {
            position: absolute;
            inset: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            background: var(--bg)
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(246, 196, 78, .2);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin .8s linear infinite
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        .loading-text {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--dim);
            letter-spacing: .08em
        }

        #error-screen {
            position: absolute;
            inset: 0;
            z-index: 100;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            background: var(--bg)
        }

        .error-icon {
            font-size: 48px
        }

        .error-msg {
            font-size: 14px;
            color: var(--rose);
            text-align: center;
            max-width: 400px;
            line-height: 1.6
        }

        /* ── SCENES ── */
        /* INTRO */
        .intro-icon {
            font-size: 56px;
            animation: floatPulse 3s ease infinite
        }

        @keyframes floatPulse {

            0%,
            100% {
                transform: translateY(0) scale(1)
            }

            50% {
                transform: translateY(-8px) scale(1.05)
            }
        }

        .intro-title {
            font-family: 'Caveat', cursive;
            font-size: 64px;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 24px;
            text-align: center;
            line-height: 1.1;
            background: linear-gradient(135deg, var(--gold) 0%, var(--amber) 40%, var(--sky) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: riseIn .8s .2s both
        }

        .intro-sub {
            font-size: 15px;
            color: var(--dim);
            text-align: center;
            max-width: 500px;
            line-height: 1.6;
            animation: riseIn .8s .5s both
        }

        .intro-chips {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            animation: riseIn .8s .8s both
        }

        .chip {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            border: 1px solid
        }

        @keyframes riseIn {
            from {
                opacity: 0;
                transform: translateY(18px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        /* SUMMARY bullets */
        .sum-hd {
            font-family: 'Caveat', cursive;
            font-size: 28px;
            font-weight: 700;
            color: var(--gold);
            width: 100%
        }

        .sbullet {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 18px;
            border-radius: 12px;
            background: var(--surf);
            border: 1px solid var(--border);
            width: 100%;
            opacity: 0;
            transform: translateX(-16px);
            transition: all .5s
        }

        .sbullet.show {
            opacity: 1;
            transform: translateX(0)
        }

        .sbullet-n {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--gold), var(--amber));
            color: #120d00;
            font-weight: 700;
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0
        }

        .sbullet-t {
            font-size: 18px;
            color: #e6edf3;
            line-height: 1.5;
            font-weight: 500
        }

        /* MEMORY flashcards */
        .mem-hd {
            font-family: 'Caveat', cursive;
            font-size: 28px;
            color: var(--rose)
        }

        .card-scene {
            perspective: 800px;
            width: 100%;
            max-width: 460px
        }

        .card-3d {
            width: 100%;
            height: 200px;
            transform-style: preserve-3d;
            transition: transform .55s cubic-bezier(.4, 0, .2, 1);
            cursor: pointer;
            position: relative
        }

        .card-3d.flipped {
            transform: rotateY(180deg)
        }

        .card-face {
            position: absolute;
            inset: 0;
            backface-visibility: hidden;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            text-align: center
        }

        .card-front {
            background: linear-gradient(135deg, var(--surf) 0%, var(--surf2) 100%);
            border: 1px solid var(--border)
        }

        .card-back {
            background: linear-gradient(135deg, rgba(255, 107, 138, .12), rgba(0, 210, 180, .08));
            border: 1px solid rgba(255, 107, 138, .2);
            transform: rotateY(180deg)
        }

        .card-q {
            font-size: 17px;
            font-weight: 600;
            color: var(--w);
            line-height: 1.5
        }

        .card-hint {
            font-size: 11px;
            color: var(--dim);
            margin-top: 12px
        }

        .card-a {
            font-size: 16px;
            color: var(--w);
            line-height: 1.6
        }

        .card-nav {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-top: 12px
        }

        .card-pips {
            display: flex;
            gap: 6px
        }

        .cpip {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, .15);
            cursor: pointer;
            transition: all .25s
        }

        .cpip.on {
            background: var(--rose);
            transform: scale(1.3)
        }

        .cpip.done {
            background: rgba(255, 255, 255, .4)
        }

        .card-ctr {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: var(--dim);
            text-align: center
        }


        /* QUIZ */
        .quiz-card {
            background: var(--surf);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px;
            width: 100%;
            max-width: 540px
        }

        .quiz-q {
            font-size: 17px;
            font-weight: 600;
            color: var(--w);
            margin-bottom: 20px;
            line-height: 1.5;
            text-align: center
        }

        .quiz-opts {
            display: flex;
            flex-direction: column;
            gap: 10px
        }

        .quiz-opt {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 18px;
            border-radius: 10px;
            background: var(--surf2);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all .25s
        }

        .quiz-opt:hover {
            border-color: var(--sky);
            background: rgba(121, 192, 255, .08)
        }

        .quiz-opt.correct {
            border-color: var(--grn) !important;
            background: rgba(126, 231, 135, .12) !important
        }

        .quiz-opt.wrong {
            border-color: var(--rose) !important;
            background: rgba(255, 107, 138, .08) !important
        }

        .quiz-opt-lbl {
            width: 28px;
            height: 28px;
            border-radius: 7px;
            background: rgba(255, 255, 255, .06);
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0
        }

        .quiz-explanation {
            font-size: 13px;
            color: var(--dim);
            line-height: 1.6;
            text-align: center;
            margin-top: 16px;
            opacity: 0;
            transition: opacity .4s
        }

        .quiz-explanation.show {
            opacity: 1
        }

        /* ── AVATAR OVERLAY ── */
        #av-overlay {
            position: fixed;
            z-index: 60;
            background: transparent;
            border: none;
            box-shadow: none;
            border-radius: 0;
            overflow: visible;
            display: none;
            pointer-events: none;
            transition: height .4s, bottom .4s, left .4s, right .4s, transform .4s;
        }

        /* INTRO: avatar centred, 80vh tall */
        #av-overlay[data-sectype="intro"] {
            bottom: 0;
            left: 50%;
            right: auto;
            transform: translateX(-50%);
            height: 80vh;
            width: auto;
        }

        /* ALL OTHER sections: right side, 60vh tall */
        #av-overlay:not([data-sectype="intro"]) {
            bottom: 68px;
            right: 60px;
            left: auto;
            transform: none;
            height: 60vh;
            width: auto;
        }

        #av-overlay canvas {
            background: transparent !important;
        }

        #av-overlay video,
        #av-overlay canvas {
            width: auto;
            height: 100%;
            display: block;
            position: absolute;
            top: 0;
            right: 0;
        }

        #av-overlay .av-tag {
            display: none !important;
        }

        #av-narr {
            font-size: 10px;
            line-height: 1.55;
            color: rgba(255, 255, 255, .55);
            padding: 8px;
            background: rgba(0, 0, 0, .4);
            border-top: 1px solid rgba(255, 255, 255, .08);
            display: none
        }

        #av-overlay:hover #av-narr {
            display: block
        }

        /* ── BOTTOM BAR ── */
        .nb {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, .09);
            background: rgba(255, 255, 255, .04);
            color: var(--w);
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all .2s;
            flex-shrink: 0
        }

        .nb:hover {
            border-color: var(--gold);
            color: var(--gold)
        }

        .pb {
            width: 42px;
            height: 42px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--gold), var(--amber));
            color: #1a1000;
            font-size: 16px;
            cursor: pointer;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 4px 16px rgba(246, 196, 78, .25);
            transition: all .2s
        }

        .pb:hover {
            transform: scale(1.06)
        }

        .prog-wrap {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 5px;
            min-width: 0
        }

        .prog-meta {
            display: flex;
            justify-content: space-between;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: rgba(255, 255, 255, .3)
        }

        .prog-track {
            height: 3px;
            background: rgba(255, 255, 255, .06);
            border-radius: 2px;
            overflow: hidden
        }

        .prog-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--gold), var(--amber));
            border-radius: 2px;
            transition: width .4s
        }

        .seg-dots {
            display: flex;
            gap: 5px;
            margin-top: 2px
        }

        /* ── GESTURE HUD ── */
        #gesture-hud {
            position: fixed;
            top: 58px;
            left: 12px;
            z-index: 60;
            display: flex;
            flex-direction: column;
            gap: 5px;
            pointer-events: none
        }

        #g-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: rgba(255, 255, 255, .14);
            border: 1px solid rgba(255, 255, 255, .18);
            transition: background .3s
        }

        #g-dot.active {
            background: var(--teal)
        }

        #g-dot.denied {
            background: var(--rose)
        }

        #g-lbl {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: var(--gold);
            background: rgba(0, 0, .65);
            padding: 3px 8px;
            border-radius: 4px;
            opacity: 0;
            transition: opacity .25s;
            white-space: nowrap
        }

        #g-lbl.show {
            opacity: 1
        }

        #g-zoom {
            font-size: 9px;
            color: rgba(230, 237, 243, .38);
            font-family: 'JetBrains Mono', monospace;
            background: rgba(0, 0, 0, .4);
            padding: 2px 6px;
            border-radius: 3px;
            opacity: 0;
            transition: opacity .3s
        }

        #g-zoom.show {
            opacity: 1
        }

        #cam-vid {
            position: fixed;
            bottom: -9999px;
            left: -9999px;
            width: 320px;
            height: 240px
        }
    </style>
    <!-- THREE.JS used for avatar green-screen (chroma key) WebGL shader only -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- TF HandPose: async, gesture controls silently disabled if camera denied -->
    <script>
        (function () {
            var s = document.createElement('script');
            s.src = 'https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.11.0/dist/tf.min.js';
            s.onload = function () {
                var s2 = document.createElement('script');
                s2.src = 'https://cdn.jsdelivr.net/npm/@tensorflow-models/handpose@0.0.7/dist/handpose.min.js';
                s2.onload = function () { window._handposeReady = true; if (window._initGestures) window._initGestures(); };
                document.head.appendChild(s2);
            };
            document.head.appendChild(s);
        })();
    </script>
</head>

<body>
    <div id="app">

        <!-- MOBILE TAP TO START -->
        <div id="tap-to-start" style="
            display:none; position:fixed; inset:0; z-index:200;
            background:rgba(13,17,23,0.92); flex-direction:column;
            align-items:center; justify-content:center; gap:16px;
            font-family:'Sora',sans-serif; color:#e6edf3;
