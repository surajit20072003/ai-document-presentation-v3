        // ══════════════════════════════════════════════════════════
        // C1: PRE-BAKED QUIZ BRANCHING
        // Reads sec.questions[] → each question has avatar_clips.question/correct/wrong
        // Flow: play question clip → show buttons → on answer → play correct/wrong clip
        //       avatar.onended → next question OR loadSection(curSec+1)
        // ══════════════════════════════════════════════════════════
        function initQuizSection(sec) {
            var overlay = document.getElementById('quiz-overlay');
            var qLabel = document.getElementById('quiz-q-label');
            var qText = document.getElementById('quiz-q-text');
            var qOptions = document.getElementById('quiz-options');
            var qFeedback = document.getElementById('quiz-feedback');
            var vid = document.getElementById('av-vid');

            overlay.style.display = 'flex';
            qFeedback.style.display = 'none';

            var questions = (sec.questions && sec.questions.length > 0) ? sec.questions : (sec.understanding_quiz ? [sec.understanding_quiz] : []);
            var qIdx = 0;

            function showQuestion(qi) {
                var q = questions[qi];
                if (!q) {
                    // All questions done — hide quiz, advance section
                    overlay.style.display = 'none';
                    timers.push(setTimeout(function () {
                        if (curSec < SECTIONS.length - 1) loadSection(curSec + 1);
                    }, 600));
                    return;
                }

                qLabel.textContent = 'QUESTION ' + (qi + 1) + ' / ' + questions.length;
                qText.textContent = q.question_text || q.question || '';
                qOptions.innerHTML = '';
                qFeedback.style.display = 'none';

                // Play question avatar clip
                var clips = q.avatar_clips || {};
                playQuizClip(clips.question, function () {
                    // Avatar clip ended — reveal option buttons
                    buildOptionButtons(q, qi);
                });
            }

            function playQuizClip(url, onEnd) {
                vid.onended = null;
                if (url) {
                    vid.src = url; vid.load();
                    vid.play().catch(function () { });
                    vid.onended = function () { if (onEnd) onEnd(); };
                } else {
                    // No clip — run callback after a brief pause
                    timers.push(setTimeout(onEnd || function () { }, 3000));
                }
            }

            function buildOptionButtons(q, qi) {
                qOptions.innerHTML = '';
                var opts = q.options || {};
                var keys = Object.keys(opts);
                var answered = false;

                keys.forEach(function (key) {
                    var btn = document.createElement('button');
                    btn.id = 'quiz-opt-' + key;
                    btn.textContent = key + ': ' + opts[key];
                    btn.style.cssText = [
                        'padding:16px 20px', 'border-radius:10px', 'cursor:pointer',
                        'font-family:\'Sora\',sans-serif', 'font-size:18px', 'text-align:left',
                        'background:#21262d', 'color:#e6edf3',
                        'border:1px solid rgba(255,255,255,0.08)', 'transition:all .25s'
                    ].join(';');
                    btn.onmouseover = function () { if (!answered) btn.style.borderColor = '#f6c44e'; };
                    btn.onmouseout = function () { if (!answered) btn.style.borderColor = 'rgba(255,255,255,0.08)'; };

                    btn.onclick = function () {
                        if (answered) return;
                        answered = true;

                        var correct = q.correct_option || q.correct || '';
                        var isRight = (key === correct);

                        // Style buttons: correct=green, wrong=red
                        keys.forEach(function (k) {
                            var b = document.getElementById('quiz-opt-' + k);
                            if (!b) return;
                            if (k === correct) {
                                b.style.background = 'rgba(126,231,135,0.14)';
                                b.style.borderColor = '#7ee787';
                                b.style.color = '#7ee787';
                            } else if (k === key && !isRight) {
                                b.style.background = 'rgba(255,107,138,0.14)';
                                b.style.borderColor = '#ff6b8a';
                                b.style.color = '#ff6b8a';
                            }
                            b.style.cursor = 'default';
                        });

                        // Show explanation
                        var expl = q.explanation || '';
                        if (expl) {
                            qFeedback.style.display = 'block';
                            qFeedback.style.background = isRight
                                ? 'rgba(126,231,135,0.07)' : 'rgba(255,107,138,0.07)';
                            qFeedback.style.borderColor = isRight
                                ? 'rgba(126,231,135,0.25)' : 'rgba(255,107,138,0.25)';
                            qFeedback.style.color = '#e6edf3';
                            qFeedback.innerHTML = (isRight ? '✅ ' : '❌ ') + expl;
                        }

                        // Play correct or wrong clip → on end advance to next question
                        var clips = q.avatar_clips || {};
                        var nextClip = isRight ? clips.correct : clips.wrong;
                        playQuizClip(nextClip, function () {
                            timers.push(setTimeout(function () {
                                qIdx++;
                                showQuestion(qIdx);
                            }, 900));
                        });
                    };

                    qOptions.appendChild(btn);
                });
            }

            // Start from first question
            showQuestion(qIdx);
        }

        document.addEventListener('keydown', function (e) {
            if (e.key === 'ArrowRight') nextSection();
            if (e.key === 'ArrowLeft') prevSection();
            if (e.key === ' ') { e.preventDefault(); replaySection(); }
        });

        window.addEventListener('resize', function () {
            if (activeScene && activeScene.onResize) activeScene.onResize();
        });

        // ══════════════════════════════════════════════════════════
        // GESTURE ENGINE (HandPose) — silent fail if camera denied
        // ══════════════════════════════════════════════════════════
        var _gestureModel = null, _gestureOn = false, _lastPinch = null, _lastGTime = 0, _lastGName = '';
        var _waveHist = [], _avPaused = false;
        var GESTURE_COOLDOWN = 800;

        function _initGestures() {
            if (typeof handpose === 'undefined') return;
            // navigator.mediaDevices only available on HTTPS or localhost (secure context)
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) return;
            navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: 320, height: 240 } })
                .then(function (stream) {
                    var cam = document.getElementById('cam-vid');
                    cam.srcObject = stream; cam.play();
                    document.getElementById('g-dot').classList.add('active');
                    document.getElementById('g-zoom').classList.add('show');
                    handpose.load().then(function (m) { _gestureModel = m; _gestureOn = true; _detectLoop(); }).catch(function () { });
                })
                .catch(function () { document.getElementById('g-dot').classList.add('denied'); });
        }
        window._initGestures = _initGestures;

        function _detectLoop() {
            if (!_gestureOn || !_gestureModel) return;
            _gestureModel.estimateHands(document.getElementById('cam-vid')).then(function (hands) {
                if (hands.length > 0) _processHand(hands[0]);
                requestAnimationFrame(_detectLoop);
            }).catch(function () { requestAnimationFrame(_detectLoop); });
        }

        function _processHand(hand) {
            var lm = hand.landmarks;
            var thumbTip = lm[4], indexTip = lm[8], wrist = lm[0];
            var pd = _dist(thumbTip, indexTip);
            if (pd < 60) {
                if (_lastPinch !== null) {
                    var delta = (_lastPinch - pd) * 0.04;
                    if (activeScene && activeScene.onPinchZoom) activeScene.onPinchZoom(-delta);
                }
                _lastPinch = pd; _showGHint('Pinch Zoom'); return;
            }
            _lastPinch = null;
            var up = _fingersUp(lm);
            if (up >= 4) { _fireGesture('palm', function () { _toggleAvatar(); _showGHint('Pause / Resume'); }); return; }
            if (up === 1 && (indexTip[1] - lm[5][1]) > 40) { _fireGesture('down', function () { replaySection(); _showGHint('Replay'); }); return; }
            _waveHist.push(wrist[0]);
            if (_waveHist.length > 20) _waveHist.shift();
            if (_waveHist.length >= 20) {
                var mn = Math.min.apply(null, _waveHist), mx = Math.max.apply(null, _waveHist);
                if (mx - mn > 80) { _fireGesture('wave', function () { nextSection(); _showGHint('Next'); }); _waveHist = []; }
            }
        }

        function _dist(a, b) { return Math.sqrt(Math.pow(a[0] - b[0], 2) + Math.pow(a[1] - b[1], 2)); }
        function _fingersUp(lm) {
            var tips = [8, 12, 16, 20], pips = [6, 10, 14, 18], c = 0;
            tips.forEach(function (t, i) { if (lm[t][1] < lm[pips[i]][1]) c++; });
            return c;
        }
        function _fireGesture(name, fn) {
            var now = Date.now();
            if (name === _lastGName && now - _lastGTime < GESTURE_COOLDOWN) return;
            _lastGName = name; _lastGTime = now; fn();
        }
        function _toggleAvatar() {
            var v = document.getElementById('av-vid');
            _avPaused = !_avPaused;
            if (_avPaused) v.pause(); else v.play().catch(function () { });
        }
        var _gLblTimer = null;
        function _showGHint(txt) {
            var el = document.getElementById('g-lbl');
            el.textContent = txt; el.classList.add('show');
            clearTimeout(_gLblTimer);
            _gLblTimer = setTimeout(function () { el.classList.remove('show'); }, 1500);
        }

        // ══════════════════════════════════════════════════════════
        // TOUCH (mobile)
        // ══════════════════════════════════════════════════════════
        (function () {
            var el = document.getElementById('main');
            var sx = 0, sy = 0, st = 0;
            el.addEventListener('touchstart', function (e) { sx = e.touches[0].clientX; sy = e.touches[0].clientY; st = Date.now(); }, { passive: true });
            el.addEventListener('touchend', function (e) {
                var dx = e.changedTouches[0].clientX - sx;
                var dy = e.changedTouches[0].clientY - sy;
                var dt = Date.now() - st;
                if (dt < 300 && Math.abs(dx) < 12 && Math.abs(dy) < 12) { _toggleAvatar(); return; }
                if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
                    if (dx < 0) nextSection(); else replaySection();
                }
            }, { passive: true });
            var lastTD = null;
            el.addEventListener('touchmove', function (e) {
                if (e.touches.length === 2) {
                    var td = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                    if (lastTD !== null) {
                        var delta = (td - lastTD) * 0.025;
                        if (activeScene && activeScene.onPinchZoom) activeScene.onPinchZoom(-delta);
                    }
                    lastTD = td;
                }
            }, { passive: true });
            el.addEventListener('touchend', function (e) { if (e.touches.length < 2) lastTD = null; }, { passive: true });
        })();

        // ══════════════════════════════════════════════════════════
        // UTILITY
        // ══════════════════════════════════════════════════════════
        function esc(str) {
            if (!str) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        // ══════════════════════════════════════════════════════════
        // DEV MODE LOGIC
        // ══════════════════════════════════════════════════════════
        document.addEventListener('keydown', function (e) {
            if (e.shiftKey && (e.key === 'D' || e.key === 'd')) {
                var el = document.getElementById('dev-overlay');
                el.style.display = el.style.display === 'none' ? 'block' : 'none';
            }
        });
        document.getElementById('dev-sim').addEventListener('input', function (e) {
            document.getElementById('dev-sim-val').textContent = e.target.value;
            // Need avWebGL from global scope
            if (window.avWebGL && window.avWebGL.material) window.avWebGL.material.uniforms.similarity.value = parseFloat(e.target.value);
            // wait, avWebGL is exposed within the IIFE? Let's assume it was exposed or we rely on material... Wait, in the earlier version it was exposed!
            // I'll make sure it uses the global avWebGL
        });
        document.getElementById('dev-smo').addEventListener('input', function (e) {
            document.getElementById('dev-smo-val').textContent = e.target.value;
            if (window.avWebGL && window.avWebGL.material) window.avWebGL.material.uniforms.smoothness.value = parseFloat(e.target.value);
        });
        document.getElementById('dev-intro').addEventListener('input', function (e) {
            document.getElementById('dev-intro-val').textContent = e.target.value;
            var ov = document.getElementById('av-overlay');
            if (ov.getAttribute('data-sectype') === 'intro') {
                ov.style.height = e.target.value + 'vh';
                window.dispatchEvent(new Event('resize'));
            } else {
                ov.style.removeProperty('height');
            }
        });
        document.getElementById('dev-cont').addEventListener('input', function (e) {
            document.getElementById('dev-cont-val').textContent = e.target.value;
            var ov = document.getElementById('av-overlay');
            if (ov.getAttribute('data-sectype') !== 'intro') {
                ov.style.height = e.target.value + 'vh';
                window.dispatchEvent(new Event('resize'));
            } else {
                ov.style.removeProperty('height');
            }
        });
        document.getElementById('dev-three').addEventListener('input', function (e) {
            document.getElementById('dev-three-val').textContent = e.target.value;
            var tl = document.getElementById('threejs-layer');
            tl.style.transformOrigin = 'center';
            tl.style.transform = 'scale(' + e.target.value + ')';
        });
        document.getElementById('dev-raw').addEventListener('change', function (e) {
            var cvs = document.getElementById('av-canvas');
            var vid = document.getElementById('av-vid');
            if (e.target.checked) {
                cvs.style.opacity = '0';
                vid.style.opacity = '1';
                vid.style.width = '100%';
                vid.style.height = '100%';
                vid.style.position = 'absolute';
                vid.style.top = '0';
                vid.style.left = '0';
            } else {
                cvs.style.opacity = '1';
                vid.style.opacity = '0.01';
                vid.style.width = '1px';
                vid.style.height = '1px';
            }
        });

    </script>
</body>
