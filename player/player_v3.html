        // ── FIX 2: Crossfade avatar — stamps current frame, swaps src, fades old frame out ──
        function crossfadeAvatar(newUrl) {
            var canvasPrev = document.getElementById('av-canvas-prev');
            var canvasCur = document.getElementById('av-canvas');

            // Stamp current rendered frame into prev canvas instantly
            if (canvasCur && canvasPrev && canvasCur.width > 0 && canvasCur.height > 0) {
                canvasPrev.width = canvasCur.width;
                canvasPrev.height = canvasCur.height;
                try {
                    var ctx = canvasPrev.getContext('2d');
                    ctx.drawImage(canvasCur, 0, 0);
                } catch (e) { }
                canvasPrev.style.transition = 'opacity 0s'; // instant stamp, no animation yet
                canvasPrev.style.opacity = '1';
            }

            // Swap the live video src
            var vid = document.getElementById('av-vid');
            vid.src = getMediaSrc(newUrl);
            vid.load();
            vid.play().catch(function () { });
            applySpeed(); // restore rate after .load() reset

            // Two rAF ticks later: fade the frozen prev frame out
            requestAnimationFrame(function () {
                requestAnimationFrame(function () {
                    if (canvasPrev) {
                        canvasPrev.style.transition = 'opacity 0.45s ease';
                        canvasPrev.style.opacity = '0';
                    }
                });
            });
        }

        function loadSection(idx) {
            clearTimers();
            applySpeed(); // restore playback rate for new section
            clearBeatBlobCache(); // free previous section's blob URLs

            if (activeScene) { try { activeScene.dispose(); } catch (e) { } activeScene = null; }
            var threejsLayer = document.getElementById('threejs-layer');
            if (threejsLayer && typeof threejsLayer._pointerCleanup === 'function') {
                try { threejsLayer._pointerCleanup(); } catch (e) { }
                threejsLayer._pointerCleanup = null;
            }
            if (threejsLayer) {
                threejsLayer.classList.remove('on');
                threejsLayer.innerHTML = '';
            }

            var subtitleEl = document.getElementById('subtitle-overlay');
            if (subtitleEl) subtitleEl.style.display = 'none';
            clearKaraokeTimer();

            var imgLayer = document.getElementById('image-layer');
            if (imgLayer) { imgLayer.classList.remove('vis'); imgLayer.classList.remove('on'); }

            var manimLayer = document.getElementById('manim-layer');
            var manimVid = document.getElementById('manim-vid');

            // FIX 4a: Fade manim layer out before clearing src — avoids black flash
            if (manimVid) {
                manimVid.pause();
                if (manimLayer && manimLayer.classList.contains('on')) {
                    // Fade out, then wipe src after the transition
                    manimLayer.style.transition = 'opacity 0.3s ease';
                    manimLayer.style.opacity = '0';
                    var _ml = manimLayer, _mv = manimVid;
                    timers.push(setTimeout(function () {
                        _mv.removeAttribute('src');
                        _mv.src = '';
                        _mv.load();
                        _ml.classList.remove('on');
                        _ml.style.display = 'none';
                        _ml.style.opacity = '1';
                        _ml.style.transition = '';
                    }, 300));
                } else {
                    manimVid.removeAttribute('src');
                    manimVid.src = '';
                    manimVid.load();
                }
            }
            if (manimLayer) {
                // Only hide immediately if not currently visible (no fade needed)
                if (!manimLayer.classList.contains('on')) {
                    manimLayer.classList.remove('on');
                    manimLayer.style.display = 'none';
                }
            }

            var wanLayer = document.getElementById('wan-layer');
            var wanVid = document.getElementById('wan-vid');
            var wanPre = document.getElementById('wan-vid-pre');
            wanLayer.classList.remove('on');

            // FIX 4b: Pause wan video but keep last frame visible — src cleared by loadVideoScene
            wanVid.pause();
            // Do NOT wipe src — keeps last frame during transition; new section will overwrite it

            if (wanPre) {
                wanPre.pause();
                // Same: hold last frame, let loadVideoScene clear and swap
            }

            var prevEl = document.getElementById('scene-' + curSec);
            if (prevEl) prevEl.classList.remove('on');
            curSec = idx;
            var sec = SECTIONS[idx];
            if (!sec) return;
            var sceneEl = document.getElementById('scene-' + idx);
            if (sceneEl) sceneEl.classList.add('on');

            for (var i = 0; i < SECTIONS.length; i++) {
                var d = document.getElementById('tbd' + i);
                if (d) d.className = 'tb-dot ' + (i < idx ? 'past' : i === idx ? 'cur' : 'future');
            }

            var secType = sec.section_type || sec.type || 'content';
            document.getElementById('av-overlay').setAttribute('data-sectype', secType);
            var badge = BADGE_MAP[secType] || { label: secType.toUpperCase(), cls: 'badge-content' };
            document.getElementById('tb-secname').textContent = '/ ' + (sec.title || '');
            document.getElementById('bot-label').textContent = sec.title || '';
            document.getElementById('bot-ctr').textContent = (idx + 1) + ' / ' + SECTIONS.length;
            document.getElementById('prog-fill').style.width = ((idx + 1) / SECTIONS.length * 100) + '%';
            ['top-badge', 'bot-badge'].forEach(function (id) {
                var el = document.getElementById(id);
                if (!el) return;
                el.textContent = badge.label;
                el.className = 'tb-badge ' + badge.cls;
            });
            document.getElementById('seg-dots').innerHTML = '';

            var wrap = document.getElementById('av-overlay');
            if (secType === 'quiz') {
                wrap.setAttribute('data-sectype', 'quiz');
                wrap.style.display = 'block';
                window.dispatchEvent(new Event('resize'));
                initQuizSection(sec);
                return;
            }
            document.getElementById('quiz-overlay').style.display = 'none';

            var vid = document.getElementById('av-vid');
            vid.onended = null;
            var avatarUrl = sec.avatar_video || sec.avatar_url || sec.avatar || sec.b2_url || '';

            if (avatarUrl) {
                // FIX 2c: Crossfade to new avatar instead of hard-cutting
                crossfadeAvatar(avatarUrl);

                // FIX 5: Start preloading next section after 2s (was 5s)
                timers.push(setTimeout(function () {
                    if (curSec === idx) preloadNextSection(idx);
                }, 2000));

                // FIX 5b: Also trigger preload at 65% play progress (covers short sections)
                vid.addEventListener('timeupdate', function preloadTrigger() {
                    if (!vid.duration || !isFinite(vid.duration)) return;
                    if (vid.currentTime / vid.duration > 0.65) {
                        vid.removeEventListener('timeupdate', preloadTrigger);
                        if (curSec === idx) preloadNextSection(idx);
                    }
                });

                var sectionAtLoad = curSec;
                var _stallCheck = setInterval(function () {
                    if (curSec !== sectionAtLoad) { clearInterval(_stallCheck); return; }
                    if (!G_PLAYBACK_INTENDED) return;
                    if (vid.paused && !vid.ended && vid.readyState >= 3) {
                        vid.play().catch(function () { });
                    }
                }, 2000);
                timers.push(_stallCheck);

                vid.addEventListener('loadeddata', function resampleKey() {
                    vid.removeEventListener('loadeddata', resampleKey);
                    window.dispatchEvent(new Event('resize'));
                    if (!avWebGL || !avWebGL.material) return;
                    try {
                        var sc = document.createElement('canvas');
                        sc.width = 16; sc.height = 16;
                        var sx = sc.getContext('2d');
                        sx.drawImage(vid, 0, 0, 16, 16);
                        var px = sx.getImageData(2, 2, 1, 1).data;
                        if (px[1] > px[0] && px[1] > px[2]) {
                            avWebGL.material.uniforms.keyColor.value.setRGB(
                                px[0] / 255, px[1] / 255, px[2] / 255
                            );
                        }
                    } catch (e) { }
                });

                var _avBox = { started: false };
                vid.onplay = (function (box) { return function () { box.started = true; }; })(_avBox);
                var _ttsRealDur = sec.segment_duration_seconds || null;
                var _manimLoaded = false;
                var _videoLoaded = false; // FIX: guard against durationchange double-firing loadVideoScene

                vid.onloadedmetadata = (function (box) {
                    return function () {
                        var actualDur = (vid.duration && isFinite(vid.duration))
                            ? vid.duration
                            : (_ttsRealDur || 15);
                        var renderer = sec.renderer || 'none';
                        if (renderer === 'manim') {
                            var hasVid = sec.video_path || (sec.manim_video_paths && sec.manim_video_paths.length > 0);
                            if (hasVid) { _manimLoaded = true; loadManimScene(sec, actualDur, box); }
                        } else if (renderer === 'video' || renderer === 'wan_video' ||
                            renderer === 'text_to_video' || renderer === 'image_to_video' ||
                            sec.section_type === 'recap' ||
                            sec.section_type === 'memory_infographic') {
                            _videoLoaded = true; // FIX: mark so durationchange skips
                            loadVideoScene(sec, actualDur, box);
                        }
                        startSubtitleDriver(sec, sectionAtLoad);
                    };
                })(_avBox);

                vid.addEventListener('durationchange', (function (box, capturedSec) {
                    return function () {
                        if (!isFinite(vid.duration) || vid.duration <= 0) return;
                        var renderer = capturedSec.renderer || 'none';
                        if (renderer === 'video' || renderer === 'wan_video' ||
                            renderer === 'text_to_video' || renderer === 'image_to_video' ||
                            capturedSec.section_type === 'recap' ||
                            capturedSec.section_type === 'memory_infographic') {
                            if (_videoLoaded) return; // FIX: skip if already loaded via onloadedmetadata
                            _videoLoaded = true;
                            loadVideoScene(capturedSec, vid.duration, box);
                            return;
                        }
                        if (renderer !== 'manim') return;
                        if (_manimLoaded) return;
                        var hasVid = capturedSec.video_path || (capturedSec.manim_video_paths && capturedSec.manim_video_paths.length > 0);
                        if (!hasVid) return;
                        var prev = _ttsRealDur || 15;
                        if (Math.abs(vid.duration - prev) > 1.5) {
                            _manimLoaded = true;
                            loadManimScene(capturedSec, vid.duration, box);
                        }
                    };
                })(_avBox, sec), { once: true });

                // FIX 3: Gate transition on readyState, not fixed timeout
                vid.onended = function () {
                    if (sec.understanding_quiz || (sec.questions && sec.questions.length > 0)) {
                        initQuizSection(sec);
                        return;
                    }
                    if (curSec >= SECTIONS.length - 1) return;

                    var nextIdx = curSec + 1;
                    var nextSec = SECTIONS[nextIdx];
                    if (!nextSec) return;

                    var nextUrl = nextSec.avatar_video || nextSec.avatar_url || nextSec.avatar || nextSec.b2_url || '';
                    var preAv = document.getElementById('preload-av');
                    var filename = nextUrl ? nextUrl.split('/').pop() : '';

                    var isReady = preAv && preAv.src && filename && preAv.readyState >= 3 &&
                        preAv.src.indexOf(filename) !== -1;

                    if (isReady) {
                        // Already buffered — transition immediately, no spinner
                        loadSection(nextIdx);
                    } else {
                        // Not ready — poll every 100ms up to 2.5s, then give up and load anyway
                        var spinner = document.getElementById('video-buffering');
                        if (spinner) spinner.style.display = 'block';
                        var waited = 0;
                        var poll = setInterval(function () {
                            waited += 100;
                            var nowReady = preAv && preAv.readyState >= 3;
                            if (nowReady || waited >= 2500) {
                                clearInterval(poll);
                                if (spinner) spinner.style.display = 'none';
                                loadSection(nextIdx);
                            }
                        }, 100);
                        timers.push(poll);
                    }
                };
            } else {
                vid.src = '';
                var fallbackDur = sec.segment_duration_seconds || sec.dur || 30;
                startSubtitleDriver(sec, curSec);
                timers.push(setTimeout(function () {
                    if (sec.understanding_quiz || (sec.questions && sec.questions.length > 0)) {
                        initQuizSection(sec);
                    } else if (curSec < SECTIONS.length - 1) loadSection(curSec + 1);
                }, fallbackDur * 1000));

                var renderer = sec.renderer || 'none';
                if (renderer === 'manim') {
                    loadManimScene(sec, fallbackDur, { started: true });
                } else if (renderer === 'video' || renderer === 'wan_video' ||
                    renderer === 'text_to_video' || renderer === 'image_to_video' ||
                    sec.section_type === 'recap' ||
                    sec.section_type === 'memory_infographic') {
                    loadVideoScene(sec, fallbackDur, { started: true });
                }
            }

            document.getElementById('av-narr').textContent = sec.narration && sec.narration.full_text
                ? sec.narration.full_text.substring(0, 200) : '';

            var secType2 = sec.section_type || sec.type || 'content';
            if (secType2 === 'summary') initSummarySection(sec, idx);
            if (secType2 === 'memory') initMemorySection(sec, idx);
            if (secType2 === 'memory_infographic') initMemoryInfographicSection(sec, idx);
            if (secType2 === 'recap') initRecapSection(sec, idx);
            G_PLAYBACK_INTENDED = true;
        }

        // ══════════════════════════════════════════════════════════
        // SUBTITLES
        // ══════════════════════════════════════════════════════════
        function startSubtitleDriver(sec, sectionAtLoad) {
            if (!sec.narration || !sec.narration.segments) return;
            var segments = sec.narration.segments;
            var avEl = document.getElementById('av-vid');
            var subtitleEl = document.getElementById('subtitle-overlay');
            var textEl = document.getElementById('subtitle-text');

            var table = [];
            var accum = 0;
            for (var i = 0; i < segments.length; i++) {
                var seg = segments[i];
                var start, end, dur;
                if (seg.start_seconds !== undefined && seg.end_seconds !== undefined) {
                    start = seg.start_seconds;
                    end = seg.end_seconds;
                    dur = end - start;
                } else {
                    dur = seg.duration_seconds || seg.duration || 5;
                    start = accum;
                    end = accum + dur;
                    accum = end;
                }
                table.push({ start: start, end: end, dur: dur, text: (seg.text || '').trim() });
            }

            var lastIdx = -1;
            var myEpoch = _subtitleEpoch; // capture current epoch; invalidated when quiz starts

            function onTimeUpdate() {
                // Kill this driver if the section changed OR a quiz entry invalidated it
                if (curSec !== sectionAtLoad || _subtitleEpoch !== myEpoch) {
                    avEl.removeEventListener('timeupdate', onTimeUpdate);
                    clearKaraokeTimer();
                    subtitleEl.style.display = 'none';
                    return;
                }
                var t = avEl.currentTime;
                // Last-match-wins: find the latest segment whose start <= t
                var activeIdx = -1;
                for (var i = 0; i < table.length; i++) {
                    if (t >= table[i].start) activeIdx = i;
                }
                if (activeIdx >= 0 && activeIdx !== lastIdx) {
                    lastIdx = activeIdx;
                    var row = table[activeIdx];
                    if (row.text) {
                        renderSubtitleKaraoke(subtitleEl, textEl, row.text, row.dur, sectionAtLoad, row.start);
                    }
                }
            }
            avEl.addEventListener('timeupdate', onTimeUpdate);
        }

        function renderSubtitleKaraoke(overlay, textEl, beatText, beatDur, sectionAtLoad, beatStart) {
            if (window.SUB_CONFIG.mode === 'off') { overlay.style.display = 'none'; return; }
            if (window.SUB_CONFIG.mode === 'full') {
                textEl.className = 'subtitle-text';
                textEl.innerHTML = esc(beatText);
                overlay.style.display = 'block';
                return;
            }

            textEl.className = '';
            overlay.style.display = 'block';
            clearKaraokeTimer();

            var rawSentences = beatText.match(/[^.!?]+[.!?]*/g) || [beatText];
            var sentences = rawSentences.map(function (s) { return s.trim(); }).filter(Boolean);

            var allWords = [], wordSentIdx = [];
            sentences.forEach(function (sent, si) {
                sent.split(/\s+/).filter(Boolean).forEach(function (w) {
                    allWords.push(w); wordSentIdx.push(si);
                });
            });
            if (allWords.length === 0) return;

            // ── BETTER TIMING: use actual character count proportionally ──
            // Short words get minimum 80ms, long words get proportional time
            var totalChars = 0;
            var charCounts = allWords.map(function (w) {
                var c = Math.max(w.replace(/[^a-zA-Z]/g, '').length, 2);
                // Add pause weight for punctuation
                if (w.match(/[,;]/)) c += 4;
                if (w.match(/[.!?]/)) c += 8;
                totalChars += c;
                return c;
            });

            // Build cumulative time offsets from beatStart
            // Add a small lead offset so words appear just BEFORE they're spoken
            var LEAD_MS = (window.SUB_LEAD_MS !== undefined) ? window.SUB_LEAD_MS : 80;
            var cursor = 0;
            var wordTimes = charCounts.map(function (c) {
                var s = beatStart + (cursor / totalChars) * beatDur - (LEAD_MS / 1000);
                cursor += c;
                var e = beatStart + (cursor / totalChars) * beatDur - (LEAD_MS / 1000);
                return { start: s, end: e };
            });

            var lastWordIdx = -1, lastSentIdx = -1;
            var myKaraokeEpoch = _subtitleEpoch;

            function renderSentence(si, activeWordInAll) {
                var sentWords = [];
                allWords.forEach(function (w, i) { if (wordSentIdx[i] === si) sentWords.push({ w: w, gi: i }); });
                var html = sentWords.map(function (obj) {
                    return '<span class="sub-word future" id="kw-' + obj.gi + '">' + esc(obj.w) + '</span>';
                }).join(' ');
                textEl.innerHTML = html;
                sentWords.forEach(function (obj) {
                    var el = document.getElementById('kw-' + obj.gi);
                    if (!el) return;
                    if (obj.gi < activeWordInAll) el.className = 'sub-word spoken';
                    else if (obj.gi === activeWordInAll) el.className = 'sub-word active';
                    else el.className = 'sub-word future';
                });
            }

            // ── Use timeupdate instead of setInterval for better sync ──
            var avVid = document.getElementById('av-vid');

            function onKaraokeTimeUpdate() {
                if (curSec !== sectionAtLoad || _subtitleEpoch !== myKaraokeEpoch) {
                    avVid.removeEventListener('timeupdate', onKaraokeTimeUpdate);
                    return;
                }
                var t = avVid.currentTime;

                // Find active word by time
                var wordIdx = -1;
                for (var k = 0; k < wordTimes.length; k++) {
                    if (t >= wordTimes[k].start) {
                        wordIdx = k;
                    } else {
                        break;
                    }
                }
                if (wordIdx < 0) wordIdx = 0;
                if (wordIdx >= allWords.length) wordIdx = allWords.length - 1;

                var sentIdx = wordSentIdx[wordIdx];

                if (sentIdx !== lastSentIdx) {
                    lastSentIdx = sentIdx;
                    lastWordIdx = -1;
                    renderSentence(sentIdx, wordIdx);
                } else if (wordIdx !== lastWordIdx) {
                    var prev = document.getElementById('kw-' + lastWordIdx);
                    if (prev) prev.className = 'sub-word spoken';
                    var cur = document.getElementById('kw-' + wordIdx);
                    if (cur) cur.className = 'sub-word active';
                }
                lastWordIdx = wordIdx;
            }

            avVid.addEventListener('timeupdate', onKaraokeTimeUpdate);

            // Store cleanup reference on _karaokeTimer as a sentinel
            _karaokeTimer = {
                _cleanup: function () {
                    avVid.removeEventListener('timeupdate', onKaraokeTimeUpdate);
                }
            };
        }

        // ══════════════════════════════════════════════════════════
        // VIDEO SCENE LOADER
        // ══════════════════════════════════════════════════════════
        function loadVideoScene(sec, avatarDuration, _avBox) {
            if (!_avBox) _avBox = { started: true };
            var wanLayer = document.getElementById('wan-layer');
            var wanVid = document.getElementById('wan-vid');
            var imgLayer = document.getElementById('image-layer');
            var imgEl = document.getElementById('image-display');
            var avEl = document.getElementById('av-vid');
            var sectionAtLoad = curSec;

            // ── Build schedule (same logic as before) ──
            var schedule = [];
            var vbeats = sec.visual_beats || [];
            var bvp = sec.beat_video_paths || [];
            var rs = sec.render_spec || {};
            var infos = rs.infographic_beats || [];

            var infoByStart = {};
            infos.forEach(function (b) {
                if (b.start_seconds !== undefined) infoByStart[String(b.start_seconds)] = b;
            });

            // FIX: memory_infographic sections have no visual_beats —
            // build schedule directly from infographic_beats
            if (vbeats.length === 0 && infos.length > 0 && sec.renderer === 'infographic') {
                infos.forEach(function (ib) {
                    var imgSrc = ib.image_path || ib.image_source || '';
                    if (!imgSrc) return;
                    schedule.push({
                        start: ib.start_seconds || 0,
                        end: ib.end_seconds || 9999,
                        type: 'image',
                        src: imgSrc
                    });
                });
            } else if (vbeats.length > 0) {
                var vidIdx = 0;
                vbeats.forEach(function (vb) {
                    var start = vb.beat_start_seconds;
                    var end = vb.beat_end_seconds;
                    var vtype = vb.visual_type;
                    if (vtype === 'image' || vtype === 'infographic') {
                        var info = infoByStart[String(start)] || {};
                        var imgSrc = vb.image_source || info.image_source || '';
                        schedule.push({ start: start, end: end, type: 'image', src: imgSrc });
                    } else {
                        var path = vb.video_path || bvp[vidIdx] || '';
                        vidIdx++;
                        schedule.push({ start: start, end: end, type: 'video', src: path });
                    }
                });
            } else {
                var segs = (sec.narration && sec.narration.segments) ? sec.narration.segments : [];
                var flatFiles = [];
                segs.forEach(function (seg, i) {
                    var bv = (seg.beat_videos && seg.beat_videos.length > 0)
                        ? seg.beat_videos[0]
                        : (seg.video_path || bvp[i] || '');
                    flatFiles.push(bv);
                });
                if (flatFiles.every(function (f) { return !f; })) flatFiles = bvp;
                var accum = 0;
                segs.forEach(function (seg, i) {
                    var dur = seg.duration_seconds || seg.duration || 15;
                    var start = (seg.start_seconds !== undefined) ? seg.start_seconds : accum;
                    var end = start + dur;
                    accum = end;
                    schedule.push({ start: start, end: end, type: 'video', src: flatFiles[i] || '' });
                });
            }

            if (infos.length > 0) {
                infos.forEach(function (ib) {
                    if (!ib.image_source && !ib.image_path) return;
                    var ibSrc = ib.image_source || ib.image_path;
                    var ibStart = ib.start_seconds || 0;
                    var ibEnd = ib.end_seconds || 9999;
                    var replaced = false;
                    for (var si = 0; si < schedule.length; si++) {
                        if (schedule[si].type === 'video' && Math.abs(schedule[si].start - ibStart) < 1.0) {
                            schedule[si] = { start: ibStart, end: ibEnd, type: 'image', src: ibSrc };
                            replaced = true; break;
                        }
                    }
                    if (!replaced) schedule.push({ start: ibStart, end: ibEnd, type: 'image', src: ibSrc });
                });
                schedule.sort(function (a, b) { return a.start - b.start; });
            }

            if (schedule.length === 0) return;

            // ── PRE-FETCH ALL VIDEO BEATS into Blob URLs immediately ──
            // This runs in background — by the time each beat starts, it's in memory
            schedule.forEach(function (beat) {
                if (beat.type === 'video' && beat.src) {
                    preFetchBeat(beat.src, function (blobUrl) {
                        beat._blobUrl = blobUrl; // store resolved URL on the beat object
                    });
                }
            });

            wanLayer.classList.add('on');
            var currentIdx = -1;

            function showBeat(idx) {
                if (idx < 0 || idx >= schedule.length) return;
                var beat = schedule[idx];
                currentIdx = idx;

                if (beat.type === 'image') {
                    wanVid.pause();
                    if (beat.src) {
                        imgEl.src = getMediaSrc(beat.src);
                        imgLayer.classList.add('on');
                        requestAnimationFrame(function () { imgLayer.classList.add('vis'); });
                    }
                } else {
                    imgLayer.classList.remove('vis');
                    setTimeout(function () { imgLayer.classList.remove('on'); }, 440);
                    if (!beat.src) return;

                    // Use blob URL if fetch completed, otherwise fall back to direct URL
                    var playUrl = beat._blobUrl || getMediaSrc(beat.src);

                    if (wanVid.src !== playUrl) {
                        wanVid.src = playUrl;
                        wanVid.load();
                    }
                    wanVid.play().catch(function () { });
                }

                // Pre-fetch the NEXT beat while this one is starting
                var next = schedule[idx + 1];
                if (next && next.type === 'video' && next.src && !next._blobUrl) {
                    preFetchBeat(next.src, function (blobUrl) { next._blobUrl = blobUrl; });
                }
            }

            function onTimeUpdate() {
                if (curSec !== sectionAtLoad) {
                    avEl.removeEventListener('timeupdate', onTimeUpdate);
                    return;
                }
                var t = avEl.currentTime;
                var activeIdx = -1;
                for (var i = 0; i < schedule.length; i++) {
                    var isLast = (i === schedule.length - 1);
                    var hit = isLast ? (t >= schedule[i].start)
                        : (t >= schedule[i].start && t < schedule[i].end);
                    if (hit) { activeIdx = i; break; }
                }
                if (activeIdx < 0) return;

                if (activeIdx !== currentIdx) {
                    showBeat(activeIdx);
                }

                // Keep wan video in sync with avatar — restart if it stalled
                if (currentIdx >= 0 && schedule[currentIdx].type === 'video') {
                    if (wanVid.paused && !wanVid.ended && wanVid.readyState >= 3 && !avEl.paused) {
                        wanVid.play().catch(function () { });
                    }
                }
            }

            if (_avBox.started) {
                avEl.addEventListener('timeupdate', onTimeUpdate);
                showBeat(0);
            } else {
                function waitStart() {
                    if (curSec !== sectionAtLoad) return;
                    if (_avBox.started) {
                        avEl.removeEventListener('timeupdate', waitStart);
                        avEl.addEventListener('timeupdate', onTimeUpdate);
                        showBeat(0);
                    }
                }
                avEl.addEventListener('timeupdate', waitStart);
            }
        }

        // ══════════════════════════════════════════════════════════
        // MANIM BEAT LOADER
        // ══════════════════════════════════════════════════════════
        function loadManimScene(sec, avatarDuration, _avBox) {
            if (!_avBox) _avBox = { started: true };
            var manimLayer = document.getElementById('manim-layer');
            var manimVid = document.getElementById('manim-vid');
            var imgLayer = document.getElementById('image-layer');
            var imgDisplay = document.getElementById('image-display');
            var avVid = document.getElementById('av-vid');
            var sectionAtLoad = curSec;

            // FIX Bug 3: restore display so .on class can make the layer visible again
            // (loadSection sets display:none as a race-condition guard)
            if (manimLayer) manimLayer.style.display = '';

            var manimPaths = sec.manim_video_paths || (sec.video_path ? [sec.video_path] : []);
            var visualBeats = (sec.visual_beats || []).slice().sort(function (a, b) {
                return (a.beat_start_seconds || 0) - (b.beat_start_seconds || 0);
            });

            if (manimPaths.length === 0 && visualBeats.length === 0) return;

            var schedule = [];

            var rsBeats = sec.render_spec && sec.render_spec.manim_beats;
            var useRenderSpec = rsBeats && rsBeats.length > 0 && rsBeats.length >= manimPaths.length;

            if (useRenderSpec) {
                var accT = 0;
                rsBeats.forEach(function (mb, i) {
                    var dur = mb.duration || mb.duration_seconds || 15;
                    schedule.push({
                        start: accT,
                        end: accT + dur,
                        type: 'manim',
                        videoPath: manimPaths[i] || null,
                        _rsIdx: i
                    });
                    accT += dur;
                });
                visualBeats.forEach(function (vb) {
                    if ((vb.visual_type === 'image' || vb.visual_type === 'infographic') && vb.image_source) {
                        schedule.push({
                            start: vb.beat_start_seconds || 0,
                            end: vb.beat_end_seconds || 9999,
                            type: 'image',
                            imgSrc: vb.image_source
                        });
                    }
                });
                schedule.sort(function (a, b) { return a.start - b.start; });

            } else {
                var manimIdx = 0;
                schedule = visualBeats.map(function (vb) {
                    if ((vb.visual_type === 'image' || vb.visual_type === 'infographic') && vb.image_source) {
                        return {
                            start: vb.beat_start_seconds || 0,
                            end: vb.beat_end_seconds || 9999,
                            type: 'image',
                            imgSrc: vb.image_source
                        };
                    }
                    var path = vb.video_path || manimPaths[manimIdx] || null;
                    manimIdx++;
                    return {
                        start: vb.beat_start_seconds || 0,
                        end: vb.beat_end_seconds || 9999,
                        type: 'manim',
                        videoPath: path
                    };
                });

                if (schedule.length === 0 && manimPaths.length > 0) {
                    var segs = sec.narration && sec.narration.segments ? sec.narration.segments : [];
                    var accT2 = 0;
                    for (var fi = 0; fi < manimPaths.length; fi++) {
                        var dur2 = segs[fi] ? (segs[fi].duration_seconds || 15) : 15;
                        schedule.push({ start: accT2, end: accT2 + dur2, type: 'manim', videoPath: manimPaths[fi] });
                        accT2 += dur2;
                    }
                }
            }

            var infoBe = sec.render_spec && sec.render_spec.infographic_beats;
            if (infoBe && infoBe.length > 0) {
                infoBe.forEach(function (ib) {
                    if (!ib.image_source && !ib.image_path) return;
                    var ibSrc = ib.image_source || ib.image_path;
                    var ibStart = ib.start_seconds || 0;
                    var ibEnd = ib.end_seconds || 9999;
                    var already = schedule.some(function (s) {
                        return s.type === 'image' && s.imgSrc === ibSrc
                            && Math.abs(s.start - ibStart) < 0.5;
                    });
                    if (!already) {
                        schedule.push({ start: ibStart, end: ibEnd, type: 'image', imgSrc: ibSrc });
                    }
                });
                schedule.sort(function (a, b) { return a.start - b.start; });
            }

            var firstManim = null;
            for (var si = 0; si < schedule.length; si++) {
                if (schedule[si].type === 'manim' && schedule[si].videoPath) {
                    firstManim = schedule[si]; break;
                }
            }
            if (!firstManim) {
                var hasImages = schedule.some(function (s) { return s.type === 'image'; });
                if (!hasImages) return;
            } else {
                manimLayer.classList.add('on');
                manimVid.src = getMediaSrc(firstManim.videoPath);
                manimVid.load();
            }

            var currentBeatIdx = -1;

            function switchToBeat(beat) {
                if (beat.type === 'image') {
                    safeLoadImage(imgDisplay, getMediaSrc(beat.imgSrc));
                    imgLayer.classList.add('on');
                    setTimeout(function () { imgLayer.classList.add('vis'); }, 20);
                } else {
                    imgLayer.classList.remove('vis');
                    setTimeout(function () {
                        if (!imgLayer.classList.contains('vis')) imgLayer.classList.remove('on');
                    }, 420);
                    if (beat.videoPath) {
                        var newSrc = getMediaSrc(beat.videoPath);
                        if (manimVid.getAttribute('src') !== newSrc) {
                            manimVid.src = newSrc;
                            manimVid.load();
                            manimVid.play().catch(function () { });
                        }
                    }
                }
            }

            var _syncInt = setInterval(function () {
                if (curSec !== sectionAtLoad) { clearInterval(_syncInt); return; }
                if (!G_PLAYBACK_INTENDED) return;
                if (!avVid) return;
                var t = avVid.currentTime;

                var activeIdx = -1;
                for (var i = 0; i < schedule.length; i++) {
                    if (schedule[i].type === 'image' && t >= schedule[i].start && t < schedule[i].end) {
                        activeIdx = i; break;
                    }
                }
                if (activeIdx < 0) {
                    for (var j = 0; j < schedule.length; j++) {
                        if (schedule[j].type === 'manim' && t >= schedule[j].start && t < schedule[j].end) {
                            activeIdx = j; break;
                        }
                    }
                }
                if (activeIdx < 0 && schedule.length > 0) {
                    var last = schedule[schedule.length - 1];
                    if (t >= last.start) activeIdx = schedule.length - 1;
                }

                if (activeIdx >= 0 && activeIdx !== currentBeatIdx) {
                    currentBeatIdx = activeIdx;
                    switchToBeat(schedule[activeIdx]);
                }

                if (firstManim) {
                    if (!avVid.paused && manimVid.paused && !manimVid.ended && manimVid.readyState >= 2) {
                        manimVid.play().catch(function () { });
                    } else if (avVid.paused && !manimVid.paused) {
                        manimVid.pause();
                    }
                }
            }, 120);
            timers.push(_syncInt);

            var _startCheck = setInterval(function () {
                if (curSec !== sectionAtLoad) { clearInterval(_startCheck); return; }
                if (!G_PLAYBACK_INTENDED) return;
                if (_avBox.started) {
                    clearInterval(_startCheck);
                    manimVid.currentTime = 0;
                    manimVid.play().catch(function () { });
                }
            }, 50);
            timers.push(_startCheck);

            var _stallCheck = setInterval(function () {
                if (curSec !== sectionAtLoad) { clearInterval(_stallCheck); return; }
                if (!G_PLAYBACK_INTENDED) return;
                if (manimVid.paused && !manimVid.ended && manimVid.readyState >= 3 && avVid && !avVid.paused) {
                    manimVid.play().catch(function () { });
                }
            }, 2000);
            timers.push(_stallCheck);
        }

        // ══════════════════════════════════════════════════════════
        // IMAGE FALLBACK HELPER
        // ══════════════════════════════════════════════════════════
        function safeLoadImage(imgEl, baseUrl) {
            if (!imgEl || !baseUrl) return;
            var exts = ['.png', '.jpg', '.jpeg'];
            var base = baseUrl.replace(/\.(png|jpg|jpeg)$/i, '');
            var extIdx = 0;
            var origExt = (baseUrl.match(/\.(png|jpg|jpeg)$/i) || [''])[0].toLowerCase();
            if (origExt) {
                exts = [origExt].concat(exts.filter(function (e) { return e !== origExt; }));
            }
            function tryNext() {
                if (extIdx >= exts.length) return;
                imgEl.onerror = function () { extIdx++; tryNext(); };
                imgEl.src = base + exts[extIdx];
            }
            tryNext();
        }

        // ══════════════════════════════════════════════════════════
        // SECTION INITS
        // ══════════════════════════════════════════════════════════
        function initMemorySection(sec) {
            if (!sec.narration || !sec.narration.segments) return;
            var avVid = document.getElementById('av-vid');
            if (!avVid) return;
            var sectionAtLoad = curSec;
            var segments = sec.narration.segments;

            // Build timeline: each segment gets a [cardStart, flipAt, nextCardAt]
            // seg0 = intro (no card), seg1+ = one card each
            var timeline = [];
            var accum = 0;
            segments.forEach(function (seg, i) {
                var dur = seg.duration_seconds || seg.duration || 8;
                var start = accum;
                accum += dur;
                timeline.push({ cardStart: start, flipAt: start + dur * 0.45, end: accum, cardIdx: i - 1 });
                // cardIdx -1 = intro seg (skip), 0+ = card index
            });

            var flippedIdx = -1, shownIdx = -1;
            var memInt = setInterval(function () {
                if (curSec !== sectionAtLoad) { clearInterval(memInt); return; }
                var t = avVid.currentTime;
                for (var j = 0; j < timeline.length; j++) {
                    var entry = timeline[j];
                    if (entry.cardIdx < 0) continue; // skip intro
                    // Show card (unflipped) at segment start
                    if (t >= entry.cardStart && shownIdx < entry.cardIdx) {
                        shownIdx = entry.cardIdx;
                        goCard(entry.cardIdx);   // showCard() inside resets flip to false
                    }
                    // Flip to answer partway through segment
                    if (t >= entry.flipAt && flippedIdx < entry.cardIdx) {
                        flippedIdx = entry.cardIdx;
                        var c3d = document.getElementById('card-3d');
                        if (c3d && !c3d.classList.contains('flipped')) {
                            c3d.classList.add('flipped');
                            cardFlipped = true;
                        }
                    }
                }
            }, 200);
            timers.push(memInt);
        }

        function initSummarySection(sec) {
            if (!sec.narration || !sec.narration.segments) return;
            var segments = sec.narration.segments;
            var sectionAtLoad = curSec;
            var avEl = document.getElementById('av-vid');

            segments.forEach(function (_, i) {
                var el = document.getElementById('sb-' + sec.section_id + '-' + i);
                if (el) el.classList.remove('show');
            });

            function onTimeUpdate() {
                if (curSec !== sectionAtLoad) {
                    avEl.removeEventListener('timeupdate', onTimeUpdate);
                    return;
                }
                var t = avEl.currentTime;
                segments.forEach(function (seg, i) {
                    var threshold = (seg.start_seconds !== undefined) ? seg.start_seconds : (i * 5);
                    if (t >= threshold) {
                        var el = document.getElementById('sb-' + sec.section_id + '-' + i);
                        if (el && !el.classList.contains('show')) el.classList.add('show');
                    }
                });
            }

            avEl.addEventListener('timeupdate', onTimeUpdate);
        }

        function initRecapSection(sec) {
            if (!sec.narration || !sec.narration.segments) return;
            var segs = sec.narration.segments;
            var sectionAtLoad = curSec;

            segs.forEach(function (_, i) {
                var el = document.getElementById('rs-' + sec.section_id + '-' + i);
                if (el) el.classList.remove('show');
            });

            var first = document.getElementById('rs-' + sec.section_id + '-0');
            if (first) first.classList.add('show');

            var beatTimes = [];
            var accum = 0;
            segs.forEach(function (seg) {
                beatTimes.push(accum);
                accum += (seg.duration_seconds || 15);
            });

            var avEl = document.getElementById('av-vid');
            function onTimeUpdate() {
                if (curSec !== sectionAtLoad) {
                    avEl.removeEventListener('timeupdate', onTimeUpdate);
                    return;
                }
                var t = avEl.currentTime;
                for (var i = 1; i < segs.length; i++) {
                    if (t >= beatTimes[i]) {
                        var el = document.getElementById('rs-' + sec.section_id + '-' + i);
                        if (el && !el.classList.contains('show')) el.classList.add('show');
                    }
                }
            }
            avEl.addEventListener('timeupdate', onTimeUpdate);
        }

        // ══════════════════════════════════════════════════════════
        // QUIZ INTERACTION
        // ══════════════════════════════════════════════════════════
        function selectQuizOpt(secId, key) {
            var sec = SECTIONS.find(function (s) { return s.section_id === secId || String(s.section_id) === String(secId); });
            if (!sec) return;
            var quiz = sec.understanding_quiz || {};
            var correctKey = quiz.correct;
            var opts = document.querySelectorAll('[id^="qopt-' + secId + '-"]');
            opts.forEach(function (el) {
                el.onclick = null;
                var k = el.id.split('-').pop();
                if (k === correctKey) el.classList.add('correct');
                else if (k === key) el.classList.add('wrong');
            });
            var exp = document.getElementById('qexp-' + secId);
            if (exp) exp.classList.add('show');
        }

        // ══════════════════════════════════════════════════════════
        // FLASHCARD STATE
        // ══════════════════════════════════════════════════════════
        var cardIdx = 0, cardFlipped = false, FLASHCARDS_CUR = [];

        function flipCard() {
            cardFlipped = !cardFlipped;
            var el = document.getElementById('card-3d');
            if (el) el.classList.toggle('flipped', cardFlipped);
        }
        function nextCard() { if (cardIdx < FLASHCARDS_CUR.length - 1) { cardIdx++; showCard(); } }
        function prevCard() { if (cardIdx > 0) { cardIdx--; showCard(); } }
        function goCard(i) { cardIdx = i; showCard(); }
        function showCard() {
            var fc = FLASHCARDS_CUR[cardIdx];
            if (!fc) return;
            var qEl = document.getElementById('card-q'), aEl = document.getElementById('card-a');
            if (qEl) qEl.textContent = fc.q || '';
            if (aEl) aEl.innerHTML = fc.a || '';
            var c3d = document.getElementById('card-3d');
            if (c3d) c3d.classList.remove('flipped');
            cardFlipped = false;
            var ctr = document.getElementById('card-ctr');
            if (ctr) ctr.textContent = (cardIdx + 1) + ' of ' + FLASHCARDS_CUR.length;
            var pips = document.getElementById('card-pips');
            if (!pips) return;
            for (var i = 0; i < pips.children.length; i++) {
                pips.children[i].className = 'cpip' + (i === cardIdx ? ' on' : i < cardIdx ? ' done' : '');
            }
        }

        // ══════════════════════════════════════════════════════════
        // NAVIGATION
        // ══════════════════════════════════════════════════════════
        function replaySection() { loadSection(curSec); }
        function nextSection() { if (curSec < SECTIONS.length - 1) loadSection(curSec + 1); }
        function prevSection() { if (curSec > 0) loadSection(curSec - 1); }

        function togglePlayPause() {
            var avVid = document.getElementById('av-vid');
            var wanVid = document.getElementById('wan-vid');
            var manimVid = document.getElementById('manim-vid');
            var btn = document.getElementById('play-pause-btn');
            if (!avVid) return;
            // Use G_PLAYBACK_INTENDED as source of truth so button works
            // even during explanation clips where avVid may have ended.
            if (!G_PLAYBACK_INTENDED) {
                avVid.play().catch(function () { });
                if (wanVid && wanVid.src && wanVid.paused) wanVid.play().catch(function () { });
                if (manimVid && manimVid.src && manimVid.paused) manimVid.play().catch(function () { });
                if (btn) btn.innerHTML = '&#10074;&#10074;';
                G_PLAYBACK_INTENDED = true;
            } else {
                avVid.pause();
                if (wanVid && !wanVid.paused) wanVid.pause();
                if (manimVid && !manimVid.paused) manimVid.pause();
                if (btn) btn.innerHTML = '&#9654;';
                G_PLAYBACK_INTENDED = false;
