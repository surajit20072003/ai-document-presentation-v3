<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>V3 Player</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=JetBrains+Mono:wght@400;600&family=Sora:wght@300;400;500;600;700&display=swap');

        :root {
            --bg: #0d1117;
            --surf: #161b22;
            --surf2: #21262d;
            --border: rgba(255, 255, 255, 0.07);
            --w: #e6edf3;
            --dim: rgba(230, 237, 243, 0.42);
            --gold: #f6c44e;
            --amber: #ff9f43;
            --teal: #00d2b4;
            --rose: #ff6b8a;
            --sky: #79c0ff;
            --lav: #b8a9ff;
            --grn: #7ee787;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        html,
        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: var(--bg);
            color: var(--w);
            font-family: 'Sora', sans-serif
        }

        /* ── LAYOUT ── */
        #app {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column
        }

        #topbar {
            height: 48px;
            background: rgba(10, 14, 20, .97);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 12px;
            flex-shrink: 0;
            z-index: 20;
            display: none
        }

        #main {
            position: absolute;
            top: 48px;
            left: 0;
            right: 0;
            bottom: 0;
            overflow: hidden
        }

        /* Desktop: 70/30 split — content left, avatar strip on right */
        @media (min-width: 641px) {
            #main {
                margin-right: 30vw;
            }
        }

        #botbar {
            height: 60px;
            background: rgba(8, 12, 18, .85);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 18px;
            gap: 12px;
            flex-shrink: 0;
            z-index: 70;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: none
        }

        /* ── TOPBAR ── */
        .tb-badge {
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            letter-spacing: .14em;
            padding: 3px 8px;
            border-radius: 4px;
            text-transform: uppercase
        }

        .tb-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--w)
        }

        .tb-sec-name {
            font-size: 14px;
            color: var(--dim);
            margin-left: 4px
        }

        .tb-dots {
            display: flex;
            gap: 5px;
            margin-left: auto;
            align-items: center
        }

        .tb-dot {
            height: 5px;
            border-radius: 3px;
            cursor: pointer;
            transition: all .35s;
            background: rgba(255, 255, 255, .1)
        }

        .tb-dot.past {
            background: rgba(246, 196, 78, .35);
            width: 16px
        }

        .tb-dot.cur {
            background: var(--gold);
            width: 28px
        }

        .tb-dot.future {
            width: 16px
        }

        /* ── BADGE COLOURS ── */
        .badge-intro {
            background: rgba(246, 196, 78, .15);
            color: var(--gold);
            border: 1px solid rgba(246, 196, 78, .25)
        }

        .badge-summary {
            background: rgba(121, 192, 255, .12);
            color: var(--sky);
            border: 1px solid rgba(121, 192, 255, .2)
        }

        .badge-content {
            background: rgba(0, 210, 180, .12);
            color: var(--teal);
            border: 1px solid rgba(0, 210, 180, .2)
        }

        .badge-example {
            background: rgba(184, 169, 255, .12);
            color: var(--lav);
            border: 1px solid rgba(184, 169, 255, .2)
        }

        .badge-memory {
            background: rgba(255, 107, 138, .12);
            color: var(--rose);
            border: 1px solid rgba(255, 107, 138, .2)
        }

        .badge-recap {
            background: rgba(126, 231, 135, .12);
            color: var(--grn);
            border: 1px solid rgba(126, 231, 135, .2)
        }

        .badge-quiz {
            background: rgba(255, 107, 138, .12);
            color: var(--rose);
            border: 1px solid rgba(255, 107, 138, .2)
        }

        /* Base layers — no inset:0, use explicit positions with gap */
        #wan-layer {
            position: absolute;
            inset: 0;
            z-index: 1;
            display: none;
            background: #000;
            overflow: hidden;
            border: none;
            border-radius: 0;
        }

        #wan-layer.on {
            display: block;
        }

        #manim-layer {
            position: absolute;
            inset: 0;
            z-index: 2;
            display: none;
            background: #000;
            overflow: hidden;
            border: none;
            border-radius: 0;
        }

        #manim-layer.on {
            display: block;
            z-index: 4;
        }

        #image-layer {
            position: absolute;
            inset: 0;
            z-index: 5;
            display: none;
            background: #0d1117;
            overflow: hidden;
            opacity: 0;
            transition: opacity 0.4s ease;
            border: none;
            border-radius: 0;
        }

        #image-layer.on {
            display: block;
        }

        #image-layer.vis {
            opacity: 1;
        }

        #wan-vid,
        #manim-vid {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            border: none;
            border-radius: 0;
            display: block;
            background: #000;
        }

        #image-display {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: center;
            border: none;
            border-radius: 0;
            display: block;
            background: #0d1117;
        }

        /* ── MOBILE — small screen general fixes (both orientations) ── */
        @media (max-width: 640px) {

            #quiz-question-card {
                padding: 16px 14px !important;
            }

            #quiz-q-text {
                font-size: 17px !important;
            }

            #quiz-options {
                grid-template-columns: 1fr !important;
            }

            #botbar {
                height: 64px !important;
                padding: 0 10px !important;
                gap: 8px !important;
            }

            .nb {
                width: 44px !important;
                height: 44px !important;
                font-size: 16px !important;
                flex-shrink: 0 !important;
            }

            .pb {
                width: 48px !important;
                height: 48px !important;
                font-size: 18px !important;
                flex-shrink: 0 !important;
            }

            #bot-badge {
                display: none !important;
            }

            #bot-label {
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                max-width: 120px;
                font-size: 10px;
            }

            #topbar {
                padding: 0 10px !important;
                gap: 8px !important;
            }

            .tb-title {
                font-size: 13px !important;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                max-width: 120px;
            }

            .tb-sec-name {
                display: none !important;
            }

            .tb-dots {
                flex-wrap: nowrap;
                overflow: hidden;
                max-width: 80px;
            }

            .tb-dot.past,
            .tb-dot.future {
                width: 10px !important;
            }

            .tb-dot.cur {
                width: 18px !important;
            }
        }

        /* ── MOBILE LANDSCAPE ONLY — avatar sizing ── */
        @media (max-width: 640px) and (orientation: landscape) {
            #av-overlay[data-sectype="intro"] {
                height: 58vh !important;
                bottom: 66px !important;
            }

            #av-overlay:not([data-sectype="intro"]) {
                height: 40vh !important;
                bottom: 68px !important;
                right: -10vw !important;
                /* keep person flush-right on mobile landscape */
            }
        }

        @media (max-width: 400px) and (orientation: landscape) {
            #av-overlay:not([data-sectype="intro"]) {
                height: 32vh !important;
                right: -8vw !important;
            }
        }

        /* ── LANDSCAPE FULLSCREEN — FIXED ────────────────────────────── */
        @media (orientation: landscape) and (max-height: 480px) {

            #topbar,
            #gesture-hud,
            #interaction-hint {
                display: none !important;
            }

            #app {
                display: block !important;
                height: 100dvh !important;
                overflow: hidden !important;
            }

            /* Botbar: fixed strip at bottom */
            #botbar {
                display: flex !important;
                position: fixed !important;
                bottom: 0 !important;
                left: 0 !important;
                right: 0 !important;
                height: 52px !important;
                padding: 0 12px !important;
                gap: 10px !important;
                background: rgba(8, 12, 18, 0.97) !important;
                border-top: 1px solid rgba(255, 255, 255, 0.07) !important;
                z-index: 100 !important;
            }

            /* Intro: avatar centred, video fills full width */
            #av-overlay[data-sectype="intro"] {
                display: block !important;
                position: fixed !important;
                bottom: 52px !important;
                left: 50% !important;
                right: auto !important;
                top: auto !important;
                transform: translateX(-50%) !important;
                height: 90dvh !important;
                width: auto !important;
                z-index: 50 !important;
            }

            /* Non-intro: avatar as right side strip — widened so transparent half goes off-screen */
            #av-overlay:not([data-sectype="intro"]) {
                display: block !important;
                position: fixed !important;
                top: 0 !important;
                bottom: 52px !important;
                right: -15vw !important;
                /* push transparent right side off-screen */
                left: auto !important;
                width: 50vw !important;
                /* wider so person lands in visible strip */
                height: auto !important;
                transform: none !important;
                z-index: 50 !important;
            }

            /* Main: fills left area, avatar strip on right */
            #main {
                position: fixed !important;
                top: 0 !important;
                left: 0 !important;
                right: var(--av-strip-w, 28vw) !important;
                bottom: 52px !important;
                width: auto !important;
                height: auto !important;
                z-index: 10 !important;
                background: #0d1117 !important;
            }

            #wan-layer.on,
            #manim-layer.on,
            #image-layer.on {
                display: block !important;
            }

            /* Subtitles: within video area, clears avatar strip */
            #subtitle-overlay {
                display: block !important;
                position: fixed !important;
                bottom: 58px !important;
                left: 10px !important;
                right: calc(var(--av-strip-w, 28vw) + 8px) !important;
                transform: none !important;
                width: auto !important;
                text-align: left !important;
                z-index: 65 !important;
            }

            .sub-word,
            .subtitle-text {
                font-size: 13px !important;
                line-height: 1.4 !important;
            }

            .nb {
                width: 36px !important;
                height: 36px !important;
            }

            .pb {
                width: 40px !important;
                height: 40px !important;
            }

            #bot-label {
                font-size: 10px !important;
                max-width: 80px !important;
                white-space: nowrap !important;
                overflow: hidden !important;
                text-overflow: ellipsis !important;
            }

            #quiz-overlay {
                z-index: 10000 !important;
                padding: 8px 12px !important;
                overflow-y: auto !important;
            }

            #quiz-options {
                grid-template-columns: 1fr 1fr !important;
            }

            #tap-to-start {
                z-index: 10001 !important;
            }
        }

        /* ── SUBTITLE OVERLAY ───────────────────────────────────────── */
        #subtitle-overlay {
            position: fixed;
            bottom: 70px;
            left: 12px;
            right: calc(30vw + 10px);
            /* clears 30vw avatar strip + 10px gap */
            transform: none;
            width: auto;
            max-width: none;
            text-align: center;
            pointer-events: none;
            z-index: 65;
            display: none;
            padding: 5px 10px;
            background: rgba(0, 0, 0, 0.55);
            border-radius: 8px;
            overflow: visible;
            max-height: none;
        }

        /* Mobile portrait — wider box, clears the 64px bottom bar */
        @media (max-width: 640px) {
            #subtitle-overlay {
                left: 8px !important;
                right: 8px !important;
                bottom: 74px;
                padding: 5px 10px;
                overflow: visible !important;
                max-height: none !important;
            }

            .sub-word,
            .subtitle-text {
                font-size: 14px !important;
                line-height: 1.55 !important;
            }
        }

        @media (max-width: 400px) {
            #subtitle-overlay {
                width: 98%;
                bottom: 72px;
            }

            .sub-word,
            .subtitle-text {
                font-size: 12px !important;
            }
        }

        /* ── UPDATED SUBTITLE CSS ── */
        .sub-word {
            display: inline;
            font-size: 20px;
            font-weight: 600;
            line-height: 1.6;
            padding: 0 2px;
            transition: color 0.1s, text-shadow 0.1s;
            color: rgba(255, 255, 255, 0.4);
            text-shadow:
                0 0 8px rgba(0, 0, 0, 1),
                1px 1px 3px rgba(0, 0, 0, 1);
        }

        .sub-word.spoken {
            display: inline;
            color: #e6edf3;
        }

        .sub-word.active {
            display: inline;
            color: var(--gold);
            text-shadow:
                0 0 12px rgba(246, 196, 78, 0.6),
                0 0 8px rgba(0, 0, 0, 1),
                1px 1px 3px rgba(0, 0, 0, 1);
        }

        .sub-word.future {
            display: inline;
            color: rgba(255, 255, 255, 0.4);
        }

        .scene {
            position: absolute;
            inset: 0;
            z-index: 3;
            opacity: 0;
            pointer-events: none;
            transition: opacity .55s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 28px;
            gap: 18px
        }

        .scene.on {
            opacity: 1;
            pointer-events: all
        }

        .subtitle-text {
            display: inline-block;
            background: transparent;
            color: #fff;
            font-size: 20px;
            line-height: 1.6;
            font-weight: 600;
            text-shadow:
                0 0 8px rgba(0, 0, 0, 1),
                0 0 16px rgba(0, 0, 0, 0.9),
                1px 1px 3px rgba(0, 0, 0, 1),
                -1px -1px 3px rgba(0, 0, 0, 1);
        }

        #loading-screen {
            position: absolute;
            inset: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            background: var(--bg)
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(246, 196, 78, .2);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin .8s linear infinite
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        .loading-text {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--dim);
            letter-spacing: .08em
        }

        #error-screen {
            position: absolute;
            inset: 0;
            z-index: 100;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            background: var(--bg)
        }

        .error-icon {
            font-size: 48px
        }

        .error-msg {
            font-size: 14px;
            color: var(--rose);
            text-align: center;
            max-width: 400px;
            line-height: 1.6
        }

        /* ── SCENES ── */
        .intro-icon {
            font-size: 56px;
            animation: floatPulse 3s ease infinite
        }

        @keyframes floatPulse {

            0%,
            100% {
                transform: translateY(0) scale(1)
            }

            50% {
                transform: translateY(-8px) scale(1.05)
            }
        }

        .intro-title {
            font-family: 'Caveat', cursive;
            font-size: 64px;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 24px;
            text-align: center;
            line-height: 1.1;
            background: linear-gradient(135deg, var(--gold) 0%, var(--amber) 40%, var(--sky) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: riseIn .8s .2s both
        }

        .intro-sub {
            font-size: 15px;
            color: var(--dim);
            text-align: center;
            max-width: 500px;
            line-height: 1.6;
            animation: riseIn .8s .5s both
        }

        .intro-chips {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            animation: riseIn .8s .8s both
        }

        .chip {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            border: 1px solid
        }

        @keyframes riseIn {
            from {
                opacity: 0;
                transform: translateY(18px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .sum-hd {
            font-family: 'Caveat', cursive;
            font-size: 28px;
            font-weight: 700;
            color: var(--gold);
            width: 100%
        }

        .sbullet {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 18px;
            border-radius: 12px;
            background: var(--surf);
            border: 1px solid var(--border);
            width: 100%;
            opacity: 0;
            transform: translateX(-16px);
            transition: all .5s
        }

        .sbullet.show {
            opacity: 1;
            transform: translateX(0)
        }

        .sbullet-n {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--gold), var(--amber));
            color: #120d00;
            font-weight: 700;
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0
        }

        .sbullet-t {
            font-size: 18px;
            color: #e6edf3;
            line-height: 1.5;
            font-weight: 500
        }

        .mem-hd {
            font-family: 'Caveat', cursive;
            font-size: 28px;
            color: var(--rose)
        }

        .card-scene {
            perspective: 800px;
            width: 100%;
            max-width: 460px
        }

        .card-3d {
            width: 100%;
            height: 200px;
            transform-style: preserve-3d;
            transition: transform .55s cubic-bezier(.4, 0, .2, 1);
            cursor: pointer;
            position: relative
        }

        .card-3d.flipped {
            transform: rotateY(180deg)
        }

        .card-face {
            position: absolute;
            inset: 0;
            backface-visibility: hidden;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            text-align: center
        }

        .card-front {
            background: linear-gradient(135deg, var(--surf) 0%, var(--surf2) 100%);
            border: 1px solid var(--border)
        }

        .card-back {
            background: linear-gradient(135deg, rgba(255, 107, 138, .12), rgba(0, 210, 180, .08));
            border: 1px solid rgba(255, 107, 138, .2);
            transform: rotateY(180deg)
        }

        .card-q {
            font-size: 17px;
            font-weight: 600;
            color: var(--w);
            line-height: 1.5
        }

        .card-hint {
            font-size: 11px;
            color: var(--dim);
            margin-top: 12px
        }

        .card-a {
            font-size: 16px;
            color: var(--w);
            line-height: 1.6
        }

        .card-nav {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-top: 12px
        }

        .card-pips {
            display: flex;
            gap: 6px
        }

        .cpip {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, .15);
            cursor: pointer;
            transition: all .25s
        }

        .cpip.on {
            background: var(--rose);
            transform: scale(1.3)
        }

        .cpip.done {
            background: rgba(255, 255, 255, .4)
        }

        .card-ctr {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: var(--dim);
            text-align: center
        }

        .quiz-card {
            background: var(--surf);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px;
            width: 100%;
            max-width: 540px
        }

        .quiz-q {
            font-size: 17px;
            font-weight: 600;
            color: var(--w);
            margin-bottom: 20px;
            line-height: 1.5;
            text-align: center
        }

        .quiz-opts {
            display: flex;
            flex-direction: column;
            gap: 10px
        }

        .quiz-opt {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 18px;
            border-radius: 10px;
            background: var(--surf2);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all .25s
        }

        .quiz-opt:hover {
            border-color: var(--sky);
            background: rgba(121, 192, 255, .08)
        }

        .quiz-opt.correct {
            border-color: var(--grn) !important;
            background: rgba(126, 231, 135, .12) !important
        }

        .quiz-opt.wrong {
            border-color: var(--rose) !important;
            background: rgba(255, 107, 138, .08) !important
        }

        .quiz-opt-lbl {
            width: 28px;
            height: 28px;
            border-radius: 7px;
            background: rgba(255, 255, 255, .06);
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0
        }

        .quiz-explanation {
            font-size: 13px;
            color: var(--dim);
            line-height: 1.6;
            text-align: center;
            margin-top: 16px;
            opacity: 0;
            transition: opacity .4s
        }

        .quiz-explanation.show {
            opacity: 1
        }

        /* ── AVATAR OVERLAY ── */
        #av-overlay {
            position: fixed;
            z-index: 60;
            background: transparent;
            border: none;
            box-shadow: none;
            border-radius: 0;
            overflow: visible;
            display: none;
            pointer-events: none;
            transition: height .4s, bottom .4s, left .4s, right .4s, transform .4s;
        }

        #av-overlay[data-sectype="intro"] {
            bottom: 0;
            left: 50%;
            right: auto;
            transform: translateX(-50%);
            height: 86vh;
            width: auto;
        }

        #av-overlay:not([data-sectype="intro"]) {
            bottom: 60px;
            right: -15vw;
            /* shift right so empty transparent side goes off-screen */
            left: auto;
            transform: none;
            height: 78vh;
            width: 50vw;
            /* wider so full video renders; person lands in visible right strip */
        }

        #av-overlay canvas {
            background: transparent !important;
        }

        /* Avatar video/canvas: full height, auto width — overflow:hidden on overlay clips it */
        #av-overlay video,
        #av-overlay canvas {
            width: auto;
            height: 100%;
            display: block;
            position: absolute;
            top: 0;
            right: 0;
        }

        /* Clip overflow so avatar never bleeds into the 70% content area */
        #av-overlay:not([data-sectype="intro"]) {
            overflow: hidden;
        }

        #av-overlay .av-tag {
            display: none !important;
        }

        #av-narr {
            font-size: 10px;
            line-height: 1.55;
            color: rgba(255, 255, 255, .55);
            padding: 8px;
            background: rgba(0, 0, 0, .4);
            border-top: 1px solid rgba(255, 255, 255, .08);
            display: none
        }

        #av-overlay:hover #av-narr {
            display: block
        }

        /* ── BOTTOM BAR ── */
        .nb {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, .09);
            background: rgba(255, 255, 255, .04);
            color: var(--w);
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all .2s;
            flex-shrink: 0
        }

        .nb:hover {
            border-color: var(--gold);
            color: var(--gold)
        }

        .pb {
            width: 42px;
            height: 42px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--gold), var(--amber));
            color: #1a1000;
            font-size: 16px;
            cursor: pointer;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 4px 16px rgba(246, 196, 78, .25);
            transition: all .2s
        }

        .pb:hover {
            transform: scale(1.06)
        }

        .prog-wrap {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 5px;
            min-width: 0
        }

        .prog-meta {
            display: flex;
            justify-content: space-between;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: rgba(255, 255, 255, .3)
        }

        .prog-track {
            height: 3px;
            background: rgba(255, 255, 255, .06);
            border-radius: 2px;
            overflow: hidden
        }

        .prog-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--gold), var(--amber));
            border-radius: 2px;
            transition: width .4s
        }

        .seg-dots {
            display: flex;
            gap: 5px;
            margin-top: 2px
        }

        /* ── GESTURE HUD ── */
        #gesture-hud {
            position: fixed;
            top: 58px;
            left: 12px;
            z-index: 60;
            display: flex;
            flex-direction: column;
            gap: 5px;
            pointer-events: none
        }

        #g-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: rgba(255, 255, 255, .14);
            border: 1px solid rgba(255, 255, 255, .18);
            transition: background .3s
        }

        #g-dot.active {
            background: var(--teal)
        }

        #g-dot.denied {
            background: var(--rose)
        }

        #g-lbl {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: var(--gold);
            background: rgba(0, 0, .65);
            padding: 3px 8px;
            border-radius: 4px;
            opacity: 0;
            transition: opacity .25s;
            white-space: nowrap
        }

        #g-lbl.show {
            opacity: 1
        }

        #g-zoom {
            font-size: 9px;
            color: rgba(230, 237, 243, .38);
            font-family: 'JetBrains Mono', monospace;
            background: rgba(0, 0, 0, .4);
            padding: 2px 6px;
            border-radius: 3px;
            opacity: 0;
            transition: opacity .3s
        }

        #g-zoom.show {
            opacity: 1
        }

        /* ── SPLIT STACK — Mobile portrait only ── */
        @media (max-width: 640px) and (orientation: portrait) {

            /* App becomes a vertical stack */
            #app {
                display: flex !important;
                flex-direction: column !important;
                height: 100dvh !important;
                overflow: hidden !important;
                justify-content: flex-start !important;
            }

            #topbar {
                flex-shrink: 0 !important;
                display: flex !important;
            }

            /* Video zone: fills remaining space, min 16:9 */
            #main {
                flex: 1 1 auto !important;
                width: 100% !important;
                min-height: 56.25vw !important;
                height: auto !important;
                position: relative !important;
            }

            #image-display {
                width: 100% !important;
                height: 100% !important;
                object-fit: contain !important;
            }

            #wan-vid {
                object-fit: contain !important;
            }

            /* Portrait: avatar fixed PiP over right side of video zone */
            #av-overlay {
                display: block !important;
                position: fixed !important;
                top: 46px !important;
                bottom: auto !important;
                right: 0 !important;
                left: auto !important;
                transform: none !important;
                height: 56.25vw !important;
                width: auto !important;
                z-index: 60 !important;
                pointer-events: none !important;
            }

            /* Override sectype-specific rules for portrait */
            #av-overlay[data-sectype="intro"] {
                display: block !important;
                position: fixed !important;
                left: 50% !important;
                right: auto !important;
                top: 46px !important;
                bottom: auto !important;
                transform: translateX(-50%) !important;
                height: 70vw !important;
                width: auto !important;
                z-index: 60 !important;
            }

            #av-overlay:not([data-sectype="intro"]) {
                display: block !important;
                position: fixed !important;
                top: 46px !important;
                bottom: auto !important;
                right: 0 !important;
                left: auto !important;
                transform: none !important;
                height: 56.25vw !important;
                width: auto !important;
                z-index: 60 !important;
            }

            /* av-dock: subtitle full width */
            #av-dock {
                flex-shrink: 0 !important;
                display: flex !important;
                align-items: stretch !important;
                min-height: 70px !important;
                background: var(--surf) !important;
                border-top: 1px solid var(--border) !important;
                border-bottom: 1px solid var(--border) !important;
                overflow: hidden !important;
                position: relative !important;
            }

            /* Subtitle repositioned inside dock */
            #av-dock #subtitle-overlay {
                position: relative !important;
                display: flex !important;
                align-items: center !important;
                bottom: auto !important;
                left: auto !important;
                right: auto !important;
                top: auto !important;
                transform: none !important;
                width: auto !important;
                max-width: none !important;
                flex: 1 !important;
                padding: 10px 14px !important;
                font-size: 14px !important;
                background: transparent !important;
                border-radius: 0 !important;
                text-align: left !important;
                overflow: visible !important;
            }

            /* Botbar anchored to bottom */
            #botbar {
                flex-shrink: 0 !important;
                display: flex !important;
                margin-top: auto !important;
            }

            /* Quiz overlay: only covers below video, above botbar */
            /* topbar=46px, video=56.25vw (16:9 of 100vw) */
            #quiz-overlay {
                top: calc(46px + 56.25vw) !important;
                bottom: 60px !important;
                left: 0 !important;
                right: 0 !important;
                border-radius: 0 !important;
                overflow-y: auto !important;
                padding: 12px 12px 12px 12px !important;
                justify-content: flex-start !important;
            }

            /* Fix PREV/SKIP nav floating over options */
            #quiz-nav {
                position: fixed !important;
                bottom: 64px !important;
                left: 0 !important;
                right: 0 !important;
                padding: 8px 14px !important;
                background: rgba(13, 17, 23, 0.97) !important;
                border-top: 1px solid rgba(255, 255, 255, 0.07) !important;
                z-index: 200 !important;
                justify-content: space-between !important;
            }

            /* Give options breathing room above the fixed nav */
            #quiz-options {
                margin-bottom: 52px !important;
            }

            /* Question text readable size */
            #quiz-q-text {
                font-size: 16px !important;
                line-height: 1.5 !important;
            }
        }
    </style>

</head>

<body>

    <script>
        // ══════════════════════════════════════════════════════════
        // V3 PLAYER — Data-driven from presentation.json
        // ══════════════════════════════════════════════════════════

        var SECTIONS = [];
        var PRESENTATION = null;
        var curSec = 0;
        var G_PLAYBACK_INTENDED = true;
        var timers = [];
        var activeScene = null;
        var _beatBlobCache = {};
        var loadedScripts = {};
        var JOB_BASE_URL = '';
        var _karaokeTimer = null;

        // ── SPEED CONTROL ──────────────────────────────────────────
        var SPEED_STEPS = [0.5, 0.75, 1, 1.25, 1.5, 1.75, 2];
        var _speedIdx = 2; // default 1×

        function cycleSpeed() {
            _speedIdx = (_speedIdx + 1) % SPEED_STEPS.length;
            applySpeed();
        }

        function applySpeed() {
            var rate = SPEED_STEPS[_speedIdx];
            var btn = document.getElementById('speed-btn');
            if (btn) btn.textContent = rate === 1 ? '1×' : rate + '×';
            // Apply to all video elements: avatar, wan content, manim content
            ['av-vid', 'wan-vid', 'manim-vid'].forEach(function (id) {
                var v = document.getElementById(id);
                if (!v) return;
                v.playbackRate = rate;
                // Attach a play-event listener (once per element) so speed is
                // auto-restored after every .load() which resets playbackRate to 1
                if (!v._speedListenerAttached) {
                    v._speedListenerAttached = true;
                    v.addEventListener('play', function () {
                        v.playbackRate = SPEED_STEPS[_speedIdx];
                    });
                }
            });
        }
        var _subtitleEpoch = 0; // incremented to kill stale subtitle drivers on quiz entry
        window.SUB_LEAD_MS = 80;
        document.addEventListener('DOMContentLoaded', function () {

        function getMediaSrc(url) {
            if (!url) return '';
            if (url.startsWith('http://') || url.startsWith('https://') || url.startsWith('blob:') || url.startsWith('/')) {

        // ══════════════════════════════════════════════════════════
        // BUFFERING TRACKER
        // ══════════════════════════════════════════════════════════
        function setupBufferingTracker() {
            var spinner = document.getElementById('video-buffering');
            var videoIds = ['av-vid', 'wan-vid', 'manim-vid'];

            videoIds.forEach(function (id) {
                var vidEl = document.getElementById(id);
                if (!vidEl) return;

                vidEl.addEventListener('waiting', function () {
                    spinner.style.display = 'block';
                    // When a CONTENT video buffers, pause av-vid so narration
                    // and subtitles freeze in sync with the stalled visual.
                    if (id !== 'av-vid' && G_PLAYBACK_INTENDED) {
                        var avVid = document.getElementById('av-vid');
                        if (avVid && !avVid.paused) {
                            avVid.pause();
                            vidEl._pausedAvForBuffer = true;
                        }
                    }
                });

                vidEl.addEventListener('playing', function () {
                    spinner.style.display = 'none';
                    // Resume av-vid if WE paused it for buffering
                    if (id !== 'av-vid' && vidEl._pausedAvForBuffer) {
                        vidEl._pausedAvForBuffer = false;
                        var avVid = document.getElementById('av-vid');
                        if (avVid && avVid.paused && G_PLAYBACK_INTENDED) {
                            avVid.play().catch(function () { });
                        }
                    }
                });

                // USING CANPLAYTHROUGH TO FIX ROUND-AND-ROUND BUFFERING
                vidEl.addEventListener('canplaythrough', function () {
                    spinner.style.display = 'none';
                });
            });
        }

        // ══════════════════════════════════════════════════════════
        // FIX 1 — Aggressive preload: buffers avatar + up to 3 content beats
        // ══════════════════════════════════════════════════════════
        function preloadNextSection(idx) {
            var next = SECTIONS[idx + 1];
            if (!next) return;

            // ── Avatar preload ──
            var nextAvUrl = next.avatar_video || next.avatar_url || next.avatar || next.b2_url || '';
            if (nextAvUrl) {
                var preAv = document.getElementById('preload-av');
                if (!preAv) {
                    preAv = document.createElement('video');
                    preAv.id = 'preload-av';
                    preAv.style.cssText = 'position:absolute;width:1px;height:1px;opacity:0;pointer-events:none;';
                    preAv.muted = true;
                    preAv.preload = 'auto';
                    preAv.crossOrigin = 'anonymous';
                    document.body.appendChild(preAv);
                }
                if (preAv.src !== getMediaSrc(nextAvUrl)) {
                    preAv.src = getMediaSrc(nextAvUrl);
                    preAv.load();
                    // Force browser to buffer beyond metadata
                    preAv.play().then(function () { preAv.pause(); preAv.currentTime = 0; }).catch(function () { });
                }
            }

            // ── Content video preload (first 3 beats, not just first) ──
            var vbeats = next.visual_beats || [];
            var bvp = next.beat_video_paths || [];
            var allPaths = [];
            vbeats.forEach(function (vb) { if (vb.video_path) allPaths.push(vb.video_path); });
            if (allPaths.length === 0) allPaths = bvp.slice(0, 3);

            allPaths.slice(0, 3).forEach(function (p, i) {
                if (!p) return;
                var preId = 'preload-vid-' + i;
                var preVid = document.getElementById(preId);
                if (!preVid) {
                    preVid = document.createElement('video');
                    preVid.id = preId;
                    preVid.style.cssText = 'position:absolute;width:1px;height:1px;opacity:0;pointer-events:none;';
                    preVid.muted = true;
                    preVid.preload = 'auto';
                    document.body.appendChild(preVid);
                }
                if (preVid.src !== getMediaSrc(p)) {
                    preVid.src = getMediaSrc(p);
                    preVid.load();
                    preVid.play().then(function () { preVid.pause(); preVid.currentTime = 0; }).catch(function () { });
                }
            });
        }

        // ══════════════════════════════════════════════════════════
        // FIX 2 — Aggressive preload: Blob URL fetch cache
        // ══════════════════════════════════════════════════════════
        // Fetch a video URL into memory as a Blob URL — eliminates network latency on playback
        function preFetchBeat(url, onReady) {
            if (!url) return;
            var fullUrl = getMediaSrc(url);
            if (_beatBlobCache[fullUrl]) { if (onReady) onReady(_beatBlobCache[fullUrl]); return; }

            fetch(fullUrl)
                .then(function (r) { return r.blob(); })
                .then(function (blob) {
                    var blobUrl = URL.createObjectURL(blob);
                    _beatBlobCache[fullUrl] = blobUrl;
                    if (onReady) onReady(blobUrl);
                })
                .catch(function () {
                    // Fetch failed (CORS etc) — fall back to direct URL
                    if (onReady) onReady(fullUrl);
                });
        }

        // Revoke all blob URLs when done with a section to free memory
        function clearBeatBlobCache() {
            Object.keys(_beatBlobCache).forEach(function (k) {
                try { URL.revokeObjectURL(_beatBlobCache[k]); } catch (e) { }
            });
            _beatBlobCache = {};
        }

        // BOOTSTRAP
        // ══════════════════════════════════════════════════════════
        (function bootstrap() {
            var params = new URLSearchParams(window.location.search);
            var jobId = params.get('job') || params.get('job_id');
            var jsonUrl = '';

            var path = window.location.pathname;
            if (path.indexOf('/player/jobs/') === 0) {
                var lastSlash = path.lastIndexOf('/');
                JOB_BASE_URL = path.substring(0, lastSlash + 1);
            }

            if (jobId) {
                jsonUrl = '/player/jobs/' + jobId + '/presentation.json?t=' + Date.now();
            } else if (JOB_BASE_URL) {
                jsonUrl = JOB_BASE_URL + 'presentation.json?t=' + Date.now();
            } else {
                jsonUrl = params.get('data') || 'presentation.json';
                if (jsonUrl && !jsonUrl.startsWith('/')) {
                    jsonUrl = getMediaSrc(jsonUrl);
                }
            }

            fetch(jsonUrl)
                .then(function (r) {
                    if (!r.ok) throw new Error('HTTP ' + r.status + ': ' + jsonUrl);
                    return r.json();
                })
                .then(function (data) {
                    PRESENTATION = data;
                    SECTIONS = data.sections || [];
                    if (SECTIONS.length === 0) throw new Error('presentation.json has no sections');
                    initPlayer();
                })
                .catch(function (err) {
                    document.getElementById('loading-screen').style.display = 'none';
                    var es = document.getElementById('error-screen');
                    es.style.display = 'flex';
                    document.getElementById('error-msg').textContent = String(err);
                });
        })();

        var avWebGL = null;

        function initAvatarWebGL() {
            var canvas = document.getElementById('av-canvas');
            var video = document.getElementById('av-vid');
            if (typeof THREE === 'undefined') {
                canvas.style.display = 'none';
                video.style.cssText = 'position:absolute;width:100%;height:100%;opacity:1;pointer-events:none;';
                return;
            }

            var renderer;
            try {
                renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true });
            } catch (e) {
                console.warn('[V3] WebGL unavailable, falling back to raw video');
                canvas.style.display = 'none';
                video.style.cssText = 'position:absolute;width:100%;height:100%;opacity:1;pointer-events:none;';
                return;
            }
            var overlay = document.getElementById('av-overlay');
            var dpr = window.devicePixelRatio || 1;
            renderer.setSize(overlay.offsetWidth, overlay.offsetHeight, false);
            renderer.setPixelRatio(dpr);

            var scene = new THREE.Scene();
            var camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

            var texture = new THREE.VideoTexture(video);
            texture.minFilter = THREE.LinearFilter;
            texture.magFilter = THREE.LinearFilter;
            texture.format = THREE.RGBAFormat;

            var keyColor = new THREE.Color(0x00b140);
            try {
                var sampleCanvas = document.createElement('canvas');
                sampleCanvas.width = 16; sampleCanvas.height = 16;
                var sctx = sampleCanvas.getContext('2d');
                sctx.drawImage(video, 0, 0, 16, 16);
                var px = sctx.getImageData(2, 2, 1, 1).data;
                if (px[1] > px[0] && px[1] > px[2]) {
                    keyColor.setRGB(px[0] / 255, px[1] / 255, px[2] / 255);
                }
            } catch (e) { }

            var material = new THREE.ShaderMaterial({
                transparent: true,
                uniforms: {
                    map: { value: texture },
                    keyColor: { value: keyColor },
                    similarity: { value: 0.15 },
                    smoothness: { value: 0.00 },
                    uCanvasAspect: { value: 1.0 },
                    uVideoAspect: { value: 9 / 16 }
                },
                vertexShader: `
                    varying vec2 vUv;
                    void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }
                `,
                fragmentShader: `
                    uniform sampler2D map;
                    uniform vec3 keyColor;
                    uniform float similarity;
                    uniform float smoothness;
                    uniform float uCanvasAspect;
                    uniform float uVideoAspect;
                    varying vec2 vUv;
                    void main() {
                        vec2 uv = vUv;
                        if (uCanvasAspect > uVideoAspect) {
                            float scale = uCanvasAspect / uVideoAspect;
                            uv.x = (uv.x - 0.5) * scale + 0.5;
                        } else {
                            float scale = uVideoAspect / uCanvasAspect;
                            uv.y = (uv.y - 0.5) * scale + 0.5;
                        }
                        vec4 videoColor = (uv.x < 0.0 || uv.x > 1.0 || uv.y < 0.0 || uv.y > 1.0) ? vec4(0.0) : texture2D(map, uv);
                        float Y1 = 0.299 * keyColor.r + 0.587 * keyColor.g + 0.114 * keyColor.b;
                        float Cr1 = keyColor.r - Y1;
                        float Cb1 = keyColor.b - Y1;
                        float Y2 = 0.299 * videoColor.r + 0.587 * videoColor.g + 0.114 * videoColor.b;
                        float Cr2 = videoColor.r - Y2;
                        float Cb2 = videoColor.b - Y2;
                        float blend = distance(vec2(Cr2, Cb2), vec2(Cr1, Cb1));
                        float alpha = smoothstep(similarity, similarity + max(smoothness, 0.001), blend);
                        gl_FragColor = vec4(videoColor.rgb * alpha, alpha);
                    }
                `,
            });

            var plane = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), material);
            scene.add(plane);

            avWebGL = { renderer: renderer, scene: scene, camera: camera, material: material };

            function animate() {
                requestAnimationFrame(animate);
                renderer.render(scene, camera);
            }
            animate();

            window.addEventListener('resize', function () {
                var ov = document.getElementById('av-overlay');
                var dpr = window.devicePixelRatio || 1;
                var h = ov.clientHeight || 356;
                var vid = document.getElementById('av-vid');
                var vw = vid.videoWidth || 1080;
                var vh = vid.videoHeight || 1920;
                var aspect = vw / vh;
                var w = h * aspect;
                ov.style.width = w + 'px';
                renderer.setSize(w, h, false);
                renderer.setPixelRatio(dpr);
                if (material) {
                    material.uniforms.uCanvasAspect.value = w / h;
                    material.uniforms.uVideoAspect.value = aspect;
                }
            });
        }

        function clearTimers() {

            timers = [];

        document.addEventListener('touchstart', function unlockAudio() {
