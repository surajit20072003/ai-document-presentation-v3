        // ══════════════════════════════════════════════════════════
        // QUIZ — BRANCHING with synced option reveals
        // ══════════════════════════════════════════════════════════
        function initQuizSection(sec) {
            var overlay = document.getElementById('quiz-overlay');
            var qLabel = document.getElementById('quiz-q-label');
            var qText = document.getElementById('quiz-q-text');
            var qOptions = document.getElementById('quiz-options');
            var qFeedback = document.getElementById('quiz-feedback');
            var vid = document.getElementById('av-vid');

            // FIX 1: Sever the main section's metadata listener so it doesn't restart the main subtitle driver
            vid.onloadedmetadata = null;

            overlay.style.display = 'flex';
            // Restore full quiz UI state on entry
            overlay.style.background = 'rgba(13,17,23,0.96)';
            var qCard = document.getElementById('quiz-question-card');
            if (qCard) qCard.style.display = 'block';
            if (qOptions) { qOptions.style.display = 'grid'; qOptions.style.opacity = '1'; }
            qFeedback.style.display = 'none';

            // Restore quiz-nav
            var qNav = document.getElementById('quiz-nav');
            if (qNav) qNav.style.display = 'flex';

            // Kill any running subtitle driver from the preceding content section
            // (curSec doesn't change on quiz entry so the normal guard won't fire)
            _subtitleEpoch++;
            clearKaraokeTimer();
            var subOverlay = document.getElementById('subtitle-overlay');
            if (subOverlay) subOverlay.style.display = 'none';

            var questions = (sec.questions && sec.questions.length > 0)
                ? sec.questions
                : (sec.understanding_quiz ? [sec.understanding_quiz] : []);
            if (questions.length === 0) {
                overlay.style.display = 'none';
                if (curSec < SECTIONS.length - 1) loadSection(curSec + 1);
                return;
            }
            var qIdx = 0;

            // ── helpers ─────────────────────────────────────────

            // playClip with optional subtitle text (karaoke-synced)
            function playClip(url, onEnd, scriptText) {
                vid.onended = null;
                _subtitleEpoch++; // kills any running karaoke from previous clip
                // Always clear karaoke before playing a new clip
                clearKaraokeTimer();

                var stText = document.getElementById('subtitle-text');
                var stOverlay = document.getElementById('subtitle-overlay');

                if (url) {
                    if (scriptText && stText && stOverlay) {
                        stText.innerHTML = ''; // clear stale words before new clip loads
                        // FIX: drive subtitle via karaoke (word-by-word) synced to clip duration
                        // rather than dumping the full paragraph as a static block
                        var _quizSubSecAtLoad = curSec;
                        vid.addEventListener('loadedmetadata', function onClipMeta() {
                            vid.removeEventListener('loadedmetadata', onClipMeta);
                            if (curSec !== _quizSubSecAtLoad) return;
                            var dur = (vid.duration && isFinite(vid.duration)) ? vid.duration : 10;
                            renderSubtitleKaraoke(stOverlay, stText, scriptText, dur, _quizSubSecAtLoad, 0);
                        });
                        stOverlay.style.display = 'block';
                    } else if (stOverlay) {
                        stOverlay.style.display = 'none';
                    }

                    vid.src = getMediaSrc(url);
                    vid.load();
                    vid.play().catch(function () { });
                    vid.onended = function () { if (onEnd) onEnd(); };
                } else {
                    if (stOverlay) stOverlay.style.display = 'none';
                    timers.push(setTimeout(onEnd || function () { }, 2000));
                }
            }

            // ── PROPER FIX: showExplanationVisual ──
            function showExplanationVisual(q) {
                var ev = q.explanation_visual;
                if (!ev) return; // Abort if no visual block exists

                // 1. Find out if we actually have a video or image path in the JSON
                var vpath = ev.video_path || ev.wan_video_path || null;
                if (!vpath && ev.image_to_video_beats && ev.image_to_video_beats.length > 0) {
                    var eb = ev.image_to_video_beats[0];
                    vpath = eb.video_path || eb.wan_video_path || null;
                }
                var imageSrc = ev.image_source || null;

                // 2. CRITICAL FIX: If we have NEITHER a video NOR an image,
                // do NOT hide the quiz UI. Leave it visible so the user can read the text!
                if (!vpath && !imageSrc) {
                    return;
                }

                // 3. If we reach here, we DEFINITELY have a video or image to show.
                // NOW we can safely hide the quiz UI for a clean background display.
                document.getElementById('quiz-overlay').style.background = 'transparent';

                var card = document.getElementById('quiz-question-card');
                if (card) card.style.display = 'none';

                var optsEl = document.getElementById('quiz-options');
                if (optsEl) optsEl.style.display = 'none';

                var feedbackEl = document.getElementById('quiz-feedback');
                if (feedbackEl) feedbackEl.style.display = 'none';

                var navEl = document.getElementById('quiz-nav');
                if (navEl) navEl.style.display = 'none';

                var subEl = document.getElementById('subtitle-overlay');
                if (subEl) subEl.style.display = 'none';
                clearKaraokeTimer();

                // 4. Reset video/image layers
                var renderer = ev.renderer || 'manim';
                var manimLayer = document.getElementById('manim-layer');
                var manimVid = document.getElementById('manim-vid');
                var wanLayer = document.getElementById('wan-layer');
                var wanVid = document.getElementById('wan-vid');
                var imgLayer = document.getElementById('image-layer');
                var imgDisplay = document.getElementById('image-display');

                manimLayer.classList.remove('on');
                wanLayer.classList.remove('on');
                imgLayer.classList.remove('vis');
                imgLayer.classList.remove('on');

                // 5. Play the video or show the fallback image
                if (vpath) {
                    if (renderer === 'manim') {
                        manimVid.src = getMediaSrc(vpath);
                        manimVid.load();
                        manimVid.oncanplay = function () {
                            manimVid.oncanplay = null;
                            manimVid.play().catch(function () { });
                            applySpeed();
                        };
                        manimLayer.style.display = ''; // FIX: clear display:none guard before activating
                        manimLayer.classList.add('on');
                    } else {
                        wanVid.src = getMediaSrc(vpath);
                        wanVid.load();
                        wanVid.oncanplay = function () {
                            wanVid.oncanplay = null;
                            wanVid.play().catch(function () { });
                            applySpeed();
                        };
                        wanLayer.classList.add('on');
                    }
                } else if (imageSrc) {
                    safeLoadImage(imgDisplay, getMediaSrc(imageSrc));
                    imgLayer.classList.add('on');
                    setTimeout(function () { imgLayer.classList.add('vis'); }, 20);
                }
            }

            // ── Restore all quiz UI after explanation finishes ──
            function restoreQuizUI() {
                clearKaraokeTimer();
                var subEl2 = document.getElementById('subtitle-overlay');
                if (subEl2) subEl2.style.display = 'none';
                document.getElementById('subtitle-text').innerHTML = '';

                document.getElementById('quiz-overlay').style.background = 'rgba(13,17,23,0.96)';

                var card = document.getElementById('quiz-question-card');
                if (card) card.style.display = 'block';

                var optsEl = document.getElementById('quiz-options');
                if (optsEl) { optsEl.style.display = 'grid'; optsEl.style.opacity = '1'; }

                // feedback stays hidden — next question will reset it
                var feedbackEl = document.getElementById('quiz-feedback');
                if (feedbackEl) feedbackEl.style.display = 'none';

                // Restore nav
                var navEl = document.getElementById('quiz-nav');
                if (navEl) navEl.style.display = 'flex';

                // Stop explanation video layers
                var mL = document.getElementById('manim-layer');
                if (mL) { mL.style.display = ''; mL.classList.remove('on'); } // FIX: clear inline style guard
                document.getElementById('wan-layer').classList.remove('on');
            }

            // ── main question renderer ───────────────────────────

            function showQuestion(qi) {
                var q = questions[qi];
                if (!q) {
                    // All questions done — restore UI, advance section
                    restoreQuizUI();
                    overlay.style.display = 'none';
                    timers.push(setTimeout(function () {
                        if (curSec < SECTIONS.length - 1) loadSection(curSec + 1);
                    }, 600));
                    return;
                }

                var quizSecAtLoad = curSec;
                qLabel.textContent = 'QUESTION ' + (qi + 1) + ' / ' + questions.length;
                qText.textContent = q.question_text || q.question || '';
                qOptions.innerHTML = '';
                qFeedback.style.display = 'none';

                var clips = q.avatar_clips || {};
                var narr = q.narration || {};
                var revealTimes = narr.option_reveal_seconds || [];
                var opts = q.options || {};
                var keys = Object.keys(opts);
                var answered = false;

                var buttons = {};
                keys.forEach(function (key) {
                    var btn = document.createElement('button');
                    btn.id = 'quiz-opt-' + key;
                    btn.textContent = key + ': ' + opts[key];
                    btn.style.cssText = [
                        'display:none', 'width:100%',
                        'padding:14px 18px', 'border-radius:10px', 'cursor:pointer',
                        'font-family:\'Sora\',sans-serif', 'font-size:17px', 'text-align:left',
                        'background:#21262d', 'color:#e6edf3',
                        'border:1px solid rgba(255,255,255,0.08)',
                        'transition:all .25s ease', 'opacity:0'
                    ].join(';');

                    btn.addEventListener('mouseover', function () {
                        if (!answered) btn.style.borderColor = '#f6c44e';
                    });
                    btn.addEventListener('mouseout', function () {
                        if (!answered) btn.style.borderColor = 'rgba(255,255,255,0.08)';
                    });

                    btn.addEventListener('click', function () {
                        if (answered) return;
                        answered = true;
                        onAnswer(key);
                    });

                    qOptions.appendChild(btn);
                    buttons[key] = btn;
                });

                function revealButton(key) {
                    var b = buttons[key];
                    if (!b || b.style.display !== 'none') return;
                    b.style.display = 'block';
                    requestAnimationFrame(function () {
                        b.style.opacity = '1';
                        b.style.transform = 'translateY(0)';
                    });
                }

                function revealAllButtons() {
                    keys.forEach(function (k) { revealButton(k); });
                }

                function onAnswer(key) {
                    var correct = q.correct_option || q.correct || '';
                    var isRight = (key === correct);

                    keys.forEach(function (k) {
                        var b = buttons[k];
                        if (!b) return;
                        if (k === correct) {
                            b.style.background = 'rgba(126,231,135,0.14)';
                            b.style.borderColor = '#7ee787';
                            b.style.color = '#7ee787';
                        } else if (k === key && !isRight) {
                            b.style.background = 'rgba(255,107,138,0.14)';
                            b.style.borderColor = '#ff6b8a';
                            b.style.color = '#ff6b8a';
                        }
                        b.style.cursor = 'default';
                        b.style.pointerEvents = 'none';
                    });

                    var expl = q.explanation || '';
                    if (expl) {
                        qFeedback.style.display = 'block';
                        qFeedback.style.background = isRight ? 'rgba(126,231,135,0.07)' : 'rgba(255,107,138,0.07)';
                        qFeedback.style.borderColor = isRight ? 'rgba(126,231,135,0.25)' : 'rgba(255,107,138,0.25)';
                        qFeedback.style.color = '#e6edf3';
                        qFeedback.innerHTML = (isRight ? '✅ ' : '❌ ') + esc(expl);
                    }

                    var nextClip = isRight ? clips.correct : clips.wrong;
                    // FIX 2: Use the _script keys present in the JSON payload
                    var nextScript = isRight ? (narr.correct_script || narr.correct) : (narr.wrong_script || narr.wrong);

                    // Step 1: Play correct/wrong clip
                    playClip(nextClip, function () {
                        if (curSec !== quizSecAtLoad) return;

                        // Step 2: Show explanation visual (hides quiz UI cleanly)
                        showExplanationVisual(q);

                        // FIX 5: Small delay before playing explanation clip so
                        // the visual layer has time to initialise (avoids race condition)
                        timers.push(setTimeout(function () {
                            if (curSec !== quizSecAtLoad) return;

                            // Step 3: Play explanation avatar clip alongside the visual
                            // Pass the explanation script to render subtitles
                            var explScript = narr.explanation_script || narr.explanation || q.explanation || '';

                            playClip(clips.explanation, function () {
                                if (curSec !== quizSecAtLoad) return;

                                // Step 4: Restore quiz UI then advance to next question
                                timers.push(setTimeout(function () {
                                    if (curSec !== quizSecAtLoad) return;
                                    restoreQuizUI();
                                    qIdx++;
                                    showQuestion(qIdx);
                                }, 900));
                            }, explScript);  // <--- Pass the text instead of null

                        }, 300)); // 300 ms delay gives video element time to load

                    }, nextScript);
                }

                // Schedule option reveals during the question clip
                keys.forEach(function (key, idx) {
                    var delay = (revealTimes[idx] !== undefined)
                        ? Math.round(revealTimes[idx] * 1000)
                        : (idx + 1) * 2500;
                    timers.push(setTimeout(function () {
                        if (curSec !== quizSecAtLoad) return;
                        revealButton(key);
                    }, delay));
                });

                // Play question clip; on end reveal any options not yet shown
                playClip(clips.question, function () {
                    if (curSec !== quizSecAtLoad) return;
                    revealAllButtons();
                }, narr.question_script || narr.question); // FIX 3: Catch the proper question script
            }

            showQuestion(qIdx);
        }

        // ══════════════════════════════════════════════════════════
        // KEYBOARD
        // ══════════════════════════════════════════════════════════
        document.addEventListener('keydown', function (e) {
            if (e.key === 'ArrowRight') nextSection();
            if (e.key === 'ArrowLeft') prevSection();
            if (e.key === ' ') { e.preventDefault(); replaySection(); }
            if (e.shiftKey && (e.key === 'D' || e.key === 'd')) {
                var el = document.getElementById('dev-overlay');
                el.style.display = el.style.display === 'none' ? 'block' : 'none';
            }
        });

        // ══════════════════════════════════════════════════════════
        // GESTURE ENGINE
        // ══════════════════════════════════════════════════════════
        var _gestureModel = null, _gestureOn = false, _lastPinch = null, _lastGTime = 0, _lastGName = '';
        var _waveHist = [], _avPaused = false;
        var GESTURE_COOLDOWN = 800;

        function _initGestures() {
            if (typeof handpose === 'undefined') return;
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) return;
            navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: 320, height: 240 } })
                .then(function (stream) {
                    var cam = document.getElementById('cam-vid');
                    cam.srcObject = stream; cam.play();
                    document.getElementById('g-dot').classList.add('active');
                    document.getElementById('g-zoom').classList.add('show');
                    handpose.load().then(function (m) { _gestureModel = m; _gestureOn = true; _detectLoop(); }).catch(function () { });
                })
                .catch(function () { document.getElementById('g-dot').classList.add('denied'); });
        }
        window._initGestures = _initGestures;

        function _detectLoop() {
            if (!_gestureOn || !_gestureModel) return;
            _gestureModel.estimateHands(document.getElementById('cam-vid')).then(function (hands) {
                if (hands.length > 0) _processHand(hands[0]);
                requestAnimationFrame(_detectLoop);
            }).catch(function () { requestAnimationFrame(_detectLoop); });
        }

        function _processHand(hand) {
            var lm = hand.landmarks;
            var thumbTip = lm[4], indexTip = lm[8], wrist = lm[0];
            var pd = _dist(thumbTip, indexTip);
            if (pd < 60) { _lastPinch = pd; _showGHint('Pinch Zoom'); return; }
            _lastPinch = null;
            var up = _fingersUp(lm);
            if (up >= 4) { _fireGesture('palm', function () { _toggleAvatar(); _showGHint('Pause / Resume'); }); return; }
            if (up === 1 && (indexTip[1] - lm[5][1]) > 40) { _fireGesture('down', function () { replaySection(); _showGHint('Replay'); }); return; }
            _waveHist.push(wrist[0]);
            if (_waveHist.length > 20) _waveHist.shift();
            if (_waveHist.length >= 20) {
                var mn = Math.min.apply(null, _waveHist), mx = Math.max.apply(null, _waveHist);
                if (mx - mn > 80) { _fireGesture('wave', function () { nextSection(); _showGHint('Next'); }); _waveHist = []; }
            }
        }

        function _dist(a, b) { return Math.sqrt(Math.pow(a[0] - b[0], 2) + Math.pow(a[1] - b[1], 2)); }
        function _fingersUp(lm) {
            var tips = [8, 12, 16, 20], pips = [6, 10, 14, 18], c = 0;
            tips.forEach(function (t, i) { if (lm[t][1] < lm[pips[i]][1]) c++; });
            return c;
        }
        function _fireGesture(name, fn) {
            var now = Date.now();
            if (name === _lastGName && now - _lastGTime < GESTURE_COOLDOWN) return;
            _lastGName = name; _lastGTime = now; fn();
        }
        function _toggleAvatar() {
            var v = document.getElementById('av-vid');
            _avPaused = !_avPaused;
            if (_avPaused) v.pause(); else v.play().catch(function () { });
        }
        var _gLblTimer = null;
        function _showGHint(txt) {
            var el = document.getElementById('g-lbl');
            el.textContent = txt; el.classList.add('show');
            clearTimeout(_gLblTimer);
            _gLblTimer = setTimeout(function () { el.classList.remove('show'); }, 1500);
        }

        // ══════════════════════════════════════════════════════════
        // TOUCH
        // ══════════════════════════════════════════════════════════
        (function () {
            var el = document.getElementById('main');
            var sx = 0, sy = 0, st = 0;
            el.addEventListener('touchstart', function (e) {
                sx = e.touches[0].clientX; sy = e.touches[0].clientY; st = Date.now();
            }, { passive: true });
            el.addEventListener('touchend', function (e) {
                var dx = e.changedTouches[0].clientX - sx;
                var dy = e.changedTouches[0].clientY - sy;
                var dt = Date.now() - st;
                if (dt < 300 && Math.abs(dx) < 12 && Math.abs(dy) < 12) { _toggleAvatar(); return; }
                if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
                    if (dx < 0) nextSection(); else replaySection();
                }
            }, { passive: true });
            var lastTD = null;
            el.addEventListener('touchmove', function (e) {
                if (e.touches.length === 2) {
                    var td = Math.hypot(
                        e.touches[0].clientX - e.touches[1].clientX,
                        e.touches[0].clientY - e.touches[1].clientY
                    );
                    lastTD = td;
                }
            }, { passive: true });
            el.addEventListener('touchend', function (e) { if (e.touches.length < 2) lastTD = null; }, { passive: true });
        })();

        // ══════════════════════════════════════════════════════════
        // UTILITY
        // ══════════════════════════════════════════════════════════
        function esc(str) {
            if (!str) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        // ══════════════════════════════════════════════════════════
        // DEV MODE
        // ══════════════════════════════════════════════════════════
        window.SUB_CONFIG = { mode: 'karaoke' };

        document.getElementById('dev-sim').addEventListener('input', function (e) {
            document.getElementById('dev-sim-val').textContent = e.target.value;
            if (window.avWebGL && window.avWebGL.material) window.avWebGL.material.uniforms.similarity.value = parseFloat(e.target.value);
        });
        document.getElementById('dev-smo').addEventListener('input', function (e) {
            document.getElementById('dev-smo-val').textContent = e.target.value;
            if (window.avWebGL && window.avWebGL.material) window.avWebGL.material.uniforms.smoothness.value = parseFloat(e.target.value);
        });
        document.getElementById('dev-intro').addEventListener('input', function (e) {
            document.getElementById('dev-intro-val').textContent = e.target.value;
            var ov = document.getElementById('av-overlay');
            if (ov.getAttribute('data-sectype') === 'intro') {
                ov.style.height = e.target.value + 'vh';
                window.dispatchEvent(new Event('resize'));
            } else {
                ov.style.removeProperty('height');
            }
        });
        document.getElementById('dev-cont').addEventListener('input', function (e) {
            document.getElementById('dev-cont-val').textContent = e.target.value;
            var ov = document.getElementById('av-overlay');
            if (ov.getAttribute('data-sectype') !== 'intro') {
                ov.style.height = e.target.value + 'vh';
                window.dispatchEvent(new Event('resize'));
            } else {
                ov.style.removeProperty('height');
            }
        });
        document.getElementById('dev-three').addEventListener('input', function (e) {
            document.getElementById('dev-three-val').textContent = e.target.value;
            var tl = document.getElementById('manim-layer');
            if (tl) { tl.style.transformOrigin = 'center'; tl.style.transform = 'scale(' + e.target.value + ')'; }
        });
        document.getElementById('dev-raw').addEventListener('change', function (e) {
            var cvs = document.getElementById('av-canvas');
            var vid = document.getElementById('av-vid');
            if (e.target.checked) {
                cvs.style.opacity = '0';
                vid.style.opacity = '1';
                vid.style.width = '100%';
                vid.style.height = '100%';
                vid.style.position = 'absolute';
                vid.style.top = '0';
                vid.style.left = '0';
            } else {
                cvs.style.opacity = '1';
                vid.style.opacity = '0.01';
                vid.style.width = '1px';
                vid.style.height = '1px';
            }
        });
        document.getElementById('dev-sub-size').addEventListener('input', function (e) {
            document.getElementById('dev-sub-size-val').textContent = e.target.value;
            var style = document.createElement('style');
            style.innerHTML = '.sub-word, .subtitle-text { font-size: ' + e.target.value + 'px !important; }';
            document.head.appendChild(style);
        });
        document.getElementById('dev-sub-pos').addEventListener('input', function (e) {
            document.getElementById('dev-sub-pos-val').textContent = e.target.value;
            document.getElementById('subtitle-overlay').style.bottom = e.target.value + 'px';
        });
        document.getElementById('dev-sub-width').addEventListener('input', function (e) {
            document.getElementById('dev-sub-width-val').textContent = e.target.value;
            document.getElementById('subtitle-overlay').style.width = e.target.value + '%';
        });
        document.getElementById('dev-sub-mode').addEventListener('change', function (e) {
            window.SUB_CONFIG.mode = e.target.value;
            if (e.target.value === 'off') {
                document.getElementById('subtitle-overlay').style.display = 'none';
            }
        });

        // Avatar position controls (Shift+D panel)
        document.getElementById('dev-av-right').addEventListener('input', function (e) {
            document.getElementById('dev-av-right-val').textContent = e.target.value;
            var av = document.getElementById('av-overlay');
            if (av) { av.style.right = e.target.value + 'px'; }
        });
        document.getElementById('dev-av-bottom').addEventListener('input', function (e) {
            document.getElementById('dev-av-bottom-val').textContent = e.target.value;
            var av = document.getElementById('av-overlay');
            if (av) { av.style.bottom = e.target.value + 'px'; }
        });
        document.getElementById('dev-av-sw').addEventListener('input', function (e) {
            document.getElementById('dev-av-sw-val').textContent = e.target.value;
            document.documentElement.style.setProperty('--av-strip-w', e.target.value + 'vw');
        });
        document.getElementById('dev-av-copy').addEventListener('click', function () {
            var r = document.getElementById('dev-av-right').value;
            var b = document.getElementById('dev-av-bottom').value;
            var h = document.getElementById('dev-cont').value;
            var sw = document.getElementById('dev-av-sw').value;
            var txt = 'right:' + r + 'px; bottom:' + b + 'px; height:' + h + 'vh; --av-strip-w:' + sw + 'vw;';
            navigator.clipboard.writeText(txt).catch(function () { });
            var btn = this;
            btn.textContent = 'Copied!';
            setTimeout(function () { btn.textContent = 'Copy Avatar CSS'; }, 2000);
        });

        // ══════════════════════════════════════════════════════════
        // ORIENTATION CHANGE — fix canvas + video dimensions
        // ══════════════════════════════════════════════════════════
        function handleOrientation() {
            setTimeout(function () {
                // Recalculate WebGL canvas dimensions
                window.dispatchEvent(new Event('resize'));
                // Force video decoders to re-evaluate frame size for new layout
                ['wan-vid', 'manim-vid'].forEach(function (id) {
                    var v = document.getElementById(id);
                    if (!v || !v.src || v.paused) return;
                    var t = v.currentTime;
                    v.pause();
                    setTimeout(function () {
                        v.currentTime = t;
                        v.play().catch(function () { });
                    }, 80);
                });
            }, 150);
        }
        // Use both APIs — screen.orientation for modern browsers, orientationchange for older iOS
        if (screen.orientation) {
            screen.orientation.addEventListener('change', handleOrientation);
        }
        window.addEventListener('orientationchange', handleOrientation);


        // ── SPLIT STACK: move av-overlay + subtitle into dock on mobile portrait ──
        function initSplitStack() {
            var isMobilePortrait = window.innerWidth <= 640 && window.innerHeight > window.innerWidth;
            if (!isMobilePortrait) return;

            var dock = document.getElementById('av-dock');
            var sub = document.getElementById('subtitle-overlay');
            if (!dock || !sub) return;

            // Subtitle only — avatar stays fixed, overlays video zone as PiP
            dock.appendChild(sub);
        }

        initSplitStack();

    </script>
</body>
