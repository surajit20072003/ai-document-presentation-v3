<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Media Manager — AI Doc V3</title>
    <style>
        :root {
            --bg: #1e1e2e;
            --surface: #313244;
            --surface2: #252635;
            --border: #45475a;
            --text: #cdd6f4;
            --muted: #6c7086;
            --pass: #a6e3a1;
            --fail: #f38ba8;
            --warn: #f9e2af;
            --info: #89b4fa;
            --manim: #89dceb;
            --wan: #cba6f7;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', 'Segoe UI', monospace;
            background: var(--bg);
            color: var(--text);
            padding: 20px;
        }

        /* ── Top Bar ── */
        .top-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 2px solid var(--border);
        }

        .top-bar h1 {
            font-size: 1.3rem;
            flex: 1;
        }

        #job-input {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 7px 12px;
            border-radius: 6px;
            font-size: 13px;
            width: 260px;
        }

        /* ── Summary Bar ── */
        #summary-bar {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            padding: 12px 16px;
            background: var(--surface);
            border-radius: 8px;
            font-size: 13px;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .stat-label {
            color: var(--muted);
        }

        /* ── Buttons ── */
        .btn {
            border: none;
            padding: 8px 16px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 6px;
            font-size: 13px;
            transition: opacity 0.15s;
        }

        .btn:hover {
            opacity: 0.85;
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .btn-primary {
            background: var(--info);
            color: #1e1e2e;
        }

        .btn-success {
            background: var(--pass);
            color: #1e1e2e;
        }

        .btn-secondary {
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-warn {
            background: var(--warn);
            color: #1e1e2e;
        }

        .btn-sm {
            padding: 3px 9px;
            font-size: 11px;
            border-radius: 4px;
        }

        /* ── Section Cards ── */
        .section-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            background: var(--surface2);
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }

        .section-id {
            font-weight: 700;
            font-size: 1rem;
        }

        .section-type {
            color: var(--muted);
            font-size: 12px;
        }

        .renderer-badge {
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
            background: var(--border);
        }

        .renderer-badge.manim {
            background: #1c3a3e;
            color: var(--manim);
        }

        .renderer-badge.wan {
            background: #2e1e4a;
            color: var(--wan);
        }

        .renderer-badge.img {
            background: #1e2e3e;
            color: var(--info);
        }

        /* ── Media Table ── */
        .media-table {
            width: 100%;
            border-collapse: collapse;
        }

        .media-table th {
            background: #2a2b3d;
            color: var(--muted);
            font-size: 11px;
            font-weight: 600;
            padding: 7px 12px;
            text-align: left;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .media-table td {
            padding: 9px 12px;
            border-top: 1px solid var(--border);
            font-size: 13px;
            vertical-align: middle;
        }

        .media-table tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        .type-icon {
            font-size: 16px;
        }

        .filename {
            font-family: monospace;
            font-size: 12px;
            color: var(--info);
            text-decoration: none;
        }

        .filename:hover {
            text-decoration: underline;
        }

        /* ── Status Badges ── */
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 700;
        }

        .badge-ok {
            background: #1a3a1a;
            color: var(--pass);
        }

        .badge-missing {
            background: #3a1a1a;
            color: var(--fail);
        }

        .badge-orphan {
            background: #3a2e00;
            color: var(--warn);
        }

        .badge-loading {
            background: var(--border);
            color: var(--muted);
        }

        .badge-na {
            background: transparent;
            color: var(--muted);
            border: 1px solid var(--border);
        }

        /* ── Orphan Rows ── */
        .orphan-row td {
            background: rgba(249, 226, 175, 0.05);
        }

        /* ── Section Empty ── */
        .no-media {
            text-align: center;
            padding: 20px;
            color: var(--muted);
            font-size: 13px;
        }

        /* ── Modal ── */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            overflow: auto;
        }

        .modal-content {
            background: var(--surface);
            margin: 5% auto;
            padding: 24px;
            border: 1px solid var(--border);
            width: 85%;
            max-width: 920px;
            border-radius: 10px;
        }

        .close {
            float: right;
            font-size: 26px;
            cursor: pointer;
            color: var(--muted);
            line-height: 1;
        }

        .close:hover {
            color: var(--text);
        }

        .modal-section {
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
        }

        .modal-section:last-child {
            border-bottom: none;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            font-weight: 600;
        }

        textarea {
            width: 100%;
            height: 90px;
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 10px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 12px;
            resize: vertical;
        }

        .provider-toggle {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }

        .provider-btn {
            flex: 1;
            padding: 10px;
            border: 2px solid var(--border);
            background: var(--surface2);
            color: var(--text);
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
            transition: all 0.15s;
        }

        .provider-btn.active-wan {
            border-color: var(--wan);
            background: #2e1e4a;
            color: var(--wan);
        }

        .provider-btn.active-gpu {
            border-color: var(--pass);
            background: #1e3127;
            color: var(--pass);
        }

        #preview-container {
            min-height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #11111b;
            border-radius: 6px;
            text-align: center;
        }

        #preview-video {
            max-width: 100%;
            max-height: 380px;
        }

        .progress-bar {
            width: 100%;
            background: var(--border);
            border-radius: 4px;
            margin-top: 10px;
            height: 18px;
            overflow: hidden;
            display: none;
        }

        .progress-fill {
            height: 100%;
            background: var(--info);
            width: 0%;
            transition: width 0.3s;
        }

        .mode-toggle {
            display: flex;
            gap: 20px;
            margin-bottom: 14px;
            padding: 10px 14px;
            background: var(--surface2);
            border-radius: 6px;
            border: 1px solid var(--border);
        }

        .mode-toggle label {
            margin: 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* ── Status messages ── */
        #status-msg {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px 14px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }

        a {
            color: var(--info);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <!-- Top Bar -->
    <div class="top-bar">
        <h1>🎬 Media Manager</h1>
        <input id="job-input" type="text" placeholder="Job ID…" />
        <button class="btn btn-primary" onclick="loadJob()">Load Job</button>
        <button class="btn btn-warn" id="stitch-btn" onclick="stitchAll()" style="display:none">🛠 Stitch
            Orphans</button>
        <button class="btn btn-secondary" onclick="loadJob()" title="Refresh">↺ Refresh</button>
    </div>

    <!-- Summary Bar -->
    <div id="summary-bar" style="display:none">
        <span class="stat"><span class="stat-label">Sections:</span> <strong id="stat-sections">–</strong></span>
        <span class="stat"><span class="stat-label">Videos OK:</span> <strong id="stat-vok"
                style="color:var(--pass)">–</strong></span>
        <span class="stat"><span class="stat-label">Videos Missing:</span> <strong id="stat-vmiss"
                style="color:var(--fail)">–</strong></span>
        <span class="stat"><span class="stat-label">Images OK:</span> <strong id="stat-iok"
                style="color:var(--pass)">–</strong></span>
        <span class="stat"><span class="stat-label">Images Missing:</span> <strong id="stat-imiss"
                style="color:var(--fail)">–</strong></span>
        <span class="stat"><span class="stat-label">Orphans:</span> <strong id="stat-orphan"
                style="color:var(--warn)">–</strong></span>
    </div>

    <!-- Status message -->
    <div id="status-msg"></div>

    <!-- Cards container -->
    <div id="cards"></div>

    <!-- ═══════════ REFINE MODAL ═══════════ -->
    <div id="refine-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">×</span>
            <h2 style="margin-bottom:16px">♻️ Regenerate Video</h2>

            <div id="modal-info" style="margin-bottom:14px; color:var(--manim); font-size:13px;"></div>

            <div class="renderer-toggle" id="renderer-toggle"
                style="margin-bottom:12px; background:#f4f4f4; padding:10px; border-radius:4px; display:flex; align-items:center; gap:10px;">
                <label style="font-weight:bold; font-size:13px; color:#333;">Renderer:</label>
                <select id="renderer-select" onchange="toggleRendererMode()"
                    style="padding:6px; border-radius:4px; border:1px solid var(--border); flex:1; font-size:13px;">
                    <option value="wan">Text-to-Video (WAN API)</option>
                    <option value="text_to_video">Text-to-Video (Local GPU)</option>
                    <option value="image_to_video">Image-to-Video (Local GPU)</option>
                    <option value="manim">Manim Code (Code-to-Video)</option>
                </select>
            </div>

            <div class="modal-section">
                <!-- Mode -->
                <div class="mode-toggle">
                    <label style="color:var(--fail)">
                        <input type="radio" name="refine-mode" value="override" checked onchange="toggleRefineMode()">
                        <strong>⚡ Full Override</strong> — replace text exactly
                    </label>
                    <label style="color:var(--pass)">
                        <input type="radio" name="refine-mode" value="refine" onchange="toggleRefineMode()">
                        <strong>✨ AI Refinement</strong> — describe changes
                    </label>
                </div>

                <div id="block-image-prompts" style="display:none; margin-top:12px;">
                    <label style="color:var(--info); font-weight:600; font-size:13px;">Image Prompt 1 (Start
                        Frame):</label>
                    <textarea id="image-prompt-start"
                        style="border-color:var(--info); min-height:60px; margin-bottom:10px; font-size:13px;"></textarea>

                    <label style="color:var(--info); font-weight:600; font-size:13px;">Image Prompt 2 (End Frame -
                        Optional):</label>
                    <textarea id="image-prompt-end"
                        style="border-color:var(--info); min-height:60px; font-size:13px;"></textarea>
                </div>

                <div id="block-override">
                    <label style="color:var(--fail); margin-top:8px;" id="video-prompt-label">Video Prompt /
                        Code:</label>
                    <textarea id="raw-prompt-input" style="border-color:var(--fail)"></textarea>
                    <small style="color:var(--muted)">The AI will use EXACTLY this text.</small>
                </div>

                <div id="block-refine" style="display:none; margin-top:10px;">
                    <label style="color:var(--pass)">Instructions for AI (e.g. "Make it slower"):</label>
                    <textarea id="user-feedback-input" style="border-color:var(--pass)"
                        placeholder="Describe what to change…" disabled></textarea>
                    <small style="color:var(--muted)">The AI will tweak the prompts above and apply these
                        changes.</small>
                </div>
            </div>

            <div style="display:flex; align-items:center; gap:12px; margin-top:16px; margin-bottom:10px;">
                <button class="btn btn-primary" onclick="generatePreview()">🚀 Generate Preview</button>
                <span id="preview-status-text" style="font-weight:600; font-size:13px;"></span>
            </div>

            <div class="progress-bar" id="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>

            <div id="preview-container" style="margin-top:12px;">
                <span style="color:var(--muted)">Preview will appear here…</span>
            </div>

            <div style="margin-top:20px; text-align:right; border-top:1px solid var(--border); padding-top:16px;">
                <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                <button class="btn btn-success" id="btn-approve" disabled onclick="approvePreview()"
                    style="margin-left:10px;">
                    ✅ Approve &amp; Replace
                </button>
            </div>
        </div>
    </div>

    <!-- ═══════════ SCRIPT ═══════════ -->
    <script>
        // ─── State ───────────────────────────────────────────
        const urlParams = new URLSearchParams(window.location.search);
        let JOB_ID = urlParams.get('job') || urlParams.get('job_id') || '';
        let BASE_PATH = '';
        let currentRefineData = {};
        let selectedProvider = 'wan';
        let globalOrphanCount = 0;

        if (JOB_ID) {
            document.getElementById('job-input').value = JOB_ID;
            document.addEventListener('DOMContentLoaded', loadJob);
        }

        // ─── Load / Refresh ──────────────────────────────────
        async function loadJob() {
            JOB_ID = document.getElementById('job-input').value.trim();
            if (!JOB_ID) { showStatus('⚠️ Please enter a Job ID.', 'warn'); return; }

            BASE_PATH = `/jobs/${JOB_ID}/`;
            document.getElementById('cards').innerHTML = '';
            document.getElementById('summary-bar').style.display = 'none';
            document.getElementById('stitch-btn').style.display = 'none';
            globalOrphanCount = 0;

            showStatus(`Loading job <strong>${JOB_ID}</strong>…`, 'info');

            try {
                const [presRes, reportRes] = await Promise.all([
                    fetch(`${BASE_PATH}presentation.json?t=${Date.now()}`),
                    fetch(`/api/sanity-report/${JOB_ID}`)
                ]);

                if (!presRes.ok) throw new Error(`presentation.json not found (${presRes.status})`);
                const pres = await presRes.json();

                let diskReport = {};
                if (reportRes.ok) {
                    const rData = await reportRes.json();
                    (rData.sections || []).forEach(s => { diskReport[String(s.section_id)] = s; });
                }

                showStatus(`Found ${pres.sections.length} section(s). Checking media…`, 'info');
                await renderAllSections(pres.sections, diskReport);
                updateSummary(pres.sections.length);
                hideStatus();

            } catch (e) {
                showStatus(`❌ CRITICAL ERROR: ${e.message}`, 'fail');
            }
        }

        // ─── Render all section cards ─────────────────────────
        async function renderAllSections(sections, diskReport) {
            const container = document.getElementById('cards');
            for (const section of sections) {
                const card = await buildSectionCard(section, diskReport[String(section.section_id)] || {});
                container.appendChild(card);
            }
        }

        // ─── Build one section card ───────────────────────────
        async function buildSectionCard(section, disk) {
            const sid = String(section.section_id);
            const renderer = (section.renderer || 'none').toLowerCase();

            const card = document.createElement('div');
            card.className = 'section-card';
            card.id = `section-card-${sid}`;

            let rendClass = '';
            if (renderer === 'manim') rendClass = 'manim';
            else if (['wan', 'video', 'video_generation', 'image_to_video'].includes(renderer)) rendClass = 'img';

            card.innerHTML = `
        <div class="section-header">
          <span class="section-id">§${sid}</span>
          <span class="section-type">${section.section_type || ''}</span>
          <span class="renderer-badge ${rendClass}">${renderer.toUpperCase()}</span>
          <span style="margin-left:auto; color:var(--muted); font-size:12px;">${section.title || ''}</span>
        </div>
      `;

            const table = document.createElement('table');
            table.className = 'media-table';
            table.innerHTML = `
        <thead>
          <tr>
            <th style="width:30px"></th>
            <th>Asset</th>
            <th style="width:100px">Status</th>
            <th style="width:220px">Actions</th>
          </tr>
        </thead>
      `;
            const tbody = document.createElement('tbody');

            let hasRows = false;

            // ── 1. AVATAR ──
            const avatarPath = section.avatar_video || section.avatar_video_path;
            if (avatarPath) {
                const row = await makeMediaRow('🧑', avatarPath, 'avatar', {
                    editBtn: false,
                    section,
                    beatId: null,
                    renderer,
                });
                tbody.appendChild(row);
                hasRows = true;
            }

            // ── 2. VIDEOS ──
            const videoRefs = collectVideoRefs(section);
            for (const ref of videoRefs) {
                const row = await makeMediaRow('🎥', ref.path, 'video', {
                    editBtn: true,
                    section,
                    beatId: ref.beatId,
                    prompt: ref.prompt,
                    renderer: ref.renderer || renderer,
                    imgStart: ref.imgStart,
                    imgEnd: ref.imgEnd
                });
                tbody.appendChild(row);
                hasRows = true;
            }

            // ── 3. IMAGES ──
            const imageRefs = collectImageRefs(section);
            for (const ref of imageRefs) {
                const row = await makeMediaRow('🖼️', ref.path, 'image', {
                    editBtn: false,
                    section,
                    beatId: ref.beatId,
                    renderer,
                });
                tbody.appendChild(row);
                hasRows = true;
            }

            // ── 4. QUIZ AVATAR CLIPS ──
            const quizAvatarSets = [];
            if (section.understanding_quiz?.avatar_clips) quizAvatarSets.push(section.understanding_quiz.avatar_clips);
            (section.questions || []).forEach(q => { if (q.avatar_clips) quizAvatarSets.push(q.avatar_clips); });

            for (const clips of quizAvatarSets) {
                const clipTypes = [['question', '❓'], ['correct', '✅'], ['wrong', '❌'], ['explanation', '💡']];
                for (const [key, icon] of clipTypes) {
                    if (!clips[key]) continue;
                    const row = await makeMediaRow(icon, clips[key], 'avatar', {
                        editBtn: false,
                        section,
                        beatId: null,
                        renderer,
                    });
                    const firstTd = row.querySelector('td:nth-child(2)');
                    if (firstTd) {
                        const label = document.createElement('span');
                        label.style.cssText = 'font-size:10px; color:var(--muted); margin-left:6px;';
                        label.textContent = `quiz ${key}`;
                        firstTd.appendChild(label);
                    }
                    tbody.appendChild(row);
                    hasRows = true;
                }
            }

            // ── 5. ORPHANS ──
            const orphans = disk.videos_orphaned || [];
            for (const orf of orphans) {
                const orphanPath = `videos/${orf}`;
                const row = makeOrphanRow('🎥', orphanPath, sid);
                tbody.appendChild(row);
                hasRows = true;
                globalOrphanCount++;
            }

            if (!hasRows) {
                const empty = document.createElement('tr');
                empty.innerHTML = `<td colspan="4" class="no-media">No media assets found for this section.</td>`;
                tbody.appendChild(empty);
            }

            table.appendChild(tbody);
            card.appendChild(table);
            return card;
        }

        // ═══════════════════════════════════════════════════════════════════════
        //  FIX: collectVideoRefs — now also traverses render_spec.image_to_video_beats
        //  (where V3 JSON actually stores its beat metadata) and handles recap beats.
        // ═══════════════════════════════════════════════════════════════════════
        function collectVideoRefs(section) {
            const refs = [];
            const seen = new Set();

            function addRef(path, beatId, prompt, rend, imgStart, imgEnd) {
                if (!path) return;
                const filename = path.split('/').pop();
                if (seen.has(filename)) return;
                seen.add(filename);
                refs.push({
                    path,
                    beatId: beatId || filename.replace('.mp4', ''),
                    prompt: prompt || '',
                    renderer: rend || section.renderer || 'wan',
                    imgStart: imgStart || '',
                    imgEnd: imgEnd || ''
                });
            }

            // ── PRIORITY 1: section.image_to_video_beats[] (top-level, older format) ──
            (section.image_to_video_beats || []).forEach((b, i) => {
                const derivedPath = b.video_path
                    || `videos/topic_${section.section_id}_${b.beat_id || i}.mp4`;
                addRef(derivedPath, b.beat_id || i, b.video_prompt || '', 'image_to_video',
                    b.image_prompt_start, b.image_prompt_end);
            });

            // ── PRIORITY 2: render_spec.image_to_video_beats[] ──────────────────────
            // FIX: V3 JSON stores beat metadata here, not at the top-level.
            // This is the primary source for image_to_video and text_to_video sections.
            (section.render_spec?.image_to_video_beats || []).forEach((b, i) => {
                const derivedPath = b.video_path
                    || `videos/topic_${section.section_id}_${b.beat_id || i}.mp4`;
                addRef(derivedPath, b.beat_id || i, b.video_prompt || '', 'image_to_video',
                    b.image_prompt_start || '', b.image_prompt_end || '');
            });

            // ── PRIORITY 3: visual_beats[].video_path (V3 current format) ──────────
            (section.visual_beats || []).forEach(b => {
                if (b.video_path) {
                    addRef(b.video_path, b.beat_id, b.video_prompt || b.display_text || b.description || '',
                        section.renderer, b.image_prompt_start, b.image_prompt_end);
                }
            });

            // ── PRIORITY 4: WAN video_prompts (older structure) ─────────────────────
            (section.video_prompts || section.render_spec?.video_prompts || []).forEach(p => {
                if (p.beat_id) addRef(`videos/${p.beat_id}.mp4`, p.beat_id, p.prompt || '', 'wan');
            });

            // ── PRIORITY 5: Quiz explanation visual beats ────────────────────────────
            function addQuizExplanationBeats(quizObj) {
                if (!quizObj) return;
                const ev = quizObj.explanation_visual;
                if (!ev) return;

                // A. Per-beat inside explanation_visual.image_to_video_beats (richest)
                (ev.image_to_video_beats || []).forEach((b, i) => {
                    const derivedPath = b.video_path
                        || ev.video_path
                        || `videos/topic_${section.section_id}_${b.beat_id || i}.mp4`;
                    const rnd = (b.image_prompt_start || ev.renderer === 'image_to_video')
                        ? 'image_to_video' : 'wan';
                    addRef(derivedPath, b.beat_id || i,
                        b.video_prompt || b.display_text || ev.display_text || 'Quiz explanation beat',
                        rnd, b.image_prompt_start, b.image_prompt_end);
                });

                // B. Rendered single video path on the explanation_visual object
                if (ev.video_path)
                    addRef(ev.video_path, 'eq_main', ev.display_text || 'Quiz explanation', ev.renderer || 'wan');

                // C. beat_video_paths list on explanation_visual
                (ev.beat_video_paths || []).forEach((vp, i) =>
                    addRef(vp, `eq_beat_${i}`, ev.display_text || '', ev.renderer || 'wan'));

                // D. Top-level shortcut on the quiz object (oldest format)
                if (quizObj.explanation_visual_video_path)
                    addRef(quizObj.explanation_visual_video_path, 'eq_shortcut',
                        ev?.display_text || 'Quiz explanation', ev?.renderer || 'wan');
            }

            addQuizExplanationBeats(section.understanding_quiz);
            (section.questions || []).forEach(q => addQuizExplanationBeats(q));

            // ── PRIORITY 6: Flat fallbacks ───────────────────────────────────────────

            // beat_video_paths[] at top level
            // For Manim sections: cross-reference visual_beats[] by beat_id (derived from filename stem)
            // to expose the display_text as the prompt in the Edit modal.
            (section.beat_video_paths || []).forEach((vp) => {
                if (!vp) return;
                const stem = vp.split('/').pop().replace('.mp4', ''); // e.g. "topic_3_beat_1"
                // Extract beat_id from stem: "topic_3_beat_1" → "beat_1"
                const beatMatch = stem.match(/topic_\d+_(.+)$/);
                const beatId = beatMatch ? beatMatch[1] : null;
                // Try to find matching visual_beat to get its display_text
                const vb = (section.visual_beats || []).find(
                    b => b.beat_id && (b.beat_id === beatId || stem.includes(b.beat_id))
                );
                const prompt = (vb && (vb.manim_scene_spec || vb.display_text)) || '';
                addRef(vp, beatId, prompt, section.renderer);
            });

            // understanding_quiz.explanation_visual_video_path at section top level
            if (section.understanding_quiz?.explanation_visual_video_path)
                addRef(section.understanding_quiz.explanation_visual_video_path, 'eq_uq_top', '', 'wan');

            // quiz_questions[] (older format)
            (section.quiz_questions || []).forEach(q => {
                const bid = q.beat_id;
                if (q.video_path) addRef(q.video_path, bid, q.question || '', 'wan');
                else if (bid) addRef(`videos/topic_${section.section_id}_quiz_${bid}.mp4`, bid, q.question || '', 'wan');
                if (q.explanation_video) addRef(q.explanation_video, bid + '_exp', 'Explanation', 'wan');
            });

            // narration.segments[].beat_videos (v2 fallback)
            (section.narration?.segments || []).forEach(seg => {
                (seg.beat_videos || []).forEach(vp => {
                    const fname = vp.split('/').pop().replace('.mp4', '');
                    addRef(vp, fname, seg.text || '', section.renderer);
                });
            });

            // section.beat_videos[] (older flat format)
            (section.beat_videos || []).forEach((vp, i) => {
                addRef(vp, `beat_${i}`, '', section.renderer);
            });

            // section.video_path (single video)
            if (section.video_path) {
                addRef(section.video_path, 'main', '', section.renderer);
            }

            // recap_video_paths
            (section.recap_video_paths || []).forEach((vp, i) => {
                addRef(vp, `recap_${i}`, '', section.renderer);
            });

            return refs;
        }

        // ─── Collect all image paths for a section ────────────
        function collectImageRefs(section) {
            const imageRefsList = [];
            const imageSeenSet = new Set();

            function addImg(path, beatId) {
                if (!path) return;
                const key = path.split('/').pop();
                if (imageSeenSet.has(key)) return;
                imageSeenSet.add(key);
                imageRefsList.push({ path, beatId });
            }

            // PRIMARY: visual_beats[].image_source (V3 current format)
            (section.visual_beats || []).forEach(b => {
                addImg(b.image_source || b.image_id || b.image_path, b.beat_id);
            });

            // render_spec.infographic_beats[].image_source
            (section.render_spec?.infographic_beats || []).forEach(b => {
                addImg(b.image_source || b.image_id || b.image_path, b.beat_id);
            });

            // Quiz question images
            (section.quiz_questions || []).forEach(q => {
                addImg(q.image_id || q.image_path || q.image_source, q.beat_id);
            });

            // narration segments visual_content
            (section.narration?.segments || []).forEach(seg => {
                const vc = seg.visual_content;
                if (vc) addImg(vc.image_id || vc.image_path || vc.image_source, seg.segment_id);
            });

            return imageRefsList;
        }

        // ─── Build a media row ────────────────────────────────
        async function makeMediaRow(icon, assetPath, type, opts) {
            const { editBtn, section, beatId, prompt, renderer, imgStart, imgEnd } = opts;
            const tr = document.createElement('tr');

            const check = await checkUrl(assetPath, type);
            const badge = check.valid
                ? `<span class="badge badge-ok">200 OK</span>`
                : `<span class="badge badge-missing">MISSING</span>`;

            const linkHref = check.url || resolveUrl(assetPath, type);
            const filenameText = assetPath.split('/').pop();

            let actions = '';
            if (editBtn && ['wan', 'video', 'video_generation', 'image_to_video', 'text_to_video', 'manim'].includes(renderer)) {
                const b64 = safeBtoa(prompt || '');
                const isB64 = safeBtoa(opts.imgStart || '');
                const ieB64 = safeBtoa(opts.imgEnd || '');
                const rendKey = renderer === 'video_generation' || renderer === 'video' ? 'wan' : renderer;
                actions += `<button class="btn btn-sm btn-primary" onclick="openRefineModal('${section.section_id}','${beatId || 0}','${rendKey}','${b64}','${isB64}','${ieB64}')">✏️ Edit</button> `;
            }

            if (type === 'image' && check.valid) {
                actions += `<a href="${linkHref}" target="_blank" class="btn btn-sm btn-secondary">👁 View</a>`;
            }

            tr.innerHTML = `
        <td class="type-icon">${icon}</td>
        <td><a class="filename" href="${linkHref}" target="_blank">${filenameText}</a></td>
        <td>${badge}</td>
        <td>${actions || '<span style="color:var(--muted)">—</span>'}</td>
      `;
            return tr;
        }

        // ─── Orphan row ───────────────────────────────────────
        function makeOrphanRow(icon, assetPath, sid) {
            const tr = document.createElement('tr');
            tr.className = 'orphan-row';
            const filename = assetPath.split('/').pop();
            const linkHref = BASE_PATH + assetPath;
            tr.innerHTML = `
        <td class="type-icon">${icon}</td>
        <td>
          <a class="filename" href="${linkHref}" target="_blank">${filename}</a>
          <span class="badge badge-orphan" style="margin-left:8px;">ORPHAN</span>
          <span style="color:var(--muted); font-size:11px; margin-left:6px;">on disk but not in JSON</span>
        </td>
        <td><span class="badge badge-orphan">⚠️ ORPHAN</span></td>
        <td>
          <button class="btn btn-sm btn-warn" onclick="stitchAll()">🛠 Stitch</button>
        </td>
      `;
            return tr;
        }

        // ─── Update summary bar ───────────────────────────────
        async function updateSummary(sectionCount) {
            document.getElementById('summary-bar').style.display = 'flex';
            document.getElementById('stat-sections').textContent = sectionCount;

            let vok = 0, vmiss = 0, iok = 0, imiss = 0;
            document.querySelectorAll('.media-table tbody tr:not(.orphan-row)').forEach(row => {
                const icon = row.querySelector('.type-icon')?.textContent || '';
                const badge = row.querySelector('.badge');
                if (!badge) return;
                const isOk = badge.classList.contains('badge-ok');
                if (icon.includes('🎥')) { isOk ? vok++ : vmiss++; }
                if (icon.includes('🖼')) { isOk ? iok++ : imiss++; }
            });

            document.getElementById('stat-vok').textContent = vok;
            document.getElementById('stat-vmiss').textContent = vmiss;
            document.getElementById('stat-iok').textContent = iok;
            document.getElementById('stat-imiss').textContent = imiss;
            document.getElementById('stat-orphan').textContent = globalOrphanCount;

            if (globalOrphanCount > 0) {
                document.getElementById('stitch-btn').style.display = 'inline-block';
            }
        }

        // ─── URL resolution ───────────────────────────────────
        function resolveUrl(path, type) {
            if (!path) return '#';
            let p = path.replace(/\\/g, '/');
            if (p.includes(':') && !p.startsWith('http')) {
                p = p.split('/').pop();
            }
            if (p.startsWith('http') || p.startsWith('/jobs/')) return p;
            if (type === 'avatar' && !p.includes('/')) return BASE_PATH + 'avatars/' + p;
            if (type === 'video' && !p.includes('/')) return BASE_PATH + 'videos/' + p;
            if (type === 'image' && !p.includes('/')) return BASE_PATH + 'images/' + p;
            if (!p.startsWith('./') && !p.startsWith('/')) return BASE_PATH + p;
            return p;
        }

        async function checkUrl(url, type) {
            if (!url) return { valid: false, status: 'N/A', url: '#' };
            try {
                let fetchUrl = resolveUrl(url, type);
                if (type === 'video' || type === 'image') {
                    fetchUrl += (fetchUrl.includes('?') ? '&' : '?') + 't=' + Date.now();
                }
                const res = await fetch(fetchUrl, { method: 'HEAD' });
                if (!res.ok && /\.jpe?g$/i.test(fetchUrl)) {
                    const pngUrl = fetchUrl.replace(/\.jpe?g/i, '.png');
                    const r2 = await fetch(pngUrl, { method: 'HEAD' });
                    if (r2.ok) return { valid: true, status: r2.status, url: pngUrl };
                }
                return { valid: res.ok, status: res.status, url: fetchUrl };
            } catch (e) {
                return { valid: false, status: 'ERR', url: '#' };
            }
        }

        // ─── Stitch orphans ───────────────────────────────────
        async function stitchAll() {
            showStatus('🛠 Stitching orphaned assets…', 'info');
            try {
                const res = await fetch(`/api/repair-metadata/${JOB_ID}`, { method: 'POST' });
                const data = await res.json();
                if (data.status === 'success') {
                    showStatus(`✅ Stitched ${data.updated_assets} asset(s). Reloading…`, 'pass');
                    setTimeout(() => loadJob(), 1400);
                } else {
                    showStatus(`❌ Stitch failed: ${data.error}`, 'fail');
                }
            } catch (e) {
                showStatus(`❌ Network error: ${e.message}`, 'fail');
            }
        }

        // ─── Status helpers ───────────────────────────────────
        function showStatus(msg, type = 'info') {
            const el = document.getElementById('status-msg');
            el.innerHTML = msg;
            el.style.display = 'block';
            el.style.borderColor = type === 'pass' ? 'var(--pass)' : type === 'fail' ? 'var(--fail)' : type === 'warn' ? 'var(--warn)' : 'var(--border)';
        }
        function hideStatus() {
            document.getElementById('status-msg').style.display = 'none';
        }

        // ─── Base64 helpers ───────────────────────────────────
        function safeBtoa(str) { return btoa(unescape(encodeURIComponent(str))); }
        function safeAtob(str) { return decodeURIComponent(escape(atob(str))); }

        // ════════════════════════════════════════════════════════
        //  MODAL / PREVIEW / APPROVE
        // ════════════════════════════════════════════════════════

        function setProvider(p) {
            selectedProvider = p;
            document.getElementById('btn-use-wan').className = 'provider-btn' + (p === 'wan' ? ' active-wan' : '');
            document.getElementById('btn-use-gpu').className = 'provider-btn' + (p === 'gpu' ? ' active-gpu' : '');
        }

        function toggleRendererMode() {
            const rend = document.getElementById('renderer-select').value;
            const imgBlock = document.getElementById('block-image-prompts');
            const vidLabel = document.getElementById('video-prompt-label');

            if (rend === 'image_to_video') {
                imgBlock.style.display = 'block';
                vidLabel.innerText = 'Video Prompt (Motion/Camera):';
            } else {
                imgBlock.style.display = 'none';
                vidLabel.innerText = 'Video Prompt / Code:';
            }
        }

        function toggleRefineMode() {
            const mode = document.querySelector('input[name="refine-mode"]:checked').value;
            const override = document.getElementById('block-override');
            const imgBlock = document.getElementById('block-image-prompts');
            const refine = document.getElementById('block-refine');
            const inpO = document.getElementById('raw-prompt-input');
            const inpRS = document.getElementById('image-prompt-start');
            const inpRE = document.getElementById('image-prompt-end');
            const inpR = document.getElementById('user-feedback-input');

            if (mode === 'override') {
                override.style.opacity = '1'; inpO.disabled = false;
                imgBlock.style.opacity = '1'; inpRS.disabled = false; inpRE.disabled = false;
                refine.style.display = 'block'; refine.style.opacity = '0.4'; inpR.disabled = true; inpR.value = '';
            } else {
                override.style.opacity = '0.4'; inpO.disabled = true;
                imgBlock.style.opacity = '0.4'; inpRS.disabled = true; inpRE.disabled = true;
                refine.style.display = 'block'; refine.style.opacity = '1'; inpR.disabled = false; inpR.focus();
            }
        }

        function openRefineModal(secId, beatId, renderer, currentPromptBase64, imgStartB64, imgEndB64) {
            let currentPrompt = '';
            let imgStart = '';
            let imgEnd = '';
            try { currentPrompt = safeAtob(currentPromptBase64); } catch (e) { currentPrompt = ''; }
            try { imgStart = safeAtob(imgStartB64); } catch (e) { imgStart = ''; }
            try { imgEnd = safeAtob(imgEndB64); } catch (e) { imgEnd = ''; }

            currentRefineData = { jobId: JOB_ID, sectionId: secId, beatId, renderer };

            document.getElementById('modal-info').innerHTML =
                `<strong>Section ${secId}</strong> | Beat: ${beatId || 'N/A'}`;

            document.getElementById('raw-prompt-input').value = currentPrompt;
            document.getElementById('image-prompt-start').value = imgStart;
            document.getElementById('image-prompt-end').value = imgEnd;
            document.getElementById('user-feedback-input').value = '';

            const rs = document.getElementById('renderer-select');
            const options = Array.from(rs.options).map(o => o.value);
            if (options.includes(renderer)) {
                rs.value = renderer;
            } else {
                rs.value = 'wan';
            }
            toggleRendererMode();

            document.getElementById('btn-approve').disabled = true;
            document.getElementById('preview-status-text').innerText = '';
            document.getElementById('progress-bar').style.display = 'none';
            document.getElementById('preview-container').innerHTML =
                '<span style="color:var(--muted)">Preview will appear here…</span>';

            const overrideRadio = document.querySelector('input[name="refine-mode"][value="override"]');
            if (overrideRadio) { overrideRadio.checked = true; toggleRefineMode(); }

            document.getElementById('refine-modal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('refine-modal').style.display = 'none';
            document.getElementById('preview-container').innerHTML =
                '<span style="color:var(--muted)">Preview will appear here…</span>';
            currentRefineData = {};
        }

        async function generatePreview() {
            const btn = document.querySelector('.modal .btn-primary');
            const statusText = document.getElementById('preview-status-text');
            const mode = document.querySelector('input[name="refine-mode"]:checked').value;
            const targetRenderer = document.getElementById('renderer-select').value;

            let feedback = '', rawOverride = '', imgStart = '', imgEnd = '';
            if (mode === 'override') {
                rawOverride = document.getElementById('raw-prompt-input').value;
                imgStart = document.getElementById('image-prompt-start').value;
                imgEnd = document.getElementById('image-prompt-end').value;
            } else {
                feedback = document.getElementById('user-feedback-input').value;
            }

            if (!feedback && !rawOverride && targetRenderer !== 'image_to_video') {
                alert('Please provide input.'); return;
            }
            if (targetRenderer === 'image_to_video' && !imgStart && !feedback) {
                alert('Please provide a start image prompt or AI instruction.'); return;
            }

            btn.disabled = true;
            statusText.innerText = 'Initiating…';

            let provider = 'wan';
            if (targetRenderer === 'text_to_video' || targetRenderer === 'image_to_video') provider = 'gpu';

            try {
                const payload = {
                    section_id: currentRefineData.sectionId,
                    beat_id: currentRefineData.beatId,
                    renderer: targetRenderer,
                    user_feedback: feedback,
                    raw_prompt_override: rawOverride,
                    image_prompt_start: imgStart,
                    image_prompt_end: imgEnd,
                    video_provider: provider
                };
                const res = await fetch(`/job/${JOB_ID}/generate_preview`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (data.status === 'accepted') pollPreviewStatus(data.preview_key);
                else { statusText.innerText = 'Error: ' + (data.error || 'Unknown'); btn.disabled = false; }
            } catch (e) {
                statusText.innerText = 'Network Error: ' + e.message;
                btn.disabled = false;
            }
        }

        async function pollPreviewStatus(previewKey) {
            const statusText = document.getElementById('preview-status-text');
            const progBar = document.getElementById('progress-bar');
            const progFill = document.getElementById('progress-fill');
            const container = document.getElementById('preview-container');
            const approveBtn = document.getElementById('btn-approve');

            progBar.style.display = 'block';
            statusText.innerText = 'Generating…';

            const interval = setInterval(async () => {
                try {
                    const res = await fetch(`/job/${JOB_ID}/preview_status/${previewKey}`);
                    const data = await res.json();
                    if (data.status === 'processing') {
                        const pct = data.progress || 0;
                        progFill.style.width = pct + '%';
                        statusText.innerText = `Processing ${pct}%… ${data.message || ''}`;
                    } else if (data.status === 'success') {
                        clearInterval(interval);
                        progFill.style.width = '100%';
                        statusText.innerText = 'Done!';
                        document.querySelector('.modal .btn-primary').disabled = false;

                        let vidUrl = data.preview_url;
                        if (vidUrl && vidUrl.includes('/app/player/')) vidUrl = vidUrl.replace('/app/player/', '/player/');

                        container.innerHTML = `
              <video id="preview-player" controls autoplay loop style="max-width:100%;max-height:380px;border:1px solid var(--border);">
                <source src="${vidUrl}" type="video/mp4">
              </video>`;

                        const filename = vidUrl.split('/').pop();
                        currentRefineData.previewFilename = filename;
                        approveBtn.disabled = false;
                    } else if (data.status === 'failed') {
                        clearInterval(interval);
                        statusText.innerText = 'Failed: ' + data.error;
                        document.querySelector('.modal .btn-primary').disabled = false;
                    }
                } catch (e) { console.error('Polling error', e); }
            }, 2000);
        }

        async function approvePreview() {
            if (!currentRefineData?.sectionId) { alert('No active session.'); return; }
            if (!confirm('Replace the current video with the preview?')) return;

            const btn = document.getElementById('btn-approve');
            btn.innerText = 'Approving…'; btn.disabled = true;

            try {
                const targetRenderer = document.getElementById('renderer-select').value;
                const mode = document.querySelector('input[name="refine-mode"][value="override"]');
                const finalPrompt = (mode && mode.checked)
                    ? document.getElementById('raw-prompt-input').value
                    : document.getElementById('user-feedback-input').value;

                // Grab the image prompts if we're in image_to_video mode (or always pass them so they map)
                const imgStart = document.getElementById('image-prompt-start').value.trim();
                const imgEnd = document.getElementById('image-prompt-end').value.trim();

                const payload = {
                    section_id: currentRefineData.sectionId,
                    beat_id: currentRefineData.beatId,
                    preview_path: 'videos/' + currentRefineData.previewFilename,
                    new_prompt: finalPrompt,
                    image_prompt_start: imgStart,
                    image_prompt_end: imgEnd,
                    renderer: targetRenderer
                };

                const res = await fetch(`/job/${JOB_ID}/approve_preview`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (data.status === 'success') {
                    alert('Approved! Reloading…');
                    closeModal();
                    loadJob();
                } else {
                    alert('Error: ' + data.error);
                    btn.innerText = 'Approve & Replace'; btn.disabled = false;
                }
            } catch (e) {
                alert('Network Error: ' + e.message);
                btn.innerText = 'Approve & Replace'; btn.disabled = false;
            }
        }
    </script>
