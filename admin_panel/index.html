<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - AI Document Presentation</title>
    <link rel="stylesheet" href="/admin/assets/admin.css">
</head>

<body>
    <div id="app">
        <!-- Header -->
        <header class="admin-header">
            <h1>🛠️ Admin Panel</h1>
            <div class="header-actions">
                <span id="system-status" class="system-status">●</span>
                <span id="server-time"></span>
            </div>
        </header>

        <!-- Login Screen -->
        <div id="login-screen" class="login-screen">
            <div class="login-box">
                <h2>🔐 Admin Authentication</h2>
                <input type="password" id="admin-key-input" placeholder="Enter Admin API Key" />
                <button id="login-btn" class="btn-primary">Login</button>
                <p id="login-error" class="error-message"></p>
            </div>
        </div>

        <!-- Main Content (hidden until logged in) -->
        <div id="main-content" class="main-content" style="display: none;">
            <!-- Tabs -->
            <div class="tabs">
                <button class="tab-btn active" data-tab="prompts">📝 Prompts</button>
                <button class="tab-btn" data-tab="config">⚙️ Config</button>
                <button class="tab-btn" data-tab="system">💻 System</button>
            </div>

            <!-- Prompts Tab -->
            <div id="prompts-tab" class="tab-content active">
                <h2>Prompt Files</h2>
                <div class="prompts-list">
                    <div id="prompts-loading" class="loading">Loading prompts...</div>
                    <div id="prompts-container"></div>
                </div>

                <!-- Prompt Editor -->
                <div id="prompt-editor" class="editor-panel" style="display: none;">
                    <div class="editor-header">
                        <h3 id="editor-filename"></h3>
                        <div>
                            <button id="save-prompt-btn" class="btn-primary">💾 Save</button>
                            <button id="close-editor-btn" class="btn-secondary">✖ Close</button>
                        </div>
                    </div>
                    <textarea id="prompt-content" class="code-editor"></textarea>
                    <div id="editor-status" class="status-message"></div>
                </div>
            </div>

            <!-- Config Tab -->
            <div id="config-tab" class="tab-content">
                <h2>Environment Configuration (.env)</h2>
                <div id="config-loading" class="loading">Loading configuration...</div>
                <div id="config-container" style="display: none;">
                    <div id="config-fields"></div>
                    <button id="save-config-btn" class="btn-primary">💾 Save Configuration</button>
                    <div id="config-status" class="status-message"></div>
                </div>
            </div>

            <!-- System Tab -->
            <div id="system-tab" class="tab-content">
                <h2>System Control</h2>

                <!-- System Info -->
                <div class="system-info-card">
                    <h3>📊 System Information</h3>
                    <div id="system-info-content">
                        <div class="info-row">
                            <span>Pipeline Version:</span>
                            <span id="pipeline-version">-</span>
                        </div>
                        <div class="info-row">
                            <span>Python Version:</span>
                            <span id="python-version">-</span>
                        </div>
                        <div class="info-row">
                            <span>Platform:</span>
                            <span id="platform-info">-</span>
                        </div>
                        <div class="info-row">
                            <span>Total Jobs:</span>
                            <span id="total-jobs">-</span>
                        </div>
                    </div>
                    <button id="refresh-info-btn" class="btn-secondary">🔄 Refresh</button>
                </div>

                <!-- Docker Control -->
                <div class="docker-control-card">
                    <h3>🐳 Docker Control</h3>
                    <button id="restart-docker-btn" class="btn-danger">🔄 Restart Container</button>
                    <div id="docker-status" class="status-message"></div>
                </div>

                <!-- Logs Viewer -->
                <div class="logs-card">
                    <h3>📄 Docker Logs</h3>
                    <button id="fetch-logs-btn" class="btn-secondary">📥 Fetch Logs</button>
                    <pre id="logs-content" class="logs-content"></pre>
                </div>
            </div>
        </div>
    </div>

    <script src="/admin/assets/admin.js"></script>
</body>

</html>
